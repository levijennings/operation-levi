<script>
(function(){
  if(window.__vrun) return; window.__vrun=true;
  var RUN_KEY='operation-levi'; // must match Vercel RUN_SHARED_SECRET if you set that env var (optional)
  function L(){ try{ return (typeof libraries!=='undefined'&&libraries)?libraries:{skills:[],templates:[],preferences:[],context:[]}; }catch(e){ return {skills:[],templates:[],preferences:[],context:[]}; } }
  function ITEMS(){ try{ return (typeof items!=='undefined'&&items)?items:[]; }catch(e){ return []; } }
  function persist(){ try{ if(typeof saveData==='function') saveData(); }catch(e){} }
  function toast(m){ try{ if(typeof showToast==='function') showToast(m); }catch(e){} }
  function esc(s){ return String(s==null?'':s); }

  function matchSkill(card){
    var sk=(L().skills||[]); if(!sk.length) return null;
    var t=((card.title||'')+' '+(card.notes||'')).toLowerCase();
    var best=null,bs=-1;
    sk.forEach(function(s){ var score=0; if(s.category&&card.category&&(s.category===card.category||s.category==='All')) score+=2; (String(s.tags||'').toLowerCase().split(/[,\s]+/).filter(Boolean)).forEach(function(tag){ if(t.indexOf(tag)>=0) score+=2; }); if(s.name&&t.indexOf(String(s.name).toLowerCase())>=0) score+=1; if(score>bs){bs=score;best=s;} });
    return best||sk[0];
  }
  function findByName(arr,name){ if(!name) return null; for(var i=0;i<arr.length;i++){ if(arr[i].name===name) return arr[i]; } return null; }
  function deriveContext(card,skill){
    var ctx=(L().context||[]);
    if(skill&&skill.defaultContext){ var c=findByName(ctx,skill.defaultContext); if(c) return c; }
    var t=(card.title||'').toLowerCase();
    for(var i=0;i<ctx.length;i++){ if(ctx[i].name&&t.indexOf(String(ctx[i].name).toLowerCase())>=0) return ctx[i]; }
    return null;
  }
  function derivePrefs(ctx){
    return (L().preferences||[]).filter(function(p){ return (!p.scope||p.scope==='global'||p.scope==='category') || (ctx&&p.appliesTo&&p.appliesTo===ctx.name); });
  }

  function boot(){
  document.body.insertAdjacentHTML('beforeend',
    '<button class="vr-fab" id="vrFab"><span>✦</span> Run with Claude</button>'+
    '<div class="vr-ov" id="vrOv"><div class="vr-panel">'+
      '<div class="vr-head"><h2><span class="star">✦</span> Run with Claude</h2><button class="vr-x" id="vrClose">✕ Close</button></div>'+
      '<div class="vr-body" id="vrBody"></div>'+
    '</div></div>');
  var ov=document.getElementById('vrOv'), bodyEl=document.getElementById('vrBody');
  function open(){ ov.classList.add('on'); list(); }
  function close(){ ov.classList.remove('on'); }

  function list(){
    bodyEl.innerHTML='';
    var hint=document.createElement('div'); hint.className='vr-hint'; hint.textContent='Do-it cards Claude can draft for you. Pick one, confirm the skill, and run. Drafts land in Needs review — nothing sends.'; bodyEl.appendChild(hint);
    var doit=ITEMS().filter(function(i){ return i.execMode==='do-it'; });
    if(!doit.length){ var e=document.createElement('div'); e.className='vr-empty'; e.textContent='No do-it cards yet. Speak or create a task and mark it “do-it”.'; bodyEl.appendChild(e); return; }
    doit.forEach(function(card){
      var it=document.createElement('div'); it.className='vr-item';
      var mid=document.createElement('div'); mid.style.flex='1'; mid.style.minWidth='0';
      var nm=document.createElement('div'); nm.className='nm'; nm.textContent=card.title||'Untitled'; mid.appendChild(nm);
      var sm=document.createElement('div'); sm.className='sm'; sm.textContent=(card.category||'')+(card.dueDate?(' · due '+card.dueDate):''); mid.appendChild(sm);
      it.appendChild(mid);
      if(card.aiStatus==='approved'){ var ba=document.createElement('div'); ba.className='vr-bdg appr'; ba.textContent='approved'; it.appendChild(ba); }
      else if(card.aiArtifact){ var br=document.createElement('div'); br.className='vr-bdg ready'; br.textContent='draft ready'; it.appendChild(br); }
      it.onclick=function(){ detail(card); };
      bodyEl.appendChild(it);
    });
  }

  function detail(card){
    bodyEl.innerHTML='';
    var back=document.createElement('button'); back.className='vr-btn'; back.textContent='← Back'; back.style.marginBottom='14px'; back.onclick=list; bodyEl.appendChild(back);
    var h=document.createElement('div'); h.style.cssText='font-weight:700;font-size:16px;margin-bottom:12px'; h.textContent=card.title||'Untitled'; bodyEl.appendChild(h);
    // skill chooser
    var sk=(L().skills||[]); var matched=matchSkill(card);
    var fl=document.createElement('div'); fl.className='vr-field'; var lab=document.createElement('label'); lab.textContent='Skill to run'; fl.appendChild(lab);
    var sel=document.createElement('select'); var none=document.createElement('option'); none.value=''; none.textContent= sk.length?'— pick a skill —':'(no skills in your library yet)'; sel.appendChild(none);
    sk.forEach(function(s){ var o=document.createElement('option'); o.value=s.name; o.textContent=s.name; sel.appendChild(o); });
    if(matched) sel.value=matched.name; fl.appendChild(sel); bodyEl.appendChild(fl);
    var chips=document.createElement('div'); chips.className='vr-chips'; bodyEl.appendChild(chips);
    function refreshChips(){ chips.innerHTML=''; var skill=findByName(sk,sel.value); var tmpl=skill?findByName(L().templates||[],skill.linkedTemplate):null; var ctx=deriveContext(card,skill); var prefs=derivePrefs(ctx);
      function chip(txt,miss){ var c=document.createElement('span'); c.className='vr-chip'+(miss?' miss':''); c.textContent=txt; chips.appendChild(c); }
      chip(skill?('◆ '+skill.name):'◆ no skill', !skill);
      chip(tmpl?('▭ '+tmpl.name):'▭ no template', !tmpl);
      chip(ctx?('❖ '+ctx.name):'❖ no brand/context', !ctx);
      chip('◷ '+prefs.length+' preference'+(prefs.length===1?'':'s'), false);
    }
    sel.onchange=refreshChips; refreshChips();
    var row=document.createElement('div'); row.className='vr-row';
    var go=document.createElement('button'); go.className='vr-btn go'; go.textContent='Run with Claude';
    var note=document.createElement('span'); note.className='vr-note'; note.textContent='drafts only · nothing sends';
    row.appendChild(go); row.appendChild(note); bodyEl.appendChild(row);
    var out=document.createElement('div'); bodyEl.appendChild(out);

    if(card.aiArtifact&&card.aiArtifact.content){ showDraft(out,card,card.aiArtifact.content); }

    go.onclick=function(){
      var skill=findByName(sk,sel.value); var tmpl=skill?findByName(L().templates||[],skill.linkedTemplate):null; var ctx=deriveContext(card,skill); var prefs=derivePrefs(ctx);
      go.textContent='Drafting…'; go.disabled=true; out.innerHTML='';
      fetch('/api/run',{method:'POST',headers:{'content-type':'application/json','x-ol-key':RUN_KEY},body:JSON.stringify({card:card,skill:skill,template:tmpl,context:ctx,preferences:prefs})})
        .then(function(r){ return r.json().then(function(j){ return {ok:r.ok,status:r.status,j:j}; }); })
        .then(function(res){
          go.textContent='Run with Claude'; go.disabled=false;
          if(res.ok&&res.j&&res.j.draft){
            card.aiArtifact={kind:'draft',content:res.j.draft,model:res.j.model||'',createdAt:Date.now()};
            card.aiStatus='ready'; card.status='review'; card.columnEnteredAt=Date.now(); persist();
            try{ if(typeof renderBoard==='function') renderBoard(); }catch(e){}
            toast('✦ Draft ready — in Needs review'); showDraft(out,card,res.j.draft);
          } else if(res.status===503&&res.j&&res.j.error==='no_key'){
            out.innerHTML='<div class="vr-msg"><b>Almost there — add your Anthropic API key.</b><br>In Vercel → project <b>operation-levi</b> → Settings → Environment Variables, add <b>ANTHROPIC_API_KEY</b> (from <a href="https://console.anthropic.com" target="_blank" rel="noopener">console.anthropic.com</a>) for Production &amp; Preview, then redeploy. This button starts working immediately after.</div>';
          } else { var d=(res.j&&(res.j.detail||res.j.error))||('HTTP '+res.status); out.innerHTML='<div class="vr-msg">Couldn’t draft: '+esc(d)+'</div>'; }
        }).catch(function(e){ go.textContent='Run with Claude'; go.disabled=false; out.innerHTML='<div class="vr-msg">Network error: '+esc(e&&e.message||e)+'</div>'; });
    };
  }

  function showDraft(out,card,text){
    out.innerHTML='';
    var d=document.createElement('div'); d.className='vr-draft'; d.textContent=text; out.appendChild(d);
    var row=document.createElement('div'); row.className='vr-row';
    var appr=document.createElement('button'); appr.className='vr-btn appr'; appr.textContent=(card.aiStatus==='approved')?'Approved ✓':'Approve';
    appr.onclick=function(){ card.aiStatus='approved'; if(card.aiArtifact) card.aiArtifact.approvedAt=Date.now(); persist(); appr.textContent='Approved ✓'; toast('Approved — ready to send manually'); };
    var copy=document.createElement('button'); copy.className='vr-btn'; copy.textContent='Copy'; copy.onclick=function(){ try{ navigator.clipboard.writeText(text); toast('Copied'); }catch(e){} };
    var re=document.createElement('button'); re.className='vr-btn'; re.textContent='Re-run'; re.onclick=function(){ detail(card); };
    var send=document.createElement('button'); send.className='vr-btn'; send.style.cssText='border-color:#2E6FB0;color:#9cc4ec'; send.textContent='✉ Send email…';
    send.onclick=function(){ var cur=out.querySelector('.vr-draft'); sendEmail(card, cur?cur.textContent:text); };
    var note=document.createElement('span'); note.className='vr-note'; note.textContent='opens your email app — nothing sends on its own';
    row.appendChild(appr); row.appendChild(send); row.appendChild(copy); row.appendChild(re); row.appendChild(note); out.appendChild(row);
  }

  function sendEmail(card, text){
    // best-effort recipient: a context entry whose name appears in the card title and has an email
    var to=''; try{ (L().context||[]).forEach(function(c){ if(!to && c.email && (card.title||'').toLowerCase().indexOf(String(c.name||'').toLowerCase())>=0) to=c.email; }); }catch(e){}
    var ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;z-index:9004;background:rgba(5,6,8,.82);display:flex;align-items:flex-start;justify-content:center;padding:7vh 16px 40px;overflow-y:auto;font-family:inherit';
    var box=document.createElement('div'); box.style.cssText='width:560px;max-width:94vw;background:#121317;border:1px solid #2a2e38;border-radius:16px;padding:22px;color:#e9ecf2;box-shadow:0 30px 80px rgba(0,0,0,.5)';
    box.innerHTML='<div style="font-weight:700;font-size:17px;margin-bottom:4px">✉ Send email</div><div style="color:#8a91a0;font-size:12.5px;margin-bottom:14px">Opens your email app with everything pre-filled. Review there and hit send — Levi\'s Projects never sends on its own.</div>';

      var ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;z-index:9300;background:rgba(4,5,8,.82);display:flex;align-items:flex-start;justify-content:center;padding:7vh 16px 40px;overflow-y:auto;font-family:Inter,system-ui,sans-serif';
      var box=document.createElement('div'); box.style.cssText='width:560px;max-width:94vw;background:#121317;border:1px solid #2a2e38;border-radius:16px;padding:22px;color:#e9ecf2;box-shadow:0 30px 80px rgba(0,0,0,.5)';
      box.innerHTML='<div style="font-weight:700;font-size:17px;margin-bottom:4px">✉ Send email</div><div style="color:#8a91a0;font-size:12.5px;margin-bottom:16px">This sends for real, from your dvlmnt.com address. Review and confirm — nothing sends on its own.</div>';
      function field(label,tag,val,ph){ var w=document.createElement('div'); w.style.marginBottom='11px'; var l=document.createElement('label'); l.textContent=label; l.style.cssText='display:block;font-size:11px;color:#8a91a0;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em'; var inp=document.createElement(tag); inp.style.cssText='width:100%;box-sizing:border-box;background:#0e0f13;border:1px solid #30353d;border-radius:9px;padding:10px 12px;color:#e9ecf2;font-size:14px;font-family:Inter'; if(tag==="textarea"){inp.style.minHeight="150px";inp.style.lineHeight="1.5";inp.style.resize="vertical";} if(val!=null) inp.value=val; if(ph) inp.placeholder=ph; w.appendChild(l); w.appendChild(inp); box.appendChild(w); return inp; }
      var toI=field('To','input',to,'name@client.com'); var ccI=field('CC (optional)','input','',''); var subI=field('Subject','input',it.title||'',''); var bodyI=field('Message','textarea',text,'');
      var msg=document.createElement('div'); msg.style.cssText='font-size:12.5px;margin-top:4px;line-height:1.5;display:none'; box.appendChild(msg);
      function showFallback(t){ msg.style.display='block'; msg.style.color='#f2c98a'; msg.innerHTML=''; var d=document.createElement('div'); d.innerHTML=t; d.style.marginBottom='8px'; msg.appendChild(d); var fb=document.createElement('button'); fb.textContent='Open in mail app instead'; fb.style.cssText='border:1px solid #30353d;background:#1d2129;color:#aab2c0;border-radius:9px;padding:9px 13px;font-weight:600;cursor:pointer;font-family:Inter'; fb.onclick=function(){ try{document.body.removeChild(ov);}catch(e){} sendMailto(it, bodyI.value); }; msg.appendChild(fb); }
      var btns=document.createElement('div'); btns.style.cssText='display:flex;gap:10px;margin-top:16px';
      var cancel=document.createElement('button'); cancel.textContent='Cancel'; cancel.style.cssText='flex:1;border:1px solid #30353d;background:#1d2129;color:#e9ecf2;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;font-family:Inter'; cancel.onclick=function(){ document.body.removeChild(ov); };
      var go=document.createElement('button'); go.textContent='Confirm & send'; go.style.cssText='flex:1;border:none;background:#2E6FB0;color:#fff;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-family:Inter';
      go.onclick=function(){
        if(!toI.value.trim()){ msg.style.display='block'; msg.style.color='#e0a02c'; msg.textContent='Add a recipient first.'; return; }
        go.textContent='Sending…'; go.disabled=true; cancel.disabled=true; msg.style.display='none';
        var rawBody=String(bodyI.value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        var html=(typeof window.lpEmailWrap==='function')?window.lpEmailWrap(rawBody,{preheader:(subI.value||'')}):rawBody;
        fetch('/api/send',{method:'POST',headers:{'content-type':'application/json','x-ol-key':RUN_KEY},body:JSON.stringify({to:toI.value.trim(),cc:ccI.value.trim(),subject:subI.value,html:html,text:bodyI.value})})
          .then(function(r){ return r.json().then(function(j){ return {ok:r.ok,status:r.status,j:j}; }); })
          .then(function(res){
            go.textContent='Confirm & send'; go.disabled=false; cancel.disabled=false;
            if(res.ok){ it.aiStatus='sent'; if(!it.aiArtifact) it.aiArtifact={}; it.aiArtifact.sentAt=Date.now(); it.aiArtifact.sentTo=toI.value.trim(); it.aiArtifact.sentVia='resend'; it.status='done'; it.columnEnteredAt=Date.now(); persist(); try{ if(typeof renderBoard==='function') renderBoard(); }catch(e){} toast('✉ Sent to '+toI.value.trim()); try{document.body.removeChild(ov);}catch(e){} showBoard(); }
            else if(res.status===503&&res.j&&res.j.error==='no_key'){ showFallback('Add <b>RESEND_API_KEY</b> in Vercel (and verify a dvlmnt.com sender) to send automatically.'); }
            else if(res.j&&res.j.error==='no_from'){ showFallback('Verify a sender for <b>dvlmnt.com</b> in Resend and set <b>RESEND_FROM</b> in Vercel.'); }
            else { msg.style.display='block'; msg.style.color='#e07a63'; msg.textContent='Send failed: '+((res.j&&(res.j.detail||res.j.error))||('HTTP '+res.status)); }
          }).catch(function(e){ go.textContent='Confirm & send'; go.disabled=false; cancel.disabled=false; msg.style.display='block'; msg.style.color='#e07a63'; msg.textContent='Network error: '+(e&&e.message||e); });
      };
      btns.appendChild(cancel); btns.appendChild(go); box.appendChild(btns);
      ov.appendChild(box); ov.onclick=function(e){ if(e.target===ov) document.body.removeChild(ov); }; document.body.appendChild(ov);
    }

    // ── Voice-first capture ──
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition, rec=null, listening=false, capMode='track-it', capDraft=null;
    var cap=document.createElement('div'); cap.className='ol2cap'; cap.id='ol2cap';
    cap.innerHTML=
      '<div class="cap">'+
        '<div class="mic" id="ol2capMic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></div>'+
        '<h3 id="ol2capH">Speak a task</h3><div class="sub" id="ol2capSub">Tap the mic and talk — or type below</div>'+
        '<div class="wave" id="ol2capWave"></div>'+
        '<textarea id="ol2capTa" placeholder="e.g. Draft a proposal for Acme for the website redesign, due Friday"></textarea>'+
        '<div class="cerr" id="ol2capErr"></div>'+
        '<div class="pv" id="ol2capPv">'+
          '<div class="pt">✦ Card preview <span style="font-size:10.5px;color:#727a88;border:1px solid #30353d;border-radius:6px;padding:2px 7px;margin-left:4px">confirm to save</span></div>'+
          '<div class="prow"><span>Title</span><b id="ol2pvTitle"></b></div>'+
          '<div class="prow"><span>Due</span><b id="ol2pvDue"></b></div>'+
          '<div class="prow"><span>Owner</span><b id="ol2pvOwner"></b></div>'+
          '<div class="prow"><span>Category</span><b id="ol2pvCat"></b></div>'+
          '<div class="prow"><span>Context</span><b id="ol2pvCtx"></b></div>'+
          '<div class="modes"><div class="mode" id="ol2mDo">✦ Do-it · Claude drafts</div><div class="mode" id="ol2mTrack">◷ Track-it · you do</div></div>'+
        '</div>'+
        '<div class="cact" id="ol2capAct1"><button class="gbtn" id="ol2capCancel">Cancel</button><button class="gbtn amber" id="ol2capCont">Continue →</button></div>'+
        '<div class="cact" id="ol2capAct2" style="display:none"><button class="gbtn" id="ol2capBack">← Edit</button><button class="gbtn amber" id="ol2capConfirm">Confirm — let Claude draft it</button></div>'+
      '</div>';
    document.body.appendChild(cap);
    for(var wi=0;wi<22;wi++){ cap.querySelector('#ol2capWave').appendChild(document.createElement('i')); }
    function $c(id){ return cap.querySelector('#'+id); }
    function people(){ try{ return (typeof getAllAssignees==='function'?(getAllAssignees()||[]):[]); }catch(e){ return []; } }
    function cats(){ try{ return (typeof teams!=='undefined'&&teams)?Object.keys(teams):['Personal']; }catch(e){ return ['Personal']; } }
    function meName(){ try{ return (typeof _userName!=='undefined'&&_userName)?_userName:'Levi'; }catch(e){ return 'Levi'; } }
    function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function parseDue(low){ var now=new Date(); now.setHours(0,0,0,0);
      if(/\btoday\b/.test(low)) return fmt(now);
      if(/\btomorrow\b/.test(low)){ var d=new Date(now); d.setDate(d.getDate()+1); return fmt(d); }
      if(/\bnext week\b/.test(low)){ var d2=new Date(now); d2.setDate(d2.getDate()+7); return fmt(d2); }
      var days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
      for(var i=0;i<7;i++){ if(new RegExp('\\b'+days[i]+'\\b').test(low)){ var d3=new Date(now); var add=(i-d3.getDay()+7)%7; if(add===0) add=7; d3.setDate(d3.getDate()+add); return fmt(d3); } }
      if(/\bend of (the )?week\b|\beow\b/.test(low)){ var d4=new Date(now); var a4=(5-d4.getDay()+7)%7; d4.setDate(d4.getDate()+a4); return fmt(d4); }
      return '';
    }
    function setLive(v){ listening=v; $c('ol2capMic').classList.toggle('live',v); $c('ol2capWave').style.visibility=v?'visible':'hidden'; if(!$c('ol2capPv').classList.contains('on')) $c('ol2capH').textContent=v?'Listening…':'Speak a task'; }
    function startRec(){ if(!SR){ var er=$c('ol2capErr'); er.style.display='block'; er.textContent="Voice input isn’t supported here — type your task below."; return; } try{ rec=new SR(); }catch(e){ return; } rec.lang='en-US'; rec.interimResults=true; rec.continuous=false; rec.onresult=function(e){ var t=''; for(var i=0;i<e.results.length;i++){ t+=e.results[i][0].transcript; } $c('ol2capTa').value=t; }; rec.onerror=function(e){ setLive(false); if(e&&e.error==='not-allowed'){ var er2=$c('ol2capErr'); er2.style.display='block'; er2.textContent='Microphone blocked — allow mic access or type below.'; } }; rec.onend=function(){ setLive(false); }; try{ rec.start(); setLive(true); $c('ol2capErr').style.display='none'; }catch(e){} }
    function stopRec(){ try{ if(rec&&listening) rec.stop(); }catch(e){} setLive(false); }
    function setCapMode(m){ capMode=m; $c('ol2mDo').classList.toggle('sel',m==='do-it'); $c('ol2mTrack').classList.toggle('sel',m==='track-it'); }
    function openCapture(){ if(!shell.classList.contains('on')){ shell.classList.add('on'); showBoard(); } cap.classList.add('on'); $c('ol2capTa').value=''; $c('ol2capErr').style.display='none'; $c('ol2capPv').classList.remove('on'); $c('ol2capAct1').style.display='flex'; $c('ol2capAct2').style.display='none'; $c('ol2capH').textContent='Speak a task'; $c('ol2capSub').textContent='Tap the mic and talk — or type below'; setTimeout(startRec,250); }
    function closeCapture(){ stopRec(); cap.classList.remove('on'); }
    function capParse(){
      var text=($c('ol2capTa').value||'').trim(); var er=$c('ol2capErr');
      if(!text){ er.style.display='block'; er.textContent='Say or type a task first.'; return; }
      er.style.display='none'; var low=text.toLowerCase();
      var due=parseDue(low); var pl=people(), own=meName();
      for(var i=0;i<pl.length;i++){ var nm=String(pl[i]).toLowerCase().replace(/[^a-z0-9]/g,''); if(nm && new RegExp('\\b'+nm+'\\b').test(low.replace(/[^a-z0-9 ]/g,''))){ own=pl[i]; break; } }
      var cl=cats(), cat=(cl.indexOf('Personal')>=0?'Personal':cl[0]);
      for(var j=0;j<cl.length;j++){ if(low.indexOf(String(cl[j]).toLowerCase())>=0){ cat=cl[j]; break; } }
      var doit=/\b(draft|write|writeup|summari[sz]e|research|generate|create|compose|prepare|email|reply|respond|outline|update|recap|brainstorm|plan)\b/.test(low);
      var title=text.replace(/,?\s*(due|by|before)\s+[a-z0-9 ]+$/i,'').replace(/\s+(today|tomorrow|next week)\b/ig,'').trim(); if(!title) title=text; title=title.charAt(0).toUpperCase()+title.slice(1);
      var ctx=null; try{ (L().context||[]).forEach(function(c){ if(!ctx && c.name && low.indexOf(String(c.name).toLowerCase())>=0) ctx=c; }); }catch(e){}
      capDraft={title:title, due:due, owner:own, cat:cat, ctx:ctx};
      $c('ol2pvTitle').textContent=title; $c('ol2pvDue').textContent=due||'—'; $c('ol2pvOwner').textContent=own; $c('ol2pvCat').textContent=cat; $c('ol2pvCtx').textContent=ctx?ctx.name:'—';
      setCapMode(doit?'do-it':'track-it');
      $c('ol2capPv').classList.add('on'); $c('ol2capAct1').style.display='none'; $c('ol2capAct2').style.display='flex';
      $c('ol2capH').textContent='Got it — here’s the card'; $c('ol2capSub').textContent='Claude structured your sentence. Confirm to save.';
      (function(){ var box=$c('ol2capPv'); if(!box) return; var el=document.getElementById('ol2capAssess'); if(!el){ el=document.createElement('div'); el.id='ol2capAssess'; el.style.cssText='margin-top:10px;font-size:12.5px;color:#8a91a0'; box.appendChild(el); } el.textContent='✦ Assessing readiness…'; lpAssess({title:capDraft.title,notes:'',category:capDraft.cat},function(j){ if(!j||j.confidence==null){ el.textContent=''; if(capDraft) capDraft.assess=null; return; } if(capDraft) capDraft.assess={confidence:Number(j.confidence),reason:j.reason||'',questions:j.questions||[],suggest:j.suggest||{}}; var cc=j.confidence>=75?'#46b98a':(j.confidence>=40?'#e0a02c':'#e07a63'); el.innerHTML='<span style="color:'+cc+';font-weight:700">Claude confidence: '+j.confidence+'%</span>'+(j.reason?(' — '+esc(j.reason)):'')+((j.questions&&j.questions.length)?('<div style="margin-top:5px;color:#e0a02c">Needs: '+esc(j.questions[0])+'</div>'):''); }); })();
    }
    function capConfirm(){
      if(!capDraft) return; var own=capDraft.owner||meName();
      var it={ id:'v'+Date.now().toString(36), type:'task', title:capDraft.title||'Untitled', category:capDraft.cat||'Personal', status:'thisweek',
        startDate:'', dueDate:capDraft.due||'', deliverable:'', notes:'', priority:0, timeEstimate:0, tshirtSize:'XS',
        raci:{R:[],A:'',C:[],I:[]}, assignees:own?[own]:[], responsible:own||'', responsible2:'', informed:[], involved:[], approver:'', informedWhenComplete:[],
        waitingOn:'', waitingFrom:'', waitingExpected:'', goalIds:[], approvers:[], meetings:[], subtasks:[], timeline:[], urls:[], documents:[], habitCompletions:[], recurring:false, recurringFrequency:'',
        columnEnteredAt:Date.now(), order:999, notionUrl:'', figmaUrl:'', googleDocsUrl:'', msDocsUrl:'', msExcelUrl:'',
        execMode:capMode, aiStatus:'idle', aiArtifact:null, aiUsed:null, linkedContext:capDraft.ctx?[capDraft.ctx.name]:[] };
      if(capDraft.assess){ it.aiConfidence=capDraft.assess.confidence; it.aiAssess={reason:capDraft.assess.reason,questions:capDraft.assess.questions,suggest:capDraft.assess.suggest}; }
      try{ if(typeof items!=='undefined' && items && items.push) items.push(it); }catch(e){}
      persist(); closeCapture(); showBoard();
      if(capMode==='do-it'){
        toast('✦ Card created — Claude is drafting…');
        var parts=assemble(it);
        callRun(it, parts, '', '', function(res){
          if(res.ok&&res.j&&res.j.draft){ it.aiArtifact={kind:'draft',content:res.j.draft,model:res.j.model||'',createdAt:Date.now()}; it.aiStatus='ready'; it.status='review'; it.columnEnteredAt=Date.now(); persist(); if(shell.classList.contains('on')){ var rev=document.getElementById('ol2Review'); if(rev.style.display==='none') showBoard(); } toast('✦ Draft ready — in Needs review'); }
          else if(res.status===503&&res.j&&res.j.error==='no_key'){ toast('Card created — add ANTHROPIC_API_KEY to enable drafting'); }
          else { toast('Card created — couldn’t draft right now'); }
        });
      } else { toast('✓ Card added'); }
      capDraft=null;
    }
    $c('ol2capMic').onclick=function(){ if(listening) stopRec(); else startRec(); };
    $c('ol2capCancel').onclick=closeCapture;
    $c('ol2capCont').onclick=function(){ stopRec(); capParse(); };
    $c('ol2capBack').onclick=function(){ $c('ol2capPv').classList.remove('on'); $c('ol2capAct1').style.display='flex'; $c('ol2capAct2').style.display='none'; $c('ol2capH').textContent='Speak a task'; $c('ol2capSub').textContent='Tap the mic and talk — or type below'; };
    $c('ol2capConfirm').onclick=capConfirm;
    $c('ol2mDo').onclick=function(){ setCapMode('do-it'); };
    $c('ol2mTrack').onclick=function(){ setCapMode('track-it'); };
    cap.onclick=function(e){ if(e.target===cap) closeCapture(); };
    window.ol2OpenCapture=openCapture;

    document.addEventListener('keydown',function(e){
      if(e.altKey&&e.code==='Space'){ e.preventDefault(); openCapture(); return; }
      if(e.key==='Escape'){ if(cap.classList.contains('on')){ closeCapture(); return; } if(shell.classList.contains('on')){ var rev=document.getElementById('ol2Review'); if(rev.style.display!=='none'){ showBoard(); } } }
    });
    window.ol2Refresh=function(){ if(shell.classList.contains('on')){ var rev=document.getElementById('ol2Review'); if(rev.style.display==='none') showBoard(); } };
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
})();
