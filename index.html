        function saveEvent(existingId, instanceDate, saveAll) {
            const title = (document.getElementById('evtTitle')||{}).value||'';
            const category = (document.getElementById('evtCategory')||{}).value||'meeting';
            const startDate = (document.getElementById('evtStart')||{}).value||'';
            const endDate = (document.getElementById('evtEnd')||{}).value||'';
            const startTime = (document.getElementById('evtStartTime')||{}).value||'';
            const endTime = (document.getElementById('evtEndTime')||{}).value||'';
            const location = (document.getElementById('evtLocation')||{}).value||'';
            const notes = (document.getElementById('evtNotes')||{}).value||'';
            const recType = (document.getElementById('evtRecType')||{}).value||'none';
            const peopleRaw = (document.getElementById('evtPeople')||{}).value||'';
            const people = peopleRaw ? peopleRaw.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
            if (!title.trim() || !startDate) { showToast('Title and start date required', 'error'); return; }
            const recurrence = recType === 'none' ? { type: 'none' } : { type: recType, interval: 1 };
            const existing = existingId ? events.find(function(e){return e.id===existingId;}) : null;
            if (existing && instanceDate && !saveAll) {
                const overrides = existing.overrides || [];
                const idx = overrides.findIndex(function(o){return o.recurrenceId===instanceDate;});
                const ov = { recurrenceId: instanceDate, overrideDate: startDate, title: title.trim(), category, startDate, endDate, startTime, endTime, location: location.trim(), notes: notes.trim(), people };
                if (idx >= 0) overrides[idx] = ov; else overrides.push(ov);
                existing.overrides = overrides;
            } else if (existing) {
                Object.assign(existing, { title: title.trim(), category, startDate, endDate, startTime, endTime, location: location.trim(), notes: notes.trim(), people, recurrence });
            } else {
                events.push({ id: Date.now().toString(36) + Math.random().toString(36).substr(2,4), title: title.trim(), category, startDate, endDate, startTime, endTime, location: location.trim(), notes: notes.trim(), people, recurrence, overrides: [], itinerary: { segments: [], documents: [] } });
            }
            saveData();
            var modal = document.getElementById('eventModal');
            if (modal) modal.remove();
            showToast('Event saved');
            renderGantt();
        }

        function deleteEvent(eventId, instanceDate) {
            const existing = events.find(function(e){return e.id===eventId;});
            if (!existing) return;
            const hasRecurrence = existing.recurrence && existing.recurrence.type !== 'none';
            if (hasRecurrence && instanceDate) {
                if (!confirm('Delete just this occurrence?')) return;
                const overrides = existing.overrides || [];
                overrides.push({ recurrenceId: instanceDate, isCancelled: true });
                existing.overrides = overrides;
            } else {
                if (!confirm('Delete this event?')) return;
                events = events.filter(function(e){return e.id!==eventId;});
            }
            saveData();
            var modal = document.getElementById('eventModal');
            if (modal) modal.remove();
            showToast('Event deleted');
            renderGantt();
        }

        function openTripItinerary(eventId) {
            const evt = events.find(function(e){return e.id===eventId;});
            if (!evt) return;
            if (!evt.itinerary) evt.itinerary = { segments: [], documents: [] };
            const itin = evt.itinerary;

            function buildDayTimeline() {
                const segsByDay = {};
                (itin.segments || []).forEach(function(seg) {
                    const d = seg.date || 'undated';
                    if (!segsByDay[d]) segsByDay[d] = [];
                    segsByDay[d].push(seg);
                });
                const days = Object.keys(segsByDay).sort();
                if (!days.length) return '<div style="text-align:center;color:var(--text-3);font-size:12px;padding:24px;">No items yet. Add segments below.</div>';
                let th = '';
                days.forEach(function(day) {
                    const dayLabel = day === 'undated' ? 'Undated' : new Date(day + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
                    th += '<div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:8px;">' + dayLabel + '</div>';
                    segsByDay[day].slice().sort(function(a,b){return (a.time||'').localeCompare(b.time||'');}).forEach(function(seg) {
                        const icons = { flight: '\u2708\uFE0F', hotel: '\u{1F3E8}', car: '\u{1F697}', activity: '\u{1F4CD}' };
                        const icon = icons[seg.type] || '\u{1F4CC}';
                        const docBtns = (seg.documentIds||[]).map(function(did) {
                            const doc = itin.documents.find(function(d){return d.id===did;});
                            return doc ? '<button onclick="viewItinDoc(\'' + eventId + '\',\'' + did + '\')" style="font-size:9px;padding:2px 8px;background:var(--accent);color:white;border:none;border-radius:12px;cursor:pointer;">\u{1F4CE} ' + doc.name + '</button>' +
                                '<button onclick="removeItinDoc(\'' + eventId + '\',\'' + did + '\')" style="font-size:9px;padding:2px 6px;background:#FEF2F2;color:var(--danger);border:1px solid var(--danger);border-radius:12px;cursor:pointer;">\u00D7</button>' : '';
                        }).join('');
                        th += '<div style="display:flex;gap:12px;padding:10px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--accent);">' +
                            '<div style="font-size:20px;flex-shrink:0;line-height:1;">' + icon + '</div>' +
                            '<div style="flex:1;min-width:0;">' +
                            '<div style="font-size:12px;font-weight:700;">' + (seg.title||seg.type) + '</div>' +
                            (seg.time ? '<div style="font-size:11px;color:var(--text-3);">\u{1F550} ' + seg.time + (seg.endTime ? ' \u2013 ' + seg.endTime : '') + '</div>' : '') +
                            (seg.details ? '<div style="font-size:11px;color:var(--text-2);margin-top:2px;">' + seg.details + '</div>' : '') +
                            (seg.confirmationNumber ? '<div style="font-size:10px;color:var(--accent);margin-top:2px;">Conf: ' + seg.confirmationNumber + '</div>' : '') +
                            ((seg.documentIds||[]).length ? '<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;">' + docBtns + '</div>' : '') +
                            '</div>' +
                            '<button onclick="removeItinSegment(\'' + eventId + '\',\'' + seg.id + '\')" style="font-size:11px;background:none;border:none;cursor:pointer;color:var(--text-3);flex-shrink:0;align-self:flex-start;">\u00D7</button>' +
                        '</div>';
                    });
                    th += '</div>';
                });
                return th;
            }

            var modal = document.createElement('div');
            modal.id = 'itinModal';
            modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;';
            modal.innerHTML = '<div style="background:var(--surface);border-radius:var(--radius);width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.35);">' +
                '<div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">' +
                '<div><div style="font-size:16px;font-weight:700;">\u2708\uFE0F ' + evt.title + '</div>' +
                '<div style="font-size:12px;color:var(--text-3);margin-top:2px;">' + evt.startDate + (evt.endDate && evt.endDate !== evt.startDate ? ' \u2192 ' + evt.endDate : '') + '</div></div>' +
                '<div style="display:flex;gap:8px;align-items:center;">' +
                '<button onclick="document.getElementById(\'itinModal\').remove();openEventModal(\'' + eventId + '\',null)" class="btn" style="font-size:11px;">Edit Trip</button>' +
                '<button onclick="document.getElementById(\'itinModal\').remove()" style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--text-3);">\u00D7</button></div></div>' +
                '<div style="flex:1;overflow-y:auto;padding:20px 24px;" id="itinTimeline">' + buildDayTimeline() + '</div>' +
                '<div style="padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0;">' +
                '<div style="font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;">Add Segment</div>' +
                '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">' +
                '<button class="btn" onclick="showItinForm(\'' + eventId + '\',\'flight\')" style="font-size:11px;">\u2708\uFE0F Flight</button>' +
                '<button class="btn" onclick="showItinForm(\'' + eventId + '\',\'hotel\')" style="font-size:11px;">\u{1F3E8} Hotel</button>' +
                '<button class="btn" onclick="showItinForm(\'' + eventId + '\',\'car\')" style="font-size:11px;">\u{1F697} Rental Car</button>' +
                '<button class="btn" onclick="showItinForm(\'' + eventId + '\',\'activity\')" style="font-size:11px;">\u{1F4CD} Activity</button>' +
                '</div>' +
                '<div id="itinSegForm_' + eventId + '" style="display:none;background:var(--surface-2);border-radius:8px;padding:14px;"></div>' +
                '</div></div>';
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
        }

        function showItinForm(eventId, type) {
            const formEl = document.getElementById('itinSegForm_' + eventId);
            if (!formEl) return;
            const labels = { flight: 'Flight', hotel: 'Hotel', car: 'Rental Car', activity: 'Activity' };
            formEl.style.display = 'block';
            formEl.innerHTML = '<div style="font-size:12px;font-weight:600;margin-bottom:10px;">' + labels[type] + '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">' +
                '<div><label style="font-size:10px;color:var(--text-3);">TITLE</label><input id="isTitle" placeholder="' + (type==='flight'?'Flight # / airline':type==='hotel'?'Hotel name':type==='car'?'Rental company':'Activity name') + '" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);box-sizing:border-box;margin-top:3px;"></div>' +
                '<div><label style="font-size:10px;color:var(--text-3);">DATE</label><input id="isDate" type="date" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);box-sizing:border-box;margin-top:3px;"></div>' +
                '<div><label style="font-size:10px;color:var(--text-3);">' + (type==='hotel'?'CHECK-IN':'START TIME') + '</label><input id="isTime" type="time" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);box-sizing:border-box;margin-top:3px;"></div>' +
                '<div><label style="font-size:10px;color:var(--text-3);">' + (type==='hotel'?'CHECK-OUT':'END TIME') + '</label><input id="isEndTime" type="time" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);box-sizing:border-box;margin-top:3px;"></div>' +
                '</div>' +
                '<div style="margin-bottom:8px;"><label style="font-size:10px;color:var(--text-3);">DETAILS</label><textarea id="isDetails" rows="2" placeholder="' + (type==='flight'?'Departure/arrival, seat':type==='hotel'?'Address, room type':type==='car'?'Pickup/dropoff, car type':'Address, description') + '" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);resize:none;box-sizing:border-box;margin-top:3px;"></textarea></div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">' +
                '<div><label style="font-size:10px;color:var(--text-3);">CONFIRMATION #</label><input id="isConf" placeholder="Optional" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);box-sizing:border-box;margin-top:3px;"></div>' +
                '<div><label style="font-size:10px;color:var(--text-3);">UPLOAD DOCUMENT</label><input id="isDoc" type="file" accept=".pdf,.png,.jpg,.jpeg" style="width:100%;font-size:11px;margin-top:6px;"></div>' +
                '</div>' +
                '<div style="display:flex;gap:8px;">' +
                '<button onclick="addItinSegment(\'' + eventId + '\',\'' + type + '\')" style="flex:1;padding:8px;background:var(--accent);color:white;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;">Add ' + labels[type] + '</button>' +
                '<button onclick="document.getElementById(\'itinSegForm_' + eventId + '\').style.display=\'none\'" style="padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;">Cancel</button>' +
                '</div>';

        function addItinSegment(eventId, type) {
            const evt = events.find(function(e){return e.id===eventId;});
            if (!evt) { showToast('Event not found','error'); return; }
            if (!evt.itinerary) evt.itinerary = { segments: [], documents: [] };
            const title = ((document.getElementById('isTitle')||{}).value||'').trim() || type;
            const date = (document.getElementById('isDate')||{}).value||'';
            const time = (document.getElementById('isTime')||{}).value||'';
            const endTime = (document.getElementById('isEndTime')||{}).value||'';
            const details = ((document.getElementById('isDetails')||{}).value||'').trim();
            const conf = ((document.getElementById('isConf')||{}).value||'').trim();
            const docFile = document.getElementById('isDoc') && document.getElementById('isDoc').files && document.getElementById('isDoc').files[0];
            const segId = Date.now().toString(36) + Math.random().toString(36).substr(2,4);
            const seg = { id: segId, type, title, date, time, endTime, details, confirmationNumber: conf, documentIds: [] };
            if (docFile) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const docId = Date.now().toString(36) + Math.random().toString(36).substr(2,4);
                    evt.itinerary.documents.push({ id: docId, name: docFile.name, dataUrl: ev.target.result });
                    seg.documentIds.push(docId);
                    evt.itinerary.segments.push(seg);
                    saveData();
                    document.getElementById('itinModal') && document.getElementById('itinModal').remove();
                    openTripItinerary(eventId);
                    showToast('Segment added with document');
                };
                reader.readAsDataURL(docFile);
            } else {
                evt.itinerary.segments.push(seg);
                saveData();
                document.getElementById('itinModal') && document.getElementById('itinModal').remove();
                openTripItinerary(eventId);
                showToast('Segment added');
            }
        }

        function removeItinSegment(eventId, segId) {
            const evt = events.find(function(e){return e.id===eventId;});
            if (!evt||!evt.itinerary) return;
            evt.itinerary.segments = evt.itinerary.segments.filter(function(s){return s.id!==segId;});
            saveData();
            document.getElementById('itinModal') && document.getElementById('itinModal').remove();
            openTripItinerary(eventId);
        }

        function viewItinDoc(eventId, docId) {
            const evt = events.find(function(e){return e.id===eventId;});
            if (!evt||!evt.itinerary) return;
            const doc = evt.itinerary.documents.find(function(d){return d.id===docId;});
            if (!doc) return;
            const w = window.open('','_blank');
            if (w) w.document.write('<html><body style="margin:0;"><img src="' + doc.dataUrl + '" style="max-width:100%;" onerror="this.style.display=\'none\'"><iframe src="' + doc.dataUrl + '" style="width:100%;height:100vh;border:none;"></iframe></body></html>');
        }

        function removeItinDoc(eventId, docId) {
            const evt = events.find(function(e){return e.id===eventId;});
            if (!evt||!evt.itinerary) return;
            evt.itinerary.documents = evt.itinerary.documents.filter(function(d){return d.id!==docId;});
            evt.itinerary.segments.forEach(function(s) { s.documentIds = (s.documentIds||[]).filter(function(id){return id!==docId;}); });
            saveData();
            document.getElementById('itinModal') && document.getElementById('itinModal').remove();
            openTripItinerary(eventId);
            showToast('Document removed');
        }

        function renderMyDay() {
            const container = document.getElementById('mydayView');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

                }
            });

        function renderMyWeek() {
            const container = document.getElementById('myweekView');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = today.toISOString().split('T')[0];

            // Week start: Monday
            const weekStart = new Date(today);
            const dow = weekStart.getDay();
            weekStart.setDate(weekStart.getDate() + (dow === 0 ? -6 : 1 - dow) + (myWeekOffset * 7));
            const weekEnd = new Date(weekStart.getTime() + 6 * 86400000);
            const weekEndWork = new Date(weekStart.getTime() + 4 * 86400000);
            const isCurrentWeek = myWeekOffset === 0;
            const weekStartStr = weekStart.toISOString().split('T')[0];
            const weekEndStr = weekEnd.toISOString().split('T')[0];

            // Build Mon-Sun day data (7 days)
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(weekStart.getTime() + i * 86400000);
                const dStr = d.toISOString().split('T')[0];
                const isToday = dStr === todayStr;
                const isPast = d < today;
                const isWeekend = i >= 5;
                let due = getFilteredItems().filter(item => {
                    if (item.type === 'habit') return false;
                    if (!item.dueDate) return false;
                    const dd = new Date(item.dueDate); dd.setHours(0,0,0,0);
                    if (dd.getTime() !== d.getTime()) return false;
                    if (weekPersonFilter && !((item.assignees||[]).includes(weekPersonFilter) || (item.raci?.R||[]).includes(weekPersonFilter))) return false;
                    return true;
                });
                const totalMins = due.reduce((s, i) => s + (parseInt(i.timeEstimate) || 0), 0);
                const evts = getEventsForDate(dStr);
                days.push({ d, dStr, isToday, isPast, isWeekend, due, totalMins, evts });
            }

            // Overdue: dueDate before this week, not done, not habit
            const overdue = getFilteredItems().filter(item => {
                if (item.type === 'habit' || item.status === 'done') return false;
                if (!item.dueDate || item.dueDate >= weekStartStr) return false;
                if (weekPersonFilter && !((item.assignees||[]).includes(weekPersonFilter) || (item.raci?.R||[]).includes(weekPersonFilter))) return false;
                return true;
            });

            // Unscheduled: thisweek status, no day assigned this week
            const unscheduled = getFilteredItems().filter(item => {
                if (item.type === 'habit') return false;
                if (item.status !== 'thisweek') return false;
                if (weekPersonFilter && !((item.assignees||[]).includes(weekPersonFilter) || (item.raci?.R||[]).includes(weekPersonFilter))) return false;
                if (!item.dueDate) return true;
                const dd = new Date(item.dueDate); dd.setHours(0,0,0,0);
                return dd < weekStart || dd > weekEndWork;
            });

            const allDue = days.flatMap(d => d.due);
            const allDone = allDue.filter(i => i.status === 'done');
            const weekMins = days.reduce((s, d) => s + d.totalMins, 0);
            const weekHrsLabel = weekMins >= 60 ? (weekMins/60).toFixed(1) + 'h' : weekMins > 0 ? weekMins + 'm' : '—';
            const weekEvts = days.flatMap(d => d.evts);
            const catColors = { ACST:'var(--acst)', DVLMNT:'var(--dvlmnt)', Personal:'var(--personal)', 'Phone Call':'var(--phone)', 'Book Meeting':'var(--meeting)' };

            let html = '<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">';

            // ── TOP BAR ──────────────────────────────────────────────────────────────
            const wkLabel = isCurrentWeek ? 'This Week'
                : weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' \u2013 ' + weekEndWork.toLocaleDateString('en-US',{month:'short',day:'numeric'});
            html += '<div style="padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;flex-shrink:0;">' +
                '<div style="display:flex;align-items:center;gap:10px;">' +
                    '<button class="btn" onclick="myWeekOffset--;renderMyWeek();" style="padding:5px 12px;">\u2190 Prev</button>' +
                    '<div style="font-size:14px;font-weight:700;min-width:140px;text-align:center;">' + wkLabel + '</div>' +
                    '<button class="btn" onclick="myWeekOffset++;renderMyWeek();" style="padding:5px 12px;">Next \u2192</button>' +
                    (myWeekOffset !== 0 ? '<button class="btn" onclick="myWeekOffset=0;renderMyWeek();" style="padding:5px 10px;font-size:11px;background:var(--accent);color:white;border-color:var(--accent);">Today</button>' : '') +
                    '<button class="btn" onclick="printMyWeek()" style="padding:5px 10px;font-size:11px;">\uD83D\uDDA8\uFE0F Print Week</button>' +
                    '<button class="btn" onclick="toggleTimeBlockMode()" style="padding:5px 10px;font-size:11px;' + (_timeBlockMode ? 'background:var(--accent);color:white;border-color:var(--accent);' : '') + '">\u23F1 Time Block</button>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:20px;">' +
                    '<div style="text-align:center;"><div style="font-size:16px;font-weight:800;">' + allDue.length + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">Scheduled</div></div>' +
                    '<div style="text-align:center;"><div style="font-size:16px;font-weight:800;color:var(--success);">' + allDone.length + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">Done</div></div>' +
                    '<div style="text-align:center;"><div style="font-size:16px;font-weight:800;color:var(--accent);">' + weekHrsLabel + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">Est. Time</div></div>' +
                    '<div style="text-align:center;"><div style="font-size:16px;font-weight:800;color:#8B5CF6;">' + weekEvts.length + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">Events</div></div>' +
                '</div>' +
            '</div>';

            // ── PERSON FILTER BAR ────────────────────────────────────────────────────
            const allPeople = getAllAssignees();
            const teamColorMap = { ACST: 'var(--acst)', DVLMNT: 'var(--dvlmnt)', Personal: 'var(--personal)' };
            const peopleByTeam = {};
            ['ACST','DVLMNT','Personal','Other'].forEach(t => peopleByTeam[t] = []);
            allPeople.forEach(p => {
                for (const team of Object.keys(teams)) {
                    if (teams[team].includes(p)) { peopleByTeam[team].push(p); return; }
                }
                peopleByTeam.Other.push(p);
            });
            html += '<div style="padding:6px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;">';
            html += '<button style="padding:3px 10px;border-radius:14px;border:1px solid ' + (weekPersonFilter===''?'var(--accent)':'var(--border)') + ';background:' + (weekPersonFilter===''?'var(--accent)':'transparent') + ';color:' + (weekPersonFilter===''?'#fff':'var(--text-2)') + ';font-size:10px;font-weight:600;cursor:pointer;" onclick="weekPersonFilter=\'\';renderMyWeek();">All</button>';
            Object.keys(peopleByTeam).forEach(team => {
                peopleByTeam[team].forEach(person => {
                    const isActive = weekPersonFilter === person;
                    const tc = teamColorMap[team] || 'var(--text-3)';
                    html += '<button style="padding:3px 10px;border-radius:14px;border:1px solid ' + (isActive?tc:'var(--border)') + ';background:' + (isActive?tc+'20':'transparent') + ';color:' + (isActive?tc:'var(--text-2)') + ';font-size:10px;font-weight:600;cursor:pointer;" onclick="weekPersonFilter=weekPersonFilter===\'' + person + '\'?\'\':' + '\'' + person + '\'' + ';renderMyWeek();">' + person + '</button>';
                });
            });
            html += '</div>';

            // ── ALERTS ROW ───────────────────────────────────────────────────────────
            if (overdue.length > 0 || unscheduled.length > 0) {
                html += '<div style="padding:7px 20px;background:var(--acst-subtle);border-bottom:1px solid rgba(220,38,38,0.25);display:flex;align-items:center;gap:16px;flex-shrink:0;flex-wrap:wrap;">';
                if (overdue.length > 0) {
                    html += '<div style="display:flex;align-items:center;gap:6px;">' +
                        '<span style="font-size:11px;font-weight:700;color:#DC2626;">\u26A0\uFE0F ' + overdue.length + ' overdue \u2014 needs attention</span>' +
                        '<div style="display:flex;gap:4px;flex-wrap:wrap;">';
                    overdue.slice(0,3).forEach(item => {
                        html += '<span style="font-size:10px;background:var(--acst-subtle);color:var(--acst);padding:1px 8px;border-radius:10px;cursor:pointer;border:1px solid rgba(220,38,38,0.25);" onclick="openDetail(\'' + item.id + '\')">' + (item.title.length > 22 ? item.title.substring(0,22) + '\u2026' : item.title) + '</span>';
                    });
                    if (overdue.length > 3) html += '<span style="font-size:10px;color:#DC2626;padding:1px 4px;">+' + (overdue.length-3) + ' more</span>';
                    html += '</div></div>';
                }
                if (unscheduled.length > 0) {
                    html += '<span style="font-size:10px;color:var(--text-3);">\uD83D\uDCCB ' + unscheduled.length + ' unscheduled \u2014 drag to a day to plan</span>';
                }
                html += '</div>';
            }

            // ── MAIN GRID ─────────────────────────────────────────────────────────────
            const hasSatSun = days[5].due.length > 0 || days[5].evts.length > 0 || days[6].due.length > 0 || days[6].evts.length > 0;
            const colDef = (hasSatSun ? '180px 1fr 1fr 1fr 1fr 1fr 80px 80px' : '180px 1fr 1fr 1fr 1fr 1fr');
            html += '<div style="display:grid;grid-template-columns:' + colDef + ';flex:1;overflow:hidden;min-height:0;">';

            // Unscheduled column
            html += '<div style="border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface-2);">' +
                '<div style="padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;">' +
                    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">This Week</div>' +
                    '<div style="font-size:11px;font-weight:600;color:var(--text);margin-top:2px;">' + unscheduled.length + ' to plan</div>' +
                '</div>' +
                '<div style="flex:1;padding:8px;overflow-y:auto;">';
            if (unscheduled.length > 0) {
                unscheduled.forEach(item => {
                    const isDone = item.status === 'done';
                    const dotColor = catColors[item.category] || 'var(--text-3)';
                    const tEst = item.timeEstimate ? (parseInt(item.timeEstimate) >= 60 ? (parseInt(item.timeEstimate)/60).toFixed(1)+'h' : item.timeEstimate+'m') : '';
                    html += '<div draggable="true" ondragstart="event.dataTransfer.setData(\'text/plain\',\'' + item.id + '\')" style="padding:6px 8px;border-radius:6px;margin-bottom:5px;background:var(--surface);border:1px solid var(--border);border-left:3px solid ' + dotColor + ';cursor:move;user-select:none;">' +
                        '<div style="font-size:11px;font-weight:500;color:' + (isDone?'var(--text-3)':'var(--text)') + ';overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;text-decoration:' + (isDone?'line-through':'none') + ';" onclick="openDetail(\'' + item.id + '\')">' + item.title + '</div>' +
                        '<div style="display:flex;gap:4px;margin-top:2px;">' +
                            (item.assignees&&item.assignees.length > 0 ? '<span style="font-size:9px;color:var(--text-3);">' + item.assignees[0] + '</span>' : '') +
                            (tEst ? '<span style="font-size:9px;background:var(--accent-subtle);color:var(--accent);padding:1px 4px;border-radius:3px;">' + tEst + '</span>' : '') +
                        '</div>' +
                    '</div>';
                });
            } else {
                html += '<div style="padding:20px 8px;text-align:center;color:var(--text-3);font-size:11px;">\u2713 All assigned</div>';
            }
            html += '</div></div>';

            // Day columns
            const dayCount = hasSatSun ? 7 : 5;
            days.slice(0, dayCount).forEach(({ d, dStr, isToday, isPast, isWeekend, due, totalMins, evts }) => {
                const dayShort = d.toLocaleDateString('en-US',{weekday:'short'});
                const dateNum = d.getDate();
                const monthShort = d.toLocaleDateString('en-US',{month:'short'});
                const doneCount = due.filter(i => i.status === 'done').length;
                const timeLbl = totalMins >= 60 ? (totalMins/60).toFixed(1)+'h' : totalMins > 0 ? totalMins+'m' : '';
                const isFirst = d.getDate() === 1;

                const hdrBg = isToday ? 'var(--accent)' : 'var(--surface)';
                const hdrTxt = isToday ? 'var(--bg)' : 'var(--text)';
                const hdrSub = isToday ? 'var(--bg)' : 'var(--text-3)';
                const colBg = isToday ? 'var(--surface)' : isWeekend ? 'var(--surface-2)' : 'var(--surface)';

                html += '<div style="border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:' + colBg + ';">' +
                    '<div style="padding:8px 10px;border-bottom:1px solid var(--border);background:' + hdrBg + ';flex-shrink:0;">' +
                        '<div style="display:flex;align-items:baseline;gap:5px;">' +
                            '<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:' + hdrSub + ';">' + dayShort + '</span>' +
                            '<span style="font-size:22px;font-weight:800;line-height:1;color:' + hdrTxt + ';">' + dateNum + '</span>' +
                            (isFirst ? '<span style="font-size:9px;color:' + hdrSub + ';">' + monthShort + '</span>' : '') +
                        '</div>' +
                        (due.length > 0 || evts.length > 0 ?
                            '<div style="display:flex;align-items:center;gap:5px;margin-top:4px;">' +
                                (due.length > 0 ? '<div style="flex:1;height:2px;background:' + (isToday?'rgba(255,255,255,.2)':'var(--border)') + ';border-radius:2px;overflow:hidden;">' +
                                    '<div style="height:100%;width:' + (due.length > 0 ? Math.round(doneCount/due.length*100) : 0) + '%;background:' + (isToday?'rgba(255,255,255,.9)':'var(--success)') + ';border-radius:2px;"></div>' +
                                '</div>' : '') +
                                (due.length > 0 ? '<span style="font-size:8px;font-weight:600;color:' + hdrSub + ';">' + doneCount + '/' + due.length + '</span>' : '') +
                                (timeLbl ? '<span style="font-size:8px;font-weight:600;color:' + hdrSub + ';">' + timeLbl + '</span>' : '') +
                                (evts.length > 0 ? '<span style="font-size:8px;color:' + hdrSub + ';">\uD83D\uDCC5' + evts.length + '</span>' : '') +
                            '</div>'
                        : '') +
                    '</div>' +
                    (_timeBlockMode ? '' : '<div style="flex:1;padding:6px;overflow-y:auto;" ondragover="event.preventDefault();this.classList.add(\'week-col-drag-over\')" ondragleave="this.classList.remove(\'week-col-drag-over\')" ondrop="weekDragDrop(event,\'' + dStr + '\')">');

                // Events first
                evts.forEach(function(wEvt) {
                    const ec = evtColorFn(wEvt);
                    const isTrip = wEvt.category === 'trip';
                    const wOnclk = isTrip ? ('openTripItinerary(\'' + wEvt.id + '\')') : ('openEventModal(\'' + wEvt.id + '\',\'' + dStr + '\')');
                    const tStr = wEvt.startTime ? wEvt.startTime + (wEvt.endTime ? '\u2013' + wEvt.endTime : '') : '';
                    html += '<div style="padding:3px 7px;border-radius:5px;margin-bottom:4px;background:' + ec + ';color:white;font-size:10px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;" onclick="event.stopPropagation();' + wOnclk + '" title="' + wEvt.title + '">' +
                        (isTrip ? '\u2708\uFE0F ' : '') +
                        (tStr ? '<span style="opacity:.8;font-weight:400;font-size:9px;">' + tStr + ' </span>' : '') +
                        '<span style="font-weight:600;">' + wEvt.title + '</span>' +
                    '</div>';
                });

                // Task cards
                due.forEach(item => {
                    const isDone = item.status === 'done';
                    const dotColor = catColors[item.category] || 'var(--text-3)';
                    const tEst = item.timeEstimate ? (parseInt(item.timeEstimate) >= 60 ? (parseInt(item.timeEstimate)/60).toFixed(1)+'h' : item.timeEstimate+'m') : '';
                    html += '<div draggable="true" ondragstart="event.dataTransfer.setData(\'text/plain\',\'' + item.id + '\')" style="padding:5px 7px;border-radius:6px;margin-bottom:4px;background:' + (isDone?'var(--surface-2)':'var(--surface)') + ';border:1px solid var(--border);border-left:3px solid ' + dotColor + ';cursor:move;user-select:none;">' +
                        '<div style="font-size:11px;font-weight:' + (isDone?'400':'500') + ';color:' + (isDone?'var(--text-3)':'var(--text)') + ';text-decoration:' + (isDone?'line-through':'none') + ';overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;" onclick="openDetail(\'' + item.id + '\')">' + item.title + '</div>' +
                        (item.assignees&&item.assignees.length>0 || tEst ?
                            '<div style="display:flex;gap:4px;margin-top:2px;align-items:center;">' +
                                (item.assignees&&item.assignees.length > 0 ? '<span style="font-size:9px;color:var(--text-3);">' + item.assignees[0] + (item.assignees.length>1?'+'+( item.assignees.length-1):'') + '</span>' : '') +
                                (tEst ? '<span style="font-size:9px;background:var(--accent-subtle);color:var(--accent);padding:1px 4px;border-radius:3px;margin-left:auto;">' + tEst + '</span>' : '') +
                            '</div>' : '') +
                    '</div>';
                });

                if (due.length === 0 && evts.length === 0) {
                    html += '<div style="height:100%;display:flex;align-items:center;justify-content:center;">' +
                        '<div style="text-align:center;color:var(--text-3);font-size:10px;">' + (isWeekend ? 'Weekend' : isPast && !isToday ? '\u2014' : 'Free day') + '</div>' +
                    '</div>';
                }

                if (_timeBlockMode) {
                    html += renderTimeBlockedDay(dStr, due, evts, isToday);
                }
                html += (_timeBlockMode ? '' : '</div>') + '</div>';
            });

            html += '</div></div>';
            container.innerHTML = html;

            if (isCurrentWeek) generateWeekBrief();
        }

        function weekDragDrop(event, dStr) {
            event.preventDefault();
            event.stopPropagation();
            const itemId = event.dataTransfer.getData('text/plain');
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            item.dueDate = dStr;
            item.status = 'thisweek';
            saveData();
            renderMyWeek();
        }

        function createNewPerson() {
            const name = document.getElementById('npName')?.value?.trim();
            const teamSelected = document.getElementById('npTeam')?.value || 'Personal';
            const role = document.getElementById('npRole')?.value?.trim() || '';
            const email = document.getElementById('npEmail')?.value?.trim() || '';
            const phone = document.getElementById('npPhone')?.value?.trim() || '';

            if (!name) {
                showToast('Name is required');
                return;
            }

            // Add to team if not already present
            if (!teams[teamSelected].includes(name)) {
                teams[teamSelected].push(name);
            }

            // Store profile
            if (!peopleProfiles) peopleProfiles = {};
            peopleProfiles[name] = { role, email, phone, team: teamSelected };

            saveData();
            closeModal();
            renderAssignees();
            showToast(name + ' added to ' + teamSelected);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // RENDERING — ASSIGNEES
        // ═══════════════════════════════════════════════════════════════════════════
        function renderAssignees() {
            const container = document.getElementById('assigneesView');
            const activeItems = items.filter(i => i.type !== 'habit' && i.status !== 'done');

            let html = `<div style="padding: 24px; max-width: 1400px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <h2>People</h2>
                    <div style="display:flex;gap:8px;">
                        <button class="btn" onclick="openNewPersonModal()" style="font-size:12px;">+ Add Person</button>
                        <button class="btn" onclick="showTeamAvatarSetup()" style="font-size:12px;">📷 Manage Team Photos</button>
                    </div>
                </div>`;

            // Iterate through teams
            Object.entries(teams).forEach(([teamName, teamMembers]) => {
                html += `<div style="margin-bottom: 32px;">
                    <div style="font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);">${teamName}</div>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(500px, 1fr));gap:16px;">`;

                teamMembers.forEach(person => {
                    const stats = getPersonRaciStats(person);
                    const personResponsible = items.filter(i => i.type !== 'habit' && (i.responsible === person || (i.raci?.R || []).includes(person))).length;
                    const personTimeEstimate = items.filter(i => i.type !== 'habit' && (i.responsible === person || (i.raci?.R || []).includes(person))).reduce((s, i) => s + (i.timeEstimate || 0), 0);
                    const personTimelineItems = items.filter(i => i.type !== 'habit' && i.timeline && i.timeline.some(t => t.author === person)).slice(-3);
                    const isLevi = person === 'Levi';
                    const profile = peopleProfiles?.[person] || {};

                    // Get active items for this person (R or assignee)
                    const personActive = items.filter(item =>

                            </div>

                        ${personActive.length > 0 ? `<div style="margin-bottom:12px;padding:8px;background:var(--surface-2);border-radius:var(--radius-sm);">

                            ${personActive.map(item => `<div style="font-size:11px;color:var(--text-2);margin-bottom:4px;display:flex;align-items:center;gap:4px;">
                                <span style="width:4px;height:4px;border-radius:50%;background:var(--accent);"></span>

                        <div style="margin-bottom:12px;">

                            <div style="display:flex;gap:8px;height:20px;border-radius:4px;overflow:hidden;background:var(--surface-2);">
                                ${stats.R > 0 ? `<div style="flex:${stats.R};background:#22C55E;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:600;" title="Responsible">R${stats.R > 1 ? stats.R : ''}</div>` : ''}
                                ${stats.A > 0 ? `<div style="flex:${stats.A};background:#5E6AD2;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:600;" title="Approver">A${stats.A > 1 ? stats.A : ''}</div>` : ''}
                                ${stats.C > 0 ? `<div style="flex:${stats.C};background:#F59E0B;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:600;" title="Involved">C${stats.C > 1 ? stats.C : ''}</div>` : ''}
                                ${stats.I > 0 ? `<div style="flex:${stats.I};background:#94A3B8;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:600;" title="Informed">I${stats.I > 1 ? stats.I : ''}</div>` : ''}
                            </div>
                        </div>

                        <div style="margin-bottom:12px;padding:8px;background:var(--surface-2);border-radius:var(--radius-sm);">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                                <div style="font-size:10px;font-weight:600;color:var(--text-3);">Capacity This Week</div>
                                <button onclick="editPersonField('${person}','hoursPerWeek')" style="font-size:9px;background:none;border:none;color:var(--text-3);cursor:pointer;">edit</button>
                            </div>
                            ${profile.trackCapacity !== false ? `
                                <div style="font-size:12px;font-weight:600;">${personTimeEstimate}h / ${profile.hoursPerWeek||40}h</div>
                                <div style="width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;">
                                    <div style="height:100%;width:${Math.min(100,Math.round(personTimeEstimate/(profile.hoursPerWeek||40)*100))}%;background:${personTimeEstimate>(profile.hoursPerWeek||40)?'var(--danger)':personTimeEstimate/(profile.hoursPerWeek||40)>.7?'var(--warn)':'var(--success)'};border-radius:2px;"></div>
                                </div>
                            ` : `
                                <div style="font-size:11px;color:var(--text-3);">Capacity tracking off</div>
                            `}
                            <label style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-3);cursor:pointer;margin-top:4px;">
                                <input type="checkbox" ${profile.trackCapacity !== false ? 'checked' : ''} onchange="savePersonField('${person}','trackCapacity',this.checked);renderAssignees();" style="accent-color:var(--accent);width:12px;height:12px;">

                        </div>

                        <div style="margin-bottom:12px;">

                            <textarea onblur="savePersonField('${person}','profileNotes',this.value)" style="width:100%;font-size:11px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px;resize:vertical;min-height:40px;font-family:inherit;" placeholder="Notes about this person...">${profile.profileNotes||''}</textarea>
                        </div>

                        <div style="margin-bottom:12px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">

                                <button onclick="addMeetingNote('${person}')" style="font-size:9px;background:var(--accent);color:white;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;">+ Add</button>
                            </div>
                            ${(profile.meetingNotes||[]).slice().reverse().slice(0,5).map(mn => {
                                const actions = mn.actionItems || [];
                                const actionHtml = actions.map(a => {

                                    return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);">' +
                                        '<input type="checkbox"' + (isDone?' checked':'') + ' onchange="toggleActionItemDone(\'' + person + '\',\'' + mn.id + '\',\'' + a.id + '\')" style="accent-color:var(--success);width:13px;height:13px;cursor:pointer;flex-shrink:0;">' +

                                        (linkedTask ? '<span style="font-size:9px;padding:1px 5px;border-radius:10px;background:' + (linkedTask.status==='done'?'var(--dvlmnt-subtle)':'var(--personal-subtle)') + ';color:' + (linkedTask.status==='done'?'var(--dvlmnt)':'var(--personal)') + ';">' + linkedTask.status + '</span>' :

                                return '<div style="font-size:11px;padding:8px 10px;background:var(--surface-2);border-radius:var(--radius-xs);margin-bottom:6px;border-left:2px solid var(--border-2);">' +

                                    (actions.length ? '<div style="border-top:1px solid var(--border);padding-top:4px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:3px;">Action Items</div>' + actionHtml + '</div>' : '') +
                                '</div>';
                            }).join('')}
                            ${(profile.meetingNotes||[]).length === 0 ? '<div style="font-size:11px;color:var(--text-3);">No meeting notes yet</div>' : ''}
                        </div>

                        <div>
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">

                                <button onclick="addPersonResource('${person}')" style="font-size:9px;background:var(--accent);color:white;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;">+ Add</button>
                            </div>
                            ${(profile.resources||[]).map(r => '<div style="font-size:11px;display:flex;align-items:center;gap:6px;padding:4px 0;"><span style="font-size:13px;">🔗</span><a href="' + r.url + '" target="_blank" style="color:var(--accent);text-decoration:none;flex:1;">' + (r.title||r.url) + '</a>' + (r.fromProject ? '<span style="font-size:9px;color:var(--text-3);">' + r.fromProject + '</span>' : '') + '</div>').join('')}
                            ${(profile.resources||[]).length === 0 ? '<div style="font-size:11px;color:var(--text-3);">No resources yet</div>' : ''}
                        </div>

                        ${personTimelineItems.length > 0 ? `<div>
                            <div style="font-size:10px;font-weight:600;color:var(--text-3);margin-bottom:6px;">Recent Activity</div>

                                <span style="color:var(--text-3);">→</span> ${item.title.length > 40 ? item.title.substring(0, 40) + '…' : item.title}
                            </div>`).join('')}
                        </div>` : ''}
                    </div>`;
                });

                html += `</div></div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // RENDERING — GOALS
        // ═══════════════════════════════════════════════════════════════════════════
        function renderGoals() {
            const container = document.getElementById('goalsView');
            const sorted = goals.slice().sort((a, b) => (a.priority || 0) - (b.priority || 0));
            const _isDark = document.documentElement.dataset.theme === 'dark';

            // Priority tier visual config
            const tierConfig = [
                { label: '🏆 Primary Focus', rankBg: '#0A0A0A', rankColor: '#FFFFFF', cardBorderLeft: '4px solid #0A0A0A', headerBg: '#0A0A0A', headerColor: 'rgba(255,255,255,0.9)', rankSize: '52px', titleSize: '18px', accentBar: '#16A34A', pillBg: 'rgba(0,0,0,0.07)', pillColor: '#0A0A0A', shadow: '0 6px 24px rgba(0,0,0,0.12)' },
                { label: '🎯 High Priority',  rankBg: '#1E40AF', rankColor: '#FFFFFF', cardBorderLeft: '4px solid #2563EB', headerBg: _isDark?'#1A2744':'#BFDBFE', headerColor: _isDark?'#93C5FD':'#1E3A8A', rankSize: '44px', titleSize: '16px', accentBar: '#2563EB', pillBg: _isDark?'#1A2744':'#BFDBFE', pillColor: _isDark?'#93C5FD':'#1E3A8A', shadow: '0 3px 12px rgba(37,99,235,0.10)' },
                { label: '📌 In Play',         rankBg: '#065F46', rankColor: '#FFFFFF', cardBorderLeft: '4px solid #059669', headerBg: _isDark?'#0F2A1E':'var(--dvlmnt-subtle)', headerColor: _isDark?'#6EE7B7':'#064E3B', rankSize: '38px', titleSize: '14px', accentBar: '#059669', pillBg: _isDark?'#0F2A1E':'var(--dvlmnt-subtle)', pillColor: _isDark?'#6EE7B7':'#064E3B', shadow: '0 2px 8px rgba(5,150,105,0.08)' },
                { label: 'Queued',              rankBg: '#6B7280', rankColor: '#FFFFFF', cardBorderLeft: '4px solid #D1D5DB', headerBg: _isDark?'var(--surface-2)':'#F9FAFB', headerColor: _isDark?'var(--text-3)':'#6B7280', rankSize: '32px', titleSize: '13px', accentBar: '#9CA3AF', pillBg: _isDark?'var(--surface-2)':'#F3F4F6', pillColor: _isDark?'var(--text-3)':'#6B7280', shadow: 'none' },
            ];

            let html = `<div style="padding:24px 28px;max-width:900px;">
                <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;">
                    <div>
                        <h2 style="margin:0 0 4px 0;">Goals</h2>
                        <div style="font-size:12px;color:var(--text-3);">Ranked by priority · Drag to reorder</div>
                    </div>
                    <button class="btn btn-primary" onclick="openNewGoalModal()">+ New Goal</button>
                </div>`;

            sorted.forEach((goal, idx) => {
                const linked = items.filter(i => (i.goalIds || []).includes(goal.id));
                const activeItems = linked.filter(i => ['active', 'today'].includes(i.status));
                const thisWeekItems = linked.filter(i => i.status === 'thisweek');
                const doneItems = linked.filter(i => i.status === 'done').sort((a, b) => new Date(b.dueDate) - new Date(a.dueDate));

                const linkedDoneItems = linked.filter(i => i.status === 'done');
                const totalLinkedWeight = linked.reduce((s, i) => s + getItemProgress(i).total, 0);
                const doneLinkedWeight = linkedDoneItems.reduce((s, i) => s + getItemProgress(i).total, 0) + linked.filter(i => i.status !== 'done').reduce((s, i) => { const p = getItemProgress(i); return s + (p.pct === 100 ? p.total : 0); }, 0);
                const progressPct = totalLinkedWeight > 0 ? Math.round(doneLinkedWeight/totalLinkedWeight*100) : (linked.length > 0 ? Math.round(linkedDoneItems.length/linked.length*100) : 0);

                const tier = tierConfig[Math.min(idx, tierConfig.length - 1)];
                const rank = idx + 1;

                // Calculate insights
                const totalItems = linked.length;
                const doneCount = doneItems.length;
                const overdueItems = linked.filter(i => i.dueDate && new Date(i.dueDate) < new Date() && i.status !== 'done').length;
                const timeRemaining = goal.targetDate ? Math.ceil((new Date(goal.targetDate) - new Date()) / (1000 * 60 * 60 * 24)) : null;
                const timeLeft = timeRemaining && timeRemaining > 0 ? Math.ceil(timeRemaining / 7) : null;

                let insight = '';
                if (totalItems > 0) {
                    if (overdueItems > 0) {
                        insight = `${doneCount}/${totalItems} done · ⚠️ ${overdueItems} overdue`;
                    } else if (progressPct === 100) {
                        insight = `✅ All tasks complete!`;
                    } else if (progressPct >= 75) {
                        insight = `On track · ${progressPct}% done${timeLeft ? ` · ${timeLeft}w left` : ''}`;
                    } else if (progressPct >= 50) {
                        insight = `Halfway · ${progressPct}% done${timeLeft ? ` · ${timeLeft}w left` : ''}`;
                    } else {
                        insight = `${doneCount}/${totalItems} tasks done${timeLeft ? ` · ${timeLeft}w left` : ''}`;
                    }
                }

                const progressBarColor = overdueItems > 0 ? 'var(--danger)' : tier.accentBar;
                const marginBottom = idx === 0 ? '24px' : '14px';

                html += `<div class="goal-card" style="border-radius:10px;margin-bottom:${marginBottom};overflow:hidden;border:1px solid var(--border);${tier.cardBorderLeft ? 'border-left:' + tier.cardBorderLeft + ';' : ''}box-shadow:${tier.shadow};background:var(--surface);" draggable="true" ondragstart="goalDragStart(event,'${goal.id}')" ondragend="goalDragEnd(event)" ondrop="goalDrop(event,'${goal.id}')" ondragover="goalDragOver(event)">

                    <!-- Header Band -->
                    <div style="background:${tier.headerBg};padding:8px 16px 8px 0;display:flex;align-items:center;justify-content:space-between;">
                        <div style="display:flex;align-items:center;gap:0;">
                            <!-- Rank Slab -->
                            <div style="display:flex;align-items:center;justify-content:center;width:${idx===0?'88px':'72px'};height:${idx===0?'48px':'40px'};background:${tier.rankBg};cursor:grab;flex-shrink:0;">
                                <span style="font-family:'Syne',sans-serif;font-size:${tier.rankSize};font-weight:800;color:${tier.rankColor};line-height:1;">#${rank}</span>
                            </div>
                            <div style="padding-left:14px;">
                                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:${tier.headerColor};opacity:0.8;margin-bottom:1px;">${tier.label}</div>
                                ${goal.category ? `<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px;background:${goal.category==='ACST'?'var(--acst-subtle)':goal.category==='DVLMNT'?'var(--dvlmnt-subtle)':'var(--personal-subtle)'};color:${goal.category==='ACST'?'var(--acst)':goal.category==='DVLMNT'?'var(--dvlmnt)':'var(--personal)'};">${goal.category}</span>` : ''}
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            ${goal.targetDate ? `<span style="font-size:10px;color:${tier.headerColor};opacity:0.7;font-weight:600;">📅 ${formatDate(goal.targetDate)}</span>` : ''}
                            <button onclick="deleteGoal('${goal.id}')" style="background:none;border:none;color:${tier.headerColor};opacity:0.4;font-size:14px;cursor:pointer;padding:2px 8px;border-radius:4px;transition:opacity .15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">✕</button>
                        </div>
                    </div>

                    <!-- Body -->
                    <div style="padding:${idx===0?'18px 20px':'14px 20px'};">
                        <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:${totalItems>0?'12px':'8px'};">
                            <div style="flex:1;">
                                <div style="font-family:'Syne',sans-serif;font-size:${tier.titleSize};font-weight:700;color:var(--text);cursor:pointer;margin-bottom:${goal.description?'4px':'0'};line-height:1.35;" onclick="openGoalDetail('${goal.id}')">${goal.title}</div>
                                ${goal.description ? `<div style="font-size:12px;color:var(--text-3);line-height:1.5;">${goal.description}</div>` : ''}
                            </div>
                            ${totalItems > 0 ? `<div style="flex-shrink:0;text-align:right;min-width:60px;">
                                <div style="font-family:'Syne',sans-serif;font-size:${idx===0?'30px':'22px'};font-weight:800;color:${progressBarColor};line-height:1;">${progressPct}%</div>
                                <div style="font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;">done</div>
                            </div>` : ''}
                        </div>

                        ${totalItems > 0 ? `<div style="margin-bottom:10px;">
                            <div style="height:${idx===0?'8px':'5px'};background:var(--surface-2);border-radius:4px;overflow:hidden;margin-bottom:5px;">
                                <div style="height:100%;width:${progressPct}%;background:${progressBarColor};transition:width .4s ease;border-radius:4px;"></div>
                            </div>
                            ${insight ? `<div style="font-size:11px;color:${overdueItems>0?'var(--danger)':'var(--text-3)'};">${insight}</div>` : ''}
                        </div>` : `<div style="font-size:11px;color:var(--text-3);margin-bottom:10px;font-style:italic;">No tasks linked yet · open goal to link tasks</div>`}

                        ${activeItems.length > 0 || thisWeekItems.length > 0 ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
                            ${activeItems.slice(0, 4).map(item => `<div style="display:inline-flex;align-items:center;gap:4px;background:${tier.pillBg};border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;color:${tier.pillColor};">
                                <span style="width:5px;height:5px;border-radius:50%;background:${tier.accentBar};flex-shrink:0;"></span>
                                ${item.title.length > 30 ? item.title.substring(0, 30) + '…' : item.title}
                            </div>`).join('')}
                            ${thisWeekItems.slice(0, 2).map(item => `<div style="display:inline-flex;align-items:center;gap:4px;background:var(--surface-2);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text-3);">
                                ${item.title.length > 30 ? item.title.substring(0, 30) + '…' : item.title}
                            </div>`).join('')}
                            ${(activeItems.length + thisWeekItems.length) > 6 ? `<div style="font-size:11px;color:var(--text-3);padding:3px 4px;">+${(activeItems.length + thisWeekItems.length) - 6} more</div>` : ''}
                        </div>` : ''}

                        <!-- Footer -->
                        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:12px;border-top:1px solid var(--border);padding-top:10px;">
                            ${goal.startDate ? `<span style="font-size:10px;color:var(--text-3);">Start: ${goal.startDate}</span>` : ''}
                            ${goal.targetDate ? `<span style="font-size:10px;color:var(--text-3);">Due: ${goal.targetDate}</span>` : ''}
                            ${totalItems > 0 ? `<span style="font-size:10px;font-weight:600;color:${progressPct===100?'var(--success)':overdueItems>0?'var(--danger)':'var(--text-3)'};">${doneCount}/${totalItems} tasks · ${progressPct}%</span>` : '<span style="font-size:10px;color:var(--text-3);font-style:italic;">No tasks linked</span>'}
                            ${goal.updates && goal.updates.length > 0 ? `<span style="font-size:10px;color:var(--text-3);">${goal.updates.length} update${goal.updates.length>1?'s':''}</span>` : ''}
                            <button onclick="openGoalDetail('${goal.id}')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--text-2);cursor:pointer;font-weight:500;transition:all .15s;" onmouseover="this.style.borderColor='var(--text-2)'" onmouseout="this.style.borderColor='var(--border)'">Details →</button>
                        </div>
                    </div>
                </div>`;
            });

            if (sorted.length === 0) {
                html += `<div style="text-align:center;padding:60px 24px;color:var(--text-3);">
                    <div style="font-size:32px;margin-bottom:12px;">🎯</div>
                    <div style="font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:6px;">No goals yet</div>
                    <div style="font-size:13px;">Add your first goal to start tracking progress</div>
                </div>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function updateGoalDate(e, goalId, field) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;
            const newDate = e.target.textContent.trim();
            if (newDate && newDate !== formatDate(goal[field])) {
                // Try to parse date from user input
                try {
                    // Assume format like "Apr 30" and convert to YYYY-MM-DD
                    const today = new Date();
                    const [month, day] = newDate.split(' ');
                    const months = { 'Jan':0, 'Feb':1, 'Mar':2, 'Apr':3, 'May':4, 'Jun':5, 'Jul':6, 'Aug':7, 'Sep':8, 'Oct':9, 'Nov':10, 'Dec':11 };
                    const monthIdx = months[month];
                    if (monthIdx !== undefined && day) {
                        const date = new Date(today.getFullYear(), monthIdx, parseInt(day));
                        goal[field] = date.toISOString().split('T')[0];
                        saveData();
                        renderGoals();
                    }
                } catch (err) {}
            }
        }

        function goalDragStart(e, goalId) {
            draggedGoalId = goalId;
            e.target.closest('.goal-card').classList.add('dragging');
        }

        function goalDragEnd(e) {
            document.querySelectorAll('.goal-card').forEach(el => el.classList.remove('dragging', 'drag-over'));
        }

        function goalDragOver(e) {
            e.preventDefault();
            e.target.closest('.goal-card')?.classList.add('drag-over');
        }

        function goalDrop(e, goalId) {
            e.preventDefault();
            document.querySelectorAll('.goal-card').forEach(el => el.classList.remove('drag-over'));

            if (draggedGoalId && draggedGoalId !== goalId) {
                const draggedIdx = goals.findIndex(g => g.id === draggedGoalId);
                const targetIdx = goals.findIndex(g => g.id === goalId);
                if (draggedIdx >= 0 && targetIdx >= 0) {
                    [goals[draggedIdx], goals[targetIdx]] = [goals[targetIdx], goals[draggedIdx]];
                    goals.forEach((g, idx) => g.priority = idx);
                    saveData();
                    renderGoals();
                }
            }
            draggedGoalId = null;
        }

        function swapGoalPriority(goalId, direction) {
            // First, ensure all goals have sequential priority values
            const sorted = goals.slice().sort((a, b) => (a.priority || 0) - (b.priority || 0));
            sorted.forEach((g, idx) => g.priority = idx);

            // Find the goal in sorted order
            const sortedIdx = sorted.findIndex(g => g.id === goalId);
            if (sortedIdx < 0) return;

            const newSortedIdx = sortedIdx + direction;
            if (newSortedIdx < 0 || newSortedIdx >= sorted.length) return;

            // Swap priority values between current and neighbor
            [sorted[sortedIdx].priority, sorted[newSortedIdx].priority] = [sorted[newSortedIdx].priority, sorted[sortedIdx].priority];

            saveData();
            renderGoals();
        }

        let _widgetDragId = null;
        let _widgetDragView = null;

        function widgetDragStart(e, viewName, widgetId) {
            _widgetDragView = viewName;
            _widgetDragId = widgetId;
            e.currentTarget.style.opacity = '0.4';
            e.dataTransfer.effectAllowed = 'move';
        }

        function widgetDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function widgetDrop(e, viewName, targetWidgetId) {
            e.preventDefault();
            if (!_widgetDragId || _widgetDragView !== viewName || _widgetDragId === targetWidgetId) return;
            const layout = widgetLayouts[viewName] || getDefaultWidgetOrder(viewName);
            const fromIdx = layout.indexOf(_widgetDragId);
            const toIdx = layout.indexOf(targetWidgetId);
            if (fromIdx === -1 || toIdx === -1) return;
            layout.splice(fromIdx, 1);
            layout.splice(toIdx, 0, _widgetDragId);
            widgetLayouts[viewName] = layout;
            saveData();
            renderCurrentView();
        }

        function widgetDragEnd(e) {
            e.currentTarget.style.opacity = '1';
            _widgetDragId = null;
            _widgetDragView = null;
        }

        function renderHabits() {
            const container = document.getElementById('habitsView');

            } else {
                html += `<div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));gap:20px;">`;

                habits.forEach(habit => {
                    const streak = getHabitStreak(habit);
                    const lastWeek = [];
                    for (let i = 6; i >= 0; i--) {
                        const d = new Date();
                        d.setDate(d.getDate() - i);
                        const dateStr = d.toISOString().split('T')[0];
                        const completed = habit.habitCompletions.find(c => c.date === dateStr);
                        lastWeek.push({ date: dateStr, completed: !!completed, dayNum: i });
                    }

                    // Calculate weekly completion rate
                    const thisWeekStart = new Date();
                    thisWeekStart.setDate(thisWeekStart.getDate() - thisWeekStart.getDay() + 1);
                    let thisWeekCount = 0, thisWeekTotal = 0;
                    for (let i = 0; i < 7; i++) {
                        const d = new Date(thisWeekStart);
                        d.setDate(d.getDate() + i);
                        const dayOfWeek = d.getDay();
                        if (dayOfWeek !== 0 && dayOfWeek !== 6) { // weekdays only if applicable
                            thisWeekTotal++;
                            const dateStr = d.toISOString().split('T')[0];
                            if (habit.habitCompletions.find(c => c.date === dateStr)) thisWeekCount++;
                        }
                    }
                    const weeklyRate = thisWeekTotal > 0 ? Math.round(thisWeekCount / thisWeekTotal * 100) : 0;

                    const totalCompletions = habit.habitCompletions.length;
                    const isDoneToday = !!habit.habitCompletions.find(c => c.date === today);
                    html += `<div style="background:var(--surface);border:1px solid ${streak>=7?'#F59E0B':isDoneToday?'var(--success)':'var(--border)'};border-radius:var(--radius);padding:16px;transition:border-color .2s;">

                                    <span style="font-size:10px;padding:2px 6px;border-radius:3px;background:${habit.category==='ACST'?'var(--acst-subtle)':habit.category==='Personal'?'var(--personal-subtle)':'var(--dvlmnt-subtle)'};color:${habit.category==='ACST'?'var(--acst)':habit.category==='Personal'?'var(--personal)':'var(--dvlmnt)'};">
                                        ${habit.category}
                                    </span>
                                    <span style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--surface-2);color:var(--text-3);">
                                        ${habit.recurringFrequency || 'daily'}
                                    </span>
                                </div>
                            </div>
                            <div style="display:flex;gap:4px;">
                                <button class="btn btn-icon" onclick="toggleHabitActive('${habit.id}')" style="font-size:12px;">
                                    ${habit.status === 'active' ? '✓' : '○'}
                                </button>
                                <button class="btn btn-icon" onclick="deleteHabit('${habit.id}')" style="font-size:12px;">✕</button>
                            </div>
                        </div>

                        ${streak > 0 ? `<div style="background:rgba(245,158,11,0.08);border-radius:var(--radius-sm);padding:8px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-around;">
                            <div style="text-align:center;">
                                <div style="font-size:24px;font-weight:800;color:#F59E0B;line-height:1;">🔥 ${streak}</div>
                                <div style="font-size:9px;color:var(--warn);font-weight:700;text-transform:uppercase;letter-spacing:.06em;">day streak</div>
                            </div>
                            <div style="width:1px;height:36px;background:rgba(245,158,11,0.2);"></div>
                            <div style="text-align:center;">
                                <div style="font-size:20px;font-weight:800;color:var(--text-2);line-height:1;">${totalCompletions}</div>
                                <div style="font-size:9px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;">total done</div>
                            </div>
                        </div>` : `<div style="background:var(--surface-2);border-radius:var(--radius-sm);padding:6px 10px;margin-bottom:12px;text-align:center;font-size:11px;color:var(--text-3);cursor:pointer;" onclick="toggleHabitToday('${habit.id}','${today}');renderHabits();">
                            ${isDoneToday ? '✅ Done today!' : '○ Start your streak — mark done today'}
                        </div>`}

                        <div style="margin-bottom:12px;">
                            <div style="font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:6px;">Last 7 Days</div>
                            <div style="display:grid;grid-template-columns:repeat(7, 1fr);gap:4px;">
                                ${lastWeek.map(d => {
                                    const dayInitials = ['S','M','T','W','T','F','S'];
                                    const dayOfWeek = new Date(d.date + 'T12:00:00').getDay();
                                    const initial = dayInitials[dayOfWeek];
                                    const isToday = d.date === today;
                                    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;" onclick="toggleHabitToday('${habit.id}','${d.date}');renderHabits();" title="${d.date}">
                                        <div style="font-size:9px;font-weight:700;color:${isToday?'var(--accent)':'var(--text-3)'};">${initial}</div>
                                        <div style="width:100%;aspect-ratio:1;border-radius:6px;background:${d.completed?'var(--success)':'var(--surface-2)'};border:2px solid ${d.completed?'var(--success)':isToday?'var(--accent)':'var(--border)'};display:flex;align-items:center;justify-content:center;transition:all .15s ease;">
                                            ${d.completed ? `<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}

                                <div style="height:100%;width:${weeklyRate}%;background:var(--success);transition:width .3s ease;"></div>
                            </div>
                        </div>
                    </div>`;
                });

                html += `</div>`;
            }

            html += `</div>`;
            container.innerHTML = html;

        function isChoreDoToday(chore, dateStr) {
            if (!chore.recurrence) return false;
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay();
            const dayOfMonth = date.getDate();

            switch(chore.recurrence.type) {
                case 'onetime': return dateStr === chore.dueDate;
                case 'daily': return true;
                case 'weekday': return dayOfWeek >= 1 && dayOfWeek <= 5;
                case 'weekly': return dayOfWeek === (chore.recurrence.dayOfWeek || 0);
                case 'biweekly': {
                    // True bi-weekly: check if 14-day interval from a fixed epoch
                    const _epoch = new Date('2024-01-01T00:00:00');
                    const _target = new Date(dateStr + 'T00:00:00');
                    const _days = Math.round((_target - _epoch) / 86400000);
                    return _days % 14 === 0;
                }
                case 'monthly': return dayOfMonth === (chore.recurrence.dayOfMonth || 1);
                default: return false;
            }
        }

                        <div><div style="color:var(--text-3);font-size:10px;text-transform:uppercase;font-weight:600;margin-bottom:2px;">Priority</div><div style="font-weight:600;">${['—','🔴 High','🟡 Medium','🔵 Low'][item.priority||0]}</div></div>

                    ${item.timeline&&item.timeline.length>0?`<div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;">Activity</div>${item.timeline.slice(0,8).map(t=>`<div style="font-size:11px;color:var(--text-2);padding:3px 0;border-bottom:1px solid var(--border);">${new Date(t.ts).toLocaleDateString()} — ${t.action}</div>`).join('')}</div>`:''}

        /* ══════════════════════════════════════════════════

        function printMyDay() {
            // Use myDayOffset so Print Day matches what the user is viewing
            const _base = new Date(); _base.setHours(0,0,0,0);
            const targetDate = new Date(_base.getTime() + myDayOffset * 86400000);
            const dStr = targetDate.getFullYear() + '-' + String(targetDate.getMonth()+1).padStart(2,'0') + '-' + String(targetDate.getDate()).padStart(2,'0');
            const todayFmt = targetDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

            let h = `<!DOCTYPE html><html><head><title>My Day — ${todayFmt}</title><style>
