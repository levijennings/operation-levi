                html += '<div class="dash-card" onclick="switchView(\'' + card.view + '\')" style="cursor:pointer;' + card.border + '">' +
                    '<div class="dash-card-title">' + card.label + '</div>' +
                    '<div style="font-size:28px;font-weight:700;color:' + card.color + ';margin:8px 0;">' + card.count + '</div>' +
                    '<div style="font-size:11px;color:var(--text-3);">' + card.sub + '</div>' +
                    dashBullets(card.arr, 4) +
                '</div>';
            });
            html += '</div>';

            // ── THREE-COLUMN MAIN LAYOUT ─────────────────────────────────────────────
            html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;">';

            // ── COL 1: TODAY'S FOCUS + OVERDUE ──────────────────────────────────────
            html += '<div>';
            html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
                    '<div style="font-size:13px;font-weight:700;">Today\'s Focus</div>' +
                    '<span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="switchView(\'myday\')">View all →</span>' +
                '</div>';
            if (dueToday.length > 0) {
                dueToday.slice(0,6).forEach(item => {
                    html += '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDetail(\'' + item.id + '\')">' +
                        '<div class="badge ' + getCategoryBadgeClass(item.category) + '" style="font-size:9px;padding:2px 5px;flex-shrink:0;">' + item.category + '</div>' +
                        '<div style="flex:1;font-size:12px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">' + item.title + '</div>' +
                    '</div>';
                });
                if (dueToday.length > 6) html += '<div style="font-size:11px;color:var(--text-3);padding-top:6px;">+' + (dueToday.length-6) + ' more</div>';
            } else {
                html += '<div style="padding:16px 0;text-align:center;color:var(--text-3);font-size:12px;">✓ Nothing due today</div>';
            }
            html += '</div>';

            // Active Projects
            if (activeProjects.length > 0) {
                html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
                        '<div style="font-size:13px;font-weight:700;">Active Projects</div>' +
                        '<span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="switchView(\'board\')">Board →</span>' +
                    '</div>';
                activeProjects.slice(0,6).forEach(proj => {
                    const progress = getItemProgress(proj);
                    html += '<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDetail(\'' + proj.id + '\')">' +
                        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">' +
                            '<div style="font-size:12px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;margin-right:6px;">' + proj.title + '</div>' +
                            (progress.total>0 ? '<span style="font-size:11px;font-weight:700;color:' + (progress.pct===100?'var(--success)':'var(--accent)') + ';flex-shrink:0;">' + progress.pct + '%</span>' : '') +
                        '</div>' +
                        (progress.total>0 ? '<div style="width:100%;height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden;"><div style="height:100%;width:' + progress.pct + '%;background:' + (progress.pct===100?'var(--success)':'var(--accent)') + ';border-radius:2px;"></div></div>' : '') +
                        (proj.dueDate ? '<div style="font-size:10px;color:var(--text-3);margin-top:3px;">Due ' + formatDate(proj.dueDate) + '</div>' : '') +
                    '</div>';
                });
                html += '</div>';
            }
            html += '</div>'; // end col 1

            // ── COL 2: HABITS ────────────────────────────────────────────────────────
            html += '<div>';
            try {
                const habitCompletedToday = habits.filter(h => h.habitCompletions.find(c => c.date === todayStr)).length;
                html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
                        '<div style="font-size:13px;font-weight:700;">Habits</div>' +
                        '<div style="display:flex;align-items:center;gap:10px;">' +
                            '<div style="font-size:11px;color:var(--text-2);">' + habitCompletedToday + '/' + habits.length + ' today</div>' +
                            '<span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="switchView(\'habits\')">All →</span>' +
                        '</div>' +
                    '</div>';

                if (habits.length > 0) {
                    // Header row: day labels
                    html += '<div style="display:grid;grid-template-columns:1fr repeat(7,28px);gap:4px;align-items:center;margin-bottom:6px;">' +
                        '<div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-3);letter-spacing:.04em;">Habit</div>';
                    rolling7.forEach(d => {
                        const isTodayD = d.toISOString().split('T')[0] === todayStr;
                        html += '<div style="text-align:center;font-size:9px;font-weight:' + (isTodayD?'800':'500') + ';color:' + (isTodayD?'var(--accent)':'var(--text-3)') + ';">' + dayShorts[d.getDay()] + '<br>' + d.getDate() + '</div>';
                    });
                    html += '</div>';

                    // Habit rows
                    habits.forEach(h => {
                        const streak = getHabitStreak(h);
                        html += '<div style="display:grid;grid-template-columns:1fr repeat(7,28px);gap:4px;align-items:center;padding:5px 0;border-top:1px solid var(--border);">' +
                            '<div style="font-size:11px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;" onclick="openDetail(\'' + h.id + '\')">' +
                                h.title + (streak>0 ? ' <span style="font-size:9px;color:var(--warn);">🔥' + streak + '</span>' : '') +
                            '</div>';
                        rolling7.forEach(d => {
                            const dStr = d.toISOString().split('T')[0];
                            const comps = h.habitCompletions;
                            const isCompleted = comps.find(c => c.date === dStr);
                            const isTodayD = dStr === todayStr;
                            const isPast = d <= today;
                            if (isTodayD) {
                                html += '<div style="text-align:center;"><input type="checkbox" ' + (isCompleted?'checked':'') + ' onchange="habitDashToggle(\'' + h.id + '\',\'' + dStr + '\')" style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer;"></div>';
                            } else {
                                const bg = isCompleted ? 'var(--success)' : isPast ? 'var(--surface-2)' : 'transparent';
                                const border = isCompleted ? 'var(--success)' : isPast ? 'var(--border-2)' : 'transparent';
                                const check = isCompleted ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : '';
                                const onclick = isPast ? 'habitDashToggle(\'' + h.id + '\',\'' + dStr + '\')' : '';
                                html += '<div style="text-align:center;"><div style="width:22px;height:22px;border-radius:5px;margin:0 auto;background:' + bg + ';border:1px solid ' + border + ';display:flex;align-items:center;justify-content:center;cursor:' + (isPast?'pointer':'default') + ';" onclick="' + onclick + '">' + check + '</div></div>';
                            }
                        });
                        html += '</div>';
                    });
                } else {
                    html += '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:12px;">No active habits.<br><span style="color:var(--accent);cursor:pointer;" onclick="switchView(\'habits\')">Create habits →</span></div>';
                }
                html += '</div>'; // habits card
            } catch(e) {
                console.error('Dashboard habits error:', e);
                html += '<div style="background:var(--surface);border:1px solid var(--danger);border-radius:var(--radius);padding:18px;"><div style="color:var(--danger);font-size:12px;">Habits error: ' + e.message + '</div></div>';
            }

            // Waiting On list
            if (waiting.length > 0) {
                html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:16px;">' +
                    '<div style="font-size:13px;font-weight:700;margin-bottom:14px;">Waiting On</div>';
                waiting.slice(0,5).forEach(item => {
                    html += '<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDetail(\'' + item.id + '\')">' +
                        '<div style="width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0;margin-top:4px;"></div>' +
                        '<div>' +
                            '<div style="font-size:12px;font-weight:500;">' + item.title + '</div>' +
                            (item.waitingFrom ? '<div style="font-size:10px;color:var(--text-3);margin-top:2px;">From: ' + item.waitingFrom + (item.waitingOn?' · '+item.waitingOn:'') + '</div>' : '') +
                        '</div>' +
                    '</div>';
                });
                html += '</div>';
            }
            html += '</div>'; // end col 2

            // ── COL 3: WORKLOAD + TEAM DEADLINES ────────────────────────────────────
            html += '<div>';

            // Workload mini stats
            const totalItems = allItems.length || 1;
            html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;">' +
                '<div style="font-size:13px;font-weight:700;margin-bottom:14px;">Workload</div>' +
                '<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--surface-2);margin-bottom:10px;">' +
                    (done.length>0?'<div style="width:'+Math.round(done.length/totalItems*100)+'%;background:var(--success);"></div>':'') +
                    (active.length>0?'<div style="width:'+Math.round(active.length/totalItems*100)+'%;background:var(--accent);"></div>':'') +
                    (thisWeek.length>0?'<div style="width:'+Math.round(thisWeek.length/totalItems*100)+'%;background:#818CF8;"></div>':'') +
                    (waiting.length>0?'<div style="width:'+Math.round(waiting.length/totalItems*100)+'%;background:var(--warn);"></div>':'') +
                    (backlog.length>0?'<div style="width:'+Math.round(backlog.length/totalItems*100)+'%;background:var(--border);"></div>':'') +
                '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
                    '<div style="padding:10px;background:var(--surface-2);border-radius:var(--radius-sm);text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--accent);">' + totalHrs + '</div><div style="font-size:10px;color:var(--text-3);">hrs estimated</div></div>' +
                    '<div style="padding:10px;background:var(--surface-2);border-radius:var(--radius-sm);text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--success);">' + done.length + '</div><div style="font-size:10px;color:var(--text-3);">completed</div></div>' +
                    '<div style="padding:10px;background:var(--surface-2);border-radius:var(--radius-sm);text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--accent);">' + active.length + '</div><div style="font-size:10px;color:var(--text-3);">active</div></div>' +
                    '<div style="padding:10px;background:var(--surface-2);border-radius:var(--radius-sm);text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--text-3);">' + backlog.length + '</div><div style="font-size:10px;color:var(--text-3);">in backlog</div></div>' +
                '</div>' +
            '</div>';

            // Upcoming deadlines this week
            const wkStart = new Date(today); wkStart.setDate(wkStart.getDate() - wkStart.getDay() + 1);
            const wkEnd = new Date(wkStart.getTime() + 6 * 86400000);
            const upcomingDeadlines = allItems.filter(i => {
                if (!i.dueDate || i.status==='done') return false;
                const due = new Date(i.dueDate); due.setHours(0,0,0,0);
                return due >= today && due <= wkEnd;
            }).sort((a,b) => a.dueDate.localeCompare(b.dueDate));

            if (upcomingDeadlines.length > 0) {
                html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
                        '<div style="font-size:13px;font-weight:700;">Deadlines This Week</div>' +
                        '<span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="switchView(\'myweek\')">Full week →</span>' +
                    '</div>';
                let lastDl = '';
                upcomingDeadlines.slice(0,10).forEach(item => {
                    const dl = new Date(item.dueDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
                    if (dl !== lastDl) {
                        html += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);margin-top:8px;margin-bottom:4px;">' + dl + '</div>';
                        lastDl = dl;
                    }
                    const prog = getItemProgress(item);
                    html += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDetail(\'' + item.id + '\')">' +
                        '<div style="flex:1;font-size:11px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">' + item.title + '</div>' +
                        (prog.total>0 ? '<span style="font-size:10px;font-weight:700;color:' + (prog.pct===100?'var(--success)':'var(--accent)') + ';">' + prog.pct + '%</span>' : '') +
                    '</div>';
                });
                html += '</div>';
            }

            // Velocity mini chart
            const velocityWeeks = 8;
            const weekBuckets = [];
            for (let w = 0; w < velocityWeeks; w++) {
                const wS = new Date(today.getTime() - (w+1) * 7 * 86400000);
                const wE = new Date(today.getTime() - w * 7 * 86400000);
                const cnt = items.filter(i => {
                    const entered = i.columnEnteredAt ? new Date(i.columnEnteredAt) : null;
                    if (!entered || i.status !== 'done') return false;
                    return entered >= wS && entered < wE;
                }).length;
                weekBuckets.unshift({ label: 'W' + (velocityWeeks - w), count: cnt });
            }
            const maxV = Math.max(...weekBuckets.map(b => b.count), 1);
            html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;">' +
                '<div style="font-size:13px;font-weight:700;margin-bottom:14px;">Velocity</div>' +
                '<div style="display:flex;align-items:flex-end;gap:4px;height:60px;">' +
                weekBuckets.map(b => '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">' +
                    '<div style="font-size:8px;color:var(--text-3);">' + (b.count||'') + '</div>' +
                    '<div style="width:100%;background:' + (b.count>0?'var(--accent)':'var(--surface-2)') + ';border-radius:2px 2px 0 0;height:' + Math.round((b.count/maxV)*44) + 'px;min-height:3px;"></div>' +
                    '<div style="font-size:8px;color:var(--text-3);">' + b.label + '</div>' +
                '</div>').join('') +
                '</div>' +
            '</div>';

            html += '</div>'; // end col 3
            html += '</div>'; // end 3-column grid

            // ── TEAM WORKLOAD ─────────────────────────────────────────────────────────
            const teamColors = { ACST: '#EF4444', DVLMNT: '#059669' };
            const anyTeamMembers = (teams.ACST||[]).length > 0 || (teams.DVLMNT||[]).length > 0;
            if (anyTeamMembers) {
                html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px;">' +
                    '<div style="font-size:13px;font-weight:700;margin-bottom:14px;">Team Workload</div>' +
                    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;">';
                ['ACST','DVLMNT','Personal'].forEach(teamName => {
                    (teams[teamName]||[]).forEach(person => {
                        const rItems = teamAllItems.filter(i => i.status!=='done' && ((i.raci?.R||[]).includes(person)||(i.assignees||[]).includes(person)));
                        const hrs = rItems.reduce((s,i)=>s+(i.timeEstimate||0),0);
                        const profile = peopleProfiles[person] || {};
                        const trackCap = profile.trackCapacity !== false;
                        const capacity = profile.hoursPerWeek || 40;
                        const pct = Math.min(Math.round(hrs/capacity*100),100);
                        const col = hrs > capacity ? '#EF4444' : hrs/capacity > 0.7 ? '#F59E0B' : '#22C55E';
                        html += '<div onclick="boardPersonFilter=\'' + person + '\';switchView(\'board\');" title="View ' + person + ' on the board" onmouseover="this.style.filter=\'brightness(1.06)\'" onmouseout="this.style.filter=\'\'" style="cursor:pointer;background:var(--surface-2);border-radius:var(--radius-sm);padding:10px;border-left:3px solid ' + (teamColors[teamName]||'var(--border)') + ';">' +
                            '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">' +
                                '<div style="width:20px;height:20px;">' + getAvatarHTML(person,20) + '</div>' +
                                '<div style="flex:1;">' +
                                    '<div style="font-size:11px;font-weight:600;">' + person + '</div>' +
                                    '<div style="font-size:9px;color:var(--text-3);">' + teamName + ' · ' + rItems.length + ' items</div>' +
                                '</div>' +
                                (trackCap ? '<div style="font-size:10px;font-weight:700;color:' + col + ';">' + hrs + 'h</div>' : '') +
                            '</div>' +
                            (trackCap
                                ? '<div style="background:var(--border);border-radius:2px;height:5px;overflow:hidden;margin-bottom:3px;"><div style="height:100%;background:' + col + ';width:' + pct + '%;transition:width .3s;"></div></div>' +
                                  '<div style="font-size:9px;color:var(--text-3);">' + hrs + 'h assigned / ' + capacity + 'h capacity</div>'
                                : '<div style="font-size:9px;color:var(--text-3);">' + hrs + 'h assigned · no capacity tracking</div>'
                            ) +
                        '</div>';
                    });
                });
                html += '</div></div>';
            }

            html += '</div>'; // end outer padding
            container.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // RENDERING — BOARD
        // ═══════════════════════════════════════════════════════════════════════════
        function renderBoard() {
            const container = document.getElementById('boardView');
            const statuses = ['backlog', 'thisweek', 'priority', 'active', 'today', 'waiting', 'review', 'done'];
            const labels = { backlog: 'Backlog', thisweek: 'This Week', priority: 'Priority', active: 'Active', today: 'Today', waiting: 'Waiting On', review: 'Needs Review', done: 'Done' };
            const allPeople = getAllAssignees();

            // Filter bar — grouped by team
            const teamColorMap = { ACST: 'var(--acst)', DVLMNT: 'var(--dvlmnt)', Personal: 'var(--personal)' };
            const knownTeamMembers = new Set([...Object.values(teams).flat()]);
            const unassigned = allPeople.filter(p => !knownTeamMembers.has(p));

            let filterBarInner = `<button onclick="boardPersonFilter='';renderBoard();" style="padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:${boardPersonFilter===''?'var(--accent)':'var(--surface)'};color:${boardPersonFilter===''?'#fff':'var(--text-2)'};font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;">Everyone</button>`;

            // Team grouped pills
            Object.entries(teams).forEach(([teamName, members]) => {
                if (!members || members.length === 0) return;
                const tc = teamColorMap[teamName] || 'var(--text-3)';
                filterBarInner += `<span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:0 4px;align-self:center;">${teamName}</span>`;
                members.forEach(p => {
                    const isActive = boardPersonFilter === p;
                    filterBarInner += `<button onclick="boardPersonFilter='${p}';renderBoard();" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid ${isActive?tc:'var(--border)'};background:${isActive?tc:'var(--surface)'};color:${isActive?'#fff':'var(--text-2)'};font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;">
                        <span style="flex-shrink:0;">${getAvatarHTML(p, 16)}</span>${p}
                    </button>`;
                });
            });

            // Unassigned / other people
            if (unassigned.length > 0) {
                filterBarInner += `<span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:0 4px;align-self:center;">Other</span>`;
                unassigned.forEach(p => {
                    const isActive = boardPersonFilter === p;
                    filterBarInner += `<button onclick="boardPersonFilter='${p}';renderBoard();" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid ${isActive?'var(--accent)':'var(--border)'};background:${isActive?'var(--accent)':'var(--surface)'};color:${isActive?'#fff':'var(--text-2)'};font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;">
                        <span style="flex-shrink:0;">${getAvatarHTML(p, 16)}</span>${p}
                    </button>`;
                });
            }

            const filterBar = `<div style="display:flex;align-items:center;gap:8px;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;">
                <span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);flex-shrink:0;">Filter by</span>
                ${filterBarInner}
            </div>`;
            container.innerHTML = filterBar + '<div class="board-container" id="boardColumns"></div>';
            const boardEl = document.getElementById('boardColumns');

            let boardHtml = '';
            statuses.forEach(status => {
                let baseItems = getFilteredItems().filter(i => i.status === status);
                // Apply person filter
                let itemsInStatus = boardPersonFilter
                    ? baseItems.filter(i => {
                        const people = [...new Set([...(i.assignees||[]), ...(i.raci?.R||[]), i.raci?.A, ...((i.subtasks||[]).map(s=>s.assignedTo).filter(Boolean))].filter(Boolean))];
                        return people.includes(boardPersonFilter);
                      })
                    : baseItems;

                // Habits checklist at TOP of Today column (not as cards)
                let habitsForToday = [];
                if (status === 'today') {
                    habitsForToday = items.filter(i => i.type === 'habit' && i.status === 'active');
                }
                // Habits never show as kanban cards in ANY column
                itemsInStatus = itemsInStatus.filter(i => i.type !== 'habit');

                boardHtml += `<div class="board-column" data-status="${status}"
                    ondragover="boardDragOver(event)" ondragleave="boardDragLeave(event)" ondrop="boardDrop(event, '${status}')">
                    <div class="board-column-title" title="${{backlog:'Future work, not yet scheduled',thisweek:'Scheduled this week — 40h recommended',active:'Currently in progress',today:'Must do today',waiting:'Blocked on someone else',done:'Completed items'}[status]||''}">${labels[status]} (${itemsInStatus.length})${status==='thisweek'?` <span style="font-size:9px;font-weight:700;color:${itemsInStatus.reduce((s,i)=>s+(i.timeEstimate||0),0)>40?'#EF4444':'var(--text-3)'};">${itemsInStatus.reduce((s,i)=>s+(i.timeEstimate||0),0)}h${itemsInStatus.reduce((s,i)=>s+(i.timeEstimate||0),0)>40?' ⚠️':''}</span>`:''}</div>
                    <div class="board-cards">` +
                    (itemsInStatus.length === 0 && status !== 'done' ?
                        `<div style="padding:20px 12px;text-align:center;color:var(--text-3);font-size:12px;border:2px dashed var(--border);border-radius:6px;margin:4px 0;">` +
                        { backlog:'📋 Add future work here', thisweek:'📅 Drag items here to commit this week', active:'⚡ Nothing active yet — drag from This Week', today:'🎯 Drag your top tasks here', waiting:'⏳ Drag here when blocked on someone', review:'✦ AI drafts awaiting your review', done:'✅ Complete tasks appear here' }[status] +
                        `</div>` : '') + ``;
                // Render habits checklist FIRST, above task cards
                if (status === 'today' && habitsForToday.length > 0) {
                    const _ld = new Date(); const today = _ld.getFullYear()+'-'+String(_ld.getMonth()+1).padStart(2,'0')+'-'+String(_ld.getDate()).padStart(2,'0');
                    const allHabitsDone = habitsForToday.every(h => (h.habitCompletions||[]).find(c => c.date === today));
                    boardHtml += '<div style="margin-bottom:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;">';
                    boardHtml += '<div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-3);letter-spacing:.06em;margin-bottom:8px;">' + (allHabitsDone ? '✅ ' : '') + 'Daily Habits</div>';
                    habitsForToday.forEach(h => {
                        const done = (h.habitCompletions||[]).find(c => c.date === today);
                        boardHtml += '<div style="display:flex;align-items:center;gap:8px;padding:5px 6px;background:' + (done ? '#22C55E10' : 'transparent') + ';border-radius:5px;margin-bottom:3px;font-size:12px;">' +
                            '<input type="checkbox" ' + (done?'checked':'') + ' onchange="toggleHabitToday(\'' + h.id + '\',\'' + today + '\');renderBoard();showToast(this.checked?\'🔥 Streak kept!\':\'Habit unmarked\');" style="accent-color:var(--success);width:13px;height:13px;cursor:pointer;flex-shrink:0;">' +
                            '<span style="' + (done?'text-decoration:line-through;color:var(--text-3);':'color:var(--text);') + '">' + h.title + '</span>' +
                        '</div>';
                    });
                    boardHtml += '</div>';
                }
                // Then render regular task cards
                if (status === 'done') {
                    // Done column: grouped by category, collapsible
                    const doneGroups = {};
                    ['ACST','DVLMNT','Personal'].forEach(cat => { doneGroups[cat] = []; });
                    itemsInStatus.forEach(item => {
                        const g = doneGroups[item.category] || (doneGroups['Other'] = doneGroups['Other']||[]);
                        (doneGroups[item.category] || doneGroups['Other']).push(item);
                    });
                    const catBadgeColors = { ACST:'var(--acst)', DVLMNT:'var(--dvlmnt)', Personal:'var(--personal)', Other:'var(--text-3)' };
                    Object.entries(doneGroups).forEach(([cat, catItems]) => {
                        if (catItems.length === 0) return;
                        const gid = 'done_' + cat.replace(/[^a-z]/gi,'_');
                        boardHtml += `<div style="margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden;">`;
                        boardHtml += `<div onclick="const b=document.getElementById('${gid}');b.style.display=b.style.display==='none'?'block':'none';this.querySelector('.done-chevron').textContent=b.style.display==='none'?'▶':'▼'" style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface-2);cursor:pointer;user-select:none;">`;
                        boardHtml += `<div style="display:flex;align-items:center;gap:6px;"><div style="width:8px;height:8px;border-radius:50%;background:${catBadgeColors[cat]||'var(--text-3)'};flex-shrink:0;"></div><span style="font-size:11px;font-weight:700;color:var(--text);">${cat}</span><span style="font-size:10px;color:var(--text-3);">(${catItems.length})</span></div><span class="done-chevron" style="font-size:9px;color:var(--text-3);">▼</span></div>`;
                        boardHtml += `<div id="${gid}" style="padding:4px 0;">`;
                        catItems.forEach(item => {
                            boardHtml += `<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDetail('${item.id}')" title="${item.title}"><span style="font-size:11px;color:var(--success);">✓</span><span style="font-size:11px;color:var(--text-3);text-decoration:line-through;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;">${item.title}</span>${item.dueDate?`<span style="font-size:10px;color:var(--text-3);flex-shrink:0;">${formatDate(item.dueDate)}</span>`:''}</div>`;
                        });
                        boardHtml += '</div></div>';
                    });
                } else {
                    itemsInStatus.forEach(item => {
                        boardHtml += renderCard(item, true);
                    });
                }
                boardHtml += `</div></div>`;
            });
            boardEl.innerHTML = boardHtml;

            // Scroll to 'This Week' column on load
            setTimeout(() => {
                const cols = boardEl.querySelectorAll('.board-column');
                const thisWeekCol = Array.from(cols).find(c => c.dataset.status === 'thisweek');
                if (thisWeekCol) {
                    thisWeekCol.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
                }
            }, 100);
        }

        // Board drag-and-drop handlers
        function boardDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const col = e.target.closest('.board-column');
            if (col) col.classList.add('drag-over');
        }
        function boardDragLeave(e) {
            const col = e.target.closest('.board-column');
            if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
        }
        function boardDrop(e, newStatus) {
            e.preventDefault();
            const col = e.target.closest('.board-column');
            if (col) col.classList.remove('drag-over');
            const itemId = e.dataTransfer.getData('text/plain');
            if (!itemId) return;
            const it = items.find(i => i.id === itemId);
            if (!it || it.status === newStatus) return;
            const oldStatus = it.status;
            it.status = newStatus;
            it.columnEnteredAt = Date.now();
            addTimelineEntry(it.id, 'Status changed from ' + oldStatus + ' to ' + newStatus);
            if (newStatus === 'waiting') {
                const waitFrom = prompt('Who are you waiting on?');
                const waitWhat = prompt('What are you waiting on?');
                if (waitFrom) {
                    it.waitingFrom = waitFrom;
                    // Auto-assign so it shows in their filtered view
                    if (!it.assignees) it.assignees = [];
                    if (!it.assignees.includes(waitFrom)) it.assignees.push(waitFrom);
                }
                if (waitWhat) it.waitingOn = waitWhat;
            }
            if (newStatus === 'done') awardXP(25);
            if (newStatus === 'thisweek') {
                const weekTotalH = items.filter(i => i.status === 'thisweek').reduce((s, i) => s + (parseInt(i.timeEstimate)||0), 0);
                if (weekTotalH > 40) {
                    showToast('⚠️ This Week now has ' + weekTotalH + 'h scheduled (40h max). Adjust to avoid overload.');
                }
            }
            saveData();
            renderBoard();
            showToast(`Moved "${it.title}" → ${newStatus}`);
        }

        function renderCard(item, draggable) {
            const category = item.category;
            const categoryClass = getCategoryBadgeClass(category);
            const dueClass = getDueDateClass(item.dueDate);
            const progress = getItemProgress(item);
            const isOverdue = item.dueDate && new Date(item.dueDate) < new Date(new Date().toDateString()) && item.status !== 'done';
            const priorityColors = {3:'var(--danger)',2:'var(--warn)',1:'var(--accent)',0:''};

            // Type-specific styling
            const typeStyles = {
                project:      { borderColor: 'var(--accent)',  icon: '📋' },
                task:         { borderColor: '#16A34A',         icon: '✓'  },
                'phone-call': { borderColor: 'var(--phone)',    icon: '📞' },
                'book-meeting': { borderColor: 'var(--meeting)', icon: '📅' },
                habit:        { borderColor: 'var(--warn)',     icon: '🔄' },
                question:     { borderColor: '#EC4899',         icon: '❓' }
            };
            const typeStyle = typeStyles[item.type] || { borderColor: '', icon: '' };
            const typeBorderColor = isOverdue ? 'var(--danger)' : typeStyle.borderColor;

            // T-shirt size padding
            const sizeStyles = {
                'XS': 'padding: 8px; font-size: 12px',
                'S': 'padding: 10px',
                'M': 'padding: 12px',
                'L': 'padding: 14px; min-height: 90px',
                'XL': 'padding: 16px; min-height: 110px',
                'XXL': 'padding: 18px; min-height: 130px'
            };
            const sizePadding = sizeStyles[item.tshirtSize] || 'padding: 12px';

            const dragAttrs = draggable ? `draggable="true" title="Drag to move column" ondragstart="event.dataTransfer.setData('text/plain','${item.id}');this.classList.add('dragging');" ondragend="this.classList.remove('dragging');"` : '';
            const inTop3 = Array.isArray(top3Manual) && top3Manual.includes(item.id);
            let html = `<div class="card category-${category}" ${dragAttrs} onclick="openDetail('${item.id}')" style="${typeBorderColor?`border-left:3px solid ${typeBorderColor};`:''}${sizePadding};${isOverdue?'padding-top:24px;':''}position:relative;${isOverdue?'background:linear-gradient(135deg,var(--acst-subtle) 0%,var(--surface) 60%);':''}">` +
                (isOverdue ? `<div style="position:absolute;top:0;left:0;right:0;background:#DC2626;color:white;font-size:9px;font-weight:800;padding:3px 8px;border-radius:var(--radius) var(--radius) 0 0;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px;"><span style="width:5px;height:5px;border-radius:50%;background:white;flex-shrink:0;animation:overdueP 1.5s ease-in-out infinite;"></span>OVERDUE</div>` : '') +
                `
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                    <div style="display:flex;align-items:center;gap:6px;">
                        <span onclick="toggleTop3FromCard('${item.id}',event)" title="${inTop3 ? 'In Top 3 — click to remove' : 'Click to set as a Top 3 for today'}" style="cursor:pointer;font-size:14px;line-height:1;user-select:none;${inTop3 ? 'color:#F59E0B;' : 'color:var(--text-3);opacity:.4;'}">★</span>
                        <div class="badge ${categoryClass}" style="font-size:10px;padding:1px 6px;">${category}</div>
                        ${item.priority>=2?`<span style="width:6px;height:6px;border-radius:50%;background:${priorityColors[item.priority]};display:inline-block;" title="Priority ${item.priority}"></span>`:''}
                    </div>
                    <span style="font-size:10px;font-weight:600;text-transform:capitalize;${typeStyle.borderColor?`color:${typeStyle.borderColor};`:''}">${typeStyle.icon}${item.type}</span>
                </div>
                <div style="font-size:13px;font-weight:500;margin-bottom:6px;word-break:break-word;line-height:1.4;">${item.title}</div>`;
            // Due date + time estimate row
            if (item.dueDate || item.tshirtSize) {
                html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:${isOverdue?'var(--danger)':'var(--text-3)'};">`;
                if (item.dueDate) {
                    const _cDate = new Date(item.dueDate + 'T00:00:00');
                    const _cDay = _cDate.getDate();
                    const _cMo = _cDate.toLocaleDateString('en-US',{month:'short'}).toUpperCase();
                    const _cBg = isOverdue ? '#DC2626' : '#3B82F6';
                    html += `<span onclick="event.stopPropagation();quickEditDate(event,'${item.id}')" style="cursor:pointer;border-radius:3px;padding:1px 4px;transition:background .1s;display:inline-flex;align-items:center;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='transparent'" title="${formatDate(item.dueDate)} — Click to change date"><span style="display:inline-flex;flex-direction:column;align-items:center;width:22px;border-radius:3px;overflow:hidden;border:1px solid ${_cBg};flex-shrink:0;"><span style="font-size:5px;font-weight:800;color:white;background:${_cBg};width:100%;text-align:center;padding:1px 0;letter-spacing:.02em;">${_cMo}</span><span style="font-size:9px;font-weight:800;color:${_cBg};line-height:1.3;width:100%;text-align:center;background:white;">${_cDay}</span></span></span>`;
                }
                if (item.tshirtSize) html += `<span style="background:var(--surface-2);padding:0 4px;border-radius:3px;font-size:10px;font-weight:600;">${item.tshirtSize}</span>`;
                if (item.timeEstimate) html += `<span>⏱ ${item.timeEstimate}h</span>`;
                html += `</div>`;
            }
            // Subtask progress bar with weighted %
            if (progress.total > 0) {
                html += `<div style="margin-bottom:6px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
                        <span style="font-size:10px;color:var(--text-3);">${progress.done}/${progress.total} subtasks</span>
                        <span style="font-size:11px;font-weight:600;color:${progress.pct===100?'var(--success)':'var(--accent)'};">${progress.pct}%</span>
                    </div>
                    <div style="width:100%;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;">
                        <div style="height:100%;width:${progress.pct}%;background:${progress.pct===100?'var(--success)':'var(--accent)'};border-radius:2px;transition:width .3s;"></div>
                    </div>
                </div>`;
            }
            // Waiting info — shown on card face when status is waiting
            if (item.status === 'waiting' && (item.waitingFrom || item.waitingOn)) {
                html += `<div class="waiting-card-meta">
                    <span style="font-size:10px;font-weight:700;letter-spacing:.04em;opacity:.6;">WAITING ON</span><br>
                    ${item.waitingFrom ? `<strong>${item.waitingFrom}</strong>${item.waitingOn ? ' · ' : ''}` : ''}${item.waitingOn || ''}${item.waitingExpected ? `<span style="opacity:.65;"> · by ${item.waitingExpected}</span>` : ''}
                </div>`;
            }
            // Assignees row
            if ((item.assignees && item.assignees.length > 0) || (item.raci?.R && item.raci.R.length > 0)) {
                const people = [...new Set([...(item.raci?.R||[]), ...(item.assignees||[])])];
                html += `<div style="display:flex;align-items:center;gap:4px;margin-top:6px;">`;
                people.slice(0, 4).forEach(a => {
                    html += `<div style="width:20px;height:20px;" title="${a}">${getAvatarHTML(a, 20)}</div>`;
                });
                if (people.length > 4) html += `<span style="font-size:10px;color:var(--text-3);">+${people.length-4}</span>`;
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // RENDERING — GANTT
        // ═══════════════════════════════════════════════════════════════════════════
        let ganttDragState = null;
        function renderGantt() {
            const container = document.getElementById('ganttView');

            // Tab bar
            var ganttTabHtml = '<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">' +
                '<div style="display:flex;align-items:center;padding:0 24px;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;">' +
                '<button onclick="currentTimelineTab=\'gantt\';renderGantt()" style="padding:10px 20px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid ' + (currentTimelineTab==='gantt' ? 'var(--accent)' : 'transparent') + ';color:' + (currentTimelineTab==='gantt' ? 'var(--accent)' : 'var(--text-3)') + ';margin-bottom:-2px;">📊 Gantt</button>' +
                '<button onclick="currentTimelineTab=\'calendar\';renderGantt()" style="padding:10px 20px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid ' + (currentTimelineTab==='calendar' ? 'var(--accent)' : 'transparent') + ';color:' + (currentTimelineTab==='calendar' ? 'var(--accent)' : 'var(--text-3)') + ';margin-bottom:-2px;">📅 Calendar</button>' +
                '<div style="margin-left:auto;padding:8px 0;"><button class="btn" onclick="openEventModal(null,null)" style="font-size:11px;">+ Add Event</button></div>' +
                '</div>' +
                '<div style="flex:1;overflow:hidden;" id="timelineInner"></div></div>';
            container.innerHTML = ganttTabHtml;

            const inner = document.getElementById('timelineInner');
            if (currentTimelineTab === 'calendar') {
                inner.style.cssText = 'flex:1;overflow:auto;';
                renderCalendarView(inner);
                return;
            }
            inner.style.cssText = 'flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;';

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayTime = today.getTime();
            const totalDays = ganttWeeks * 7;
            const startTime = todayTime;
            const endTime = todayTime + (totalDays * 86400000);

            let ganttItems = getFilteredItems().filter(i => i.type !== 'habit' && i.type !== 'chore' && (i.startDate || i.dueDate));
            if (ganttFilterType !== 'all') ganttItems = ganttItems.filter(i => i.type === ganttFilterType);
            if (ganttFilterCategory !== 'all') ganttItems = ganttItems.filter(i => i.category === ganttFilterCategory);
            if (ganttFilterPerson !== 'all') ganttItems = ganttItems.filter(i => (i.raci?.R || i.assignees || []).includes(ganttFilterPerson));

            const filtered = ganttItems.sort((a, b) => {
                const aStart = a.startDate || a.dueDate;
                const bStart = b.startDate || b.dueDate;
                if (!aStart) return 1;
                if (!bStart) return -1;
                return aStart.localeCompare(bStart);
            });

            let html = '';

            // Filter bar
            const allAssignees = getAllAssignees();
            html += '<div style="padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap;flex-shrink:0;">' +
                '<div><label style="font-size:11px;font-weight:600;color:var(--text-3);margin-right:8px;">Type:</label>' +
                    '<button class="btn" onclick="ganttFilterType=\'all\';renderGantt()" style="font-size:10px;' + (ganttFilterType==='all'?'background:var(--accent);color:white;':'') + '">All</button>' +
                    '<button class="btn" onclick="ganttFilterType=\'project\';renderGantt()" style="font-size:10px;margin-left:4px;' + (ganttFilterType==='project'?'background:var(--accent);color:white;':'') + '">Projects</button>' +
                    '<button class="btn" onclick="ganttFilterType=\'task\';renderGantt()" style="font-size:10px;margin-left:4px;' + (ganttFilterType==='task'?'background:var(--accent);color:white;':'') + '">Tasks</button>' +
                '</div>' +
                '<div><label style="font-size:11px;font-weight:600;color:var(--text-3);margin-right:8px;">Category:</label>' +
                    '<select onchange="ganttFilterCategory=this.value;renderGantt()" style="font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-xs);">' +
                        '<option value="all" ' + (ganttFilterCategory==='all'?'selected':'') + '>All</option>' +
                        '<option value="ACST" ' + (ganttFilterCategory==='ACST'?'selected':'') + '>ACST</option>' +
                        '<option value="DVLMNT" ' + (ganttFilterCategory==='DVLMNT'?'selected':'') + '>DVLMNT</option>' +
                        '<option value="Personal" ' + (ganttFilterCategory==='Personal'?'selected':'') + '>Personal</option>' +
                    '</select>' +
                '</div>' +
                '<div><label style="font-size:11px;font-weight:600;color:var(--text-3);margin-right:8px;">Person:</label>' +
                    '<select onchange="ganttFilterPerson=this.value;renderGantt()" style="font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-xs);">' +
                        '<option value="all" ' + (ganttFilterPerson==='all'?'selected':'') + '>All</option>' +
                        allAssignees.map(p => '<option value="' + p + '" ' + (ganttFilterPerson===p?'selected':'') + '>' + p + '</option>').join('') +
                    '</select>' +
                '</div>' +
                '<div style="display:flex;gap:4px;margin-left:auto;">' +
                    '<button class="btn" onclick="ganttWeeks=2;renderGantt()" style="font-size:10px;' + (ganttWeeks===2?'background:var(--accent);color:white;border-color:var(--accent);':'') + '">2 Weeks</button>' +
                    '<button class="btn" onclick="ganttWeeks=4;renderGantt()" style="font-size:10px;' + (ganttWeeks===4?'background:var(--accent);color:white;border-color:var(--accent);':'') + '">1 Month</button>' +
                    '<button class="btn" onclick="ganttWeeks=13;renderGantt()" style="font-size:10px;' + (ganttWeeks===13?'background:var(--accent);color:white;border-color:var(--accent);':'') + '">3 Months</button>' +
                '</div>' +
            '</div>';

            // Split panel: left fixed (320px) + right scrollable
            html += '<div style="display:flex;flex:1;overflow:hidden;">';

            // ── LEFT PANEL (fixed 320px) ──────────────────────────────────────────
            html += '<div style="width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);">' +
                '<div style="padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface-2);font-size:11px;font-weight:600;display:flex;gap:8px;">Name · Assignee · %</div>' +
                '<div style="flex:1;overflow-y:auto;">';

            filtered.forEach((item, idx) => {
                const progress = getItemProgress(item);
                const typeIcon = item.type === 'project' ? '📋' : '✓';
                const catColor = item.category === 'ACST' ? '#DC2626' : item.category === 'DVLMNT' ? '#059669' : '#2563EB';
                const assignee = (item.raci?.R && item.raci.R[0]) || (item.assignees && item.assignees[0]) || 'Unassigned';
                const bgColor = idx % 2 === 0 ? 'transparent' : 'var(--surface-2)';
                const statusBadge = item.status === 'done' ? '<span style="font-size:9px;font-weight:600;padding:2px 6px;background:var(--success);color:white;border-radius:3px;text-transform:uppercase;">Done</span>' :
                    item.status === 'waiting' ? '<span style="font-size:9px;font-weight:600;padding:2px 6px;background:var(--warn);color:white;border-radius:3px;text-transform:uppercase;">Waiting</span>' :
                    item.status === 'active' ? '<span style="font-size:9px;font-weight:600;padding:2px 6px;background:var(--accent);color:white;border-radius:3px;text-transform:uppercase;">Active</span>' : '';

                html += '<div style="padding:8px 12px;border-bottom:1px solid var(--border);background:' + bgColor + ';height:36px;display:flex;align-items:center;justify-content:space-between;font-size:11px;">' +
                    '<div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">' +
                        '<span style="font-size:10px;color:' + catColor + ';flex-shrink:0;">●</span>' +
                        '<span style="flex-shrink:0;">' + typeIcon + '</span>' +

                    '</div>' +

            });

            html += '</div></div>';

            // ── RIGHT PANEL (scrollable both ways) ──────────────────────────────
            html += '<div style="flex:1;overflow:auto;" id="ganttRight">';

            // Timeline header (sticky)
            // Dynamically scale day width to fill available screen area
            const availableWidth = Math.max((window.innerWidth || 1200) - 400, 500); // subtract sidebar+left panel
            // totalDays already declared above from ganttWeeks * 7
            const pxPerDay = Math.max(8, Math.floor(availableWidth / totalDays));

            html += '<div style="min-width:' + totalPx + 'px;background:var(--bg);border-bottom:2px solid var(--border);display:flex;">';

                // Day-level header
                for (let d = 0; d < totalDays; d++) {
                    const day = new Date(startTime + d * 86400000);

                    const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];

                        '<div>' + dayNames[day.getDay()] + '</div><div>' + day.getDate() + '</div></div>';
                }
            } else {
            for (let w = 0; w < ganttWeeks; w++) {
                const weekStart = new Date(startTime + w * 7 * 86400000);
                const monthStr = (weekStart.getMonth() + 1).toString().padStart(2,'0');
                const dateStr = weekStart.getDate().toString().padStart(2,'0');
                html += '<div style="width:50px;flex-shrink:0;text-align:center;padding:6px 2px;border-right:1px solid var(--border);font-size:9px;color:var(--text-3);font-weight:600;">' +
                    'W' + (w+1) + '<div style="font-size:8px;color:var(--text-3);">' + monthStr + '/' + dateStr + '</div>' +
                '</div>';
            }
            } // close else (week headers) block
            html += '</div>';

            // Gantt rows — each row is position:relative with bar inside
            filtered.forEach(function(item, idx) {
                var startDate = item.startDate || item.dueDate;
                var endDate = item.dueDate || item.startDate;
                var itemStartTime = new Date(startDate).getTime();
                var itemEndTime = new Date(endDate).getTime();

                var startDayOffset = Math.max(0, (itemStartTime - startTime) / 86400000);
                var endDayOffset = Math.min(totalDays, (itemEndTime - startTime) / 86400000 + 1);
                var barStartPx = Math.round(startDayOffset * pxPerDay);
                var barWidthPx = Math.max(20, Math.round((endDayOffset - startDayOffset) * pxPerDay));

                var progress = getItemProgress(item);
                var progressPct = progress.total > 0 ? Math.round(progress.done / progress.total * 100) : 0;
                var catColor = item.category === 'ACST' ? '#DC2626' : item.category === 'DVLMNT' ? '#059669' : '#2563EB';
                var bgColor = idx % 2 === 0 ? 'transparent' : 'var(--surface-2)';

                    '<div style="position:absolute;top:4px;left:' + barStartPx + 'px;width:' + barWidthPx + 'px;height:28px;background:' + catColor + ';border-radius:4px;cursor:move;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.12);" ' +
                        'onmousedown="startGanttDrag(event,\'' + item.id + '\',\'bar\')" title="' + item.title + '">' +
                        '<div style="position:absolute;left:0;width:6px;height:100%;cursor:ew-resize;" onmousedown="event.stopPropagation();startGanttDrag(event,\'' + item.id + '\',\'left\')"></div>' +
                        '<div style="position:absolute;right:0;width:6px;height:100%;cursor:ew-resize;" onmousedown="event.stopPropagation();startGanttDrag(event,\'' + item.id + '\',\'right\')"></div>' +
                        (progress.total > 0 ? '<div style="position:absolute;top:0;left:0;bottom:0;width:' + progressPct + '%;background:rgba(255,255,255,.25);border-radius:4px 0 0 4px;"></div>' : '') +
                        '<span style="color:#fff;font-size:9px;font-weight:600;padding:0 8px;position:relative;z-index:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
                            (barWidthPx > 50 ? item.title.substring(0, Math.floor(barWidthPx / 7)) : '') +
                        '</span>' +
                    '</div>' +
                '</div>';
            });

            html += '</div></div>';
            inner.innerHTML = html;
        }

        function startGanttDrag(e, itemId, handle) {
            e.preventDefault();
            e.stopPropagation();
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            ganttDragState = {
                itemId, handle,
                startX: e.clientX,
                startDate: item.startDate || item.dueDate,
                dueDate: item.dueDate || item.startDate
            };
            document.addEventListener('mousemove', ganttDragMove);
            document.addEventListener('mouseup', ganttDragEnd);
        }

        function ganttDragMove(e) {
            if (!ganttDragState) return;
            e.preventDefault();
            const deltaX = e.clientX - ganttDragState.startX;
            const pixelsPerDay = 50;
            const daysDelta = Math.round(deltaX / pixelsPerDay);
            const item = items.find(i => i.id === ganttDragState.itemId);
            if (!item) return;

            const startD = new Date(ganttDragState.startDate);
            const endD = new Date(ganttDragState.dueDate);
            if (ganttDragState.handle === 'left') {
                startD.setDate(startD.getDate() + daysDelta);
                item.startDate = startD.toISOString().split('T')[0];
            } else if (ganttDragState.handle === 'right') {
                endD.setDate(endD.getDate() + daysDelta);
                item.dueDate = endD.toISOString().split('T')[0];
            } else {
                startD.setDate(startD.getDate() + daysDelta);
                endD.setDate(endD.getDate() + daysDelta);
                item.startDate = startD.toISOString().split('T')[0];
                item.dueDate = endD.toISOString().split('T')[0];
            }
        }

        function ganttDragEnd(e) {
            if (!ganttDragState) return;
            document.removeEventListener('mousemove', ganttDragMove);
            document.removeEventListener('mouseup', ganttDragEnd);
            saveData();
            renderGantt();
            ganttDragState = null;
        }

        function evtColorFn(evt) {
            const map = { meeting: '#3B82F6', trip: '#8B5CF6', event: '#F59E0B', personal: '#10B981', work: '#EF4444' };
            return map[evt.category] || '#6366F1';
        }

        function getEventInstances(evt, fromDateStr, toDateStr) {
            const results = [];
            const from = new Date(fromDateStr + 'T00:00:00');
            const to = new Date(toDateStr + 'T23:59:59');
            if (!evt.startDate) return results;
            const overrideMap = {};
            (evt.overrides || []).forEach(o => { overrideMap[o.recurrenceId] = o; });
            function addInstance(dateStr) {
                const d = new Date(dateStr + 'T00:00:00');
                if (d < from || d > to) return;
                const override = overrideMap[dateStr] || null;
                if (override && override.isCancelled) return;
                const effectiveEvt = override ? { ...evt, ...override, id: evt.id } : evt;
                results.push({ event: effectiveEvt, instanceDate: override ? (override.overrideDate || dateStr) : dateStr });
            }
            if (!evt.recurrence || evt.recurrence.type === 'none') {
                if (evt.endDate && evt.endDate > evt.startDate) {
                    const spanCur = new Date(evt.startDate + 'T00:00:00');
                    const spanEnd = new Date(evt.endDate + 'T00:00:00');
                    while (spanCur <= spanEnd) {
                        addInstance(spanCur.toISOString().split('T')[0]);
                        spanCur.setDate(spanCur.getDate() + 1);
                    }
                } else {
                    addInstance(evt.startDate);
                }
            } else {
                const rule = evt.recurrence;
                const cur = new Date(evt.startDate + 'T00:00:00');
                const limit = new Date(toDateStr + 'T23:59:59');
                let count = 0;
                while (cur <= limit && count < 500) {
                    const dStr = cur.toISOString().split('T')[0];
                    addInstance(dStr);
                    count++;
                    if (rule.type === 'daily') cur.setDate(cur.getDate() + (rule.interval || 1));
                    else if (rule.type === 'weekly') cur.setDate(cur.getDate() + 7 * (rule.interval || 1));
                    else if (rule.type === 'monthly') cur.setMonth(cur.getMonth() + (rule.interval || 1));
                    else if (rule.type === 'yearly') cur.setFullYear(cur.getFullYear() + (rule.interval || 1));
                    else break;
                    if (rule.endDate && cur > new Date(rule.endDate + 'T23:59:59')) break;
                    if (rule.count && count >= rule.count) break;
                }
            }
            return results;
        }

        function getEventsForDate(dateStr) {
            const results = [];
            events.forEach(evt => {
                getEventInstances(evt, dateStr, dateStr).forEach(i => results.push(i.event));
            });
            results.sort((a, b) => (a.startTime || '00:00').localeCompare(b.startTime || '00:00'));
            return results;
        }

        function getUpcomingEvents(count, fromDateStr) {
            const results = [];
            const from = new Date(fromDateStr + 'T00:00:00');
            const to = new Date(from.getTime() + 180 * 86400000);
            const toStr = to.toISOString().split('T')[0];
            const seenSpanIds = new Set();
            events.forEach(evt => {
                const isSpanning = evt.endDate && evt.endDate > evt.startDate &&
                    (!evt.recurrence || evt.recurrence.type === 'none');
                getEventInstances(evt, fromDateStr, toStr).forEach(i => {
                    if (isSpanning) {
                        if (!seenSpanIds.has(evt.id)) {
                            seenSpanIds.add(evt.id);
                            results.push({ ...i.event, _instanceDate: evt.startDate });
                        }
                    } else {
                        results.push({ ...i.event, _instanceDate: i.instanceDate });
                    }
                });
            });
            results.sort((a, b) => {
                const da = a._instanceDate || a.startDate || '';
                const db = b._instanceDate || b.startDate || '';
                if (da !== db) return da.localeCompare(db);
                return (a.startTime || '').localeCompare(b.startTime || '');
            });
            return results.slice(0, count);
        }

        function fmtEvtTime(evt) {
            if (!evt.startTime) return '';
            let s = evt.startTime;
            if (evt.endTime) s += '\u2013' + evt.endTime;

        }

            // Build weeks array: each week is array of day-numbers (null = empty cell)
            const startDow = firstDay.getDay();

            const weeks = [];

            // Identify multi-day spanning events (no recurrence, endDate > startDate)

                evt.endDate && evt.endDate > evt.startDate &&

            // Render each week

                const validDates = weekDateStrs.filter(Boolean);
                if (validDates.length === 0) return;

                // Find spanning events that touch this week
                const weekSpanners = spanEvts.filter(evt =>
                    evt.startDate <= weekMax && evt.endDate >= weekMin
                );

                                // Day cells row
                h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">';

                    const dayEvts = getEventsForDate(dStr);
                    const tasksDue = items.filter(i => i.dueDate === dStr && i.type !== 'habit' && i.status !== 'done');

                    h += '<div style="min-height:70px;background:' + (isToday ? 'var(--accent-subtle)' : 'var(--surface)') + ';border:1px solid ' + (isToday ? 'var(--accent)' : 'var(--border)') + ';border-radius:6px;padding:6px;cursor:pointer;overflow:hidden;" onclick="openEventModal(null,\'' + dStr + '\')">' +
                        '<div style="font-size:12px;font-weight:' + (isToday ? '800' : '600') + ';color:' + (isToday ? 'var(--accent)' : 'var(--text)') + ';margin-bottom:4px;">' + day + '</div>';

                        const ec = evtColorFn(evt);
                        h += '<div style="font-size:9px;font-weight:600;padding:2px 4px;background:' + ec + ';color:white;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;" onclick="event.stopPropagation();openEventModal(\'' + evt.id + '\',\'' + dStr + '\')">' + evt.title + '</div>';
                    });
                    if (dayEvts.length > 2) h += '<div style="font-size:9px;color:var(--text-3);">+' + (dayEvts.length - 2) + ' more</div>';

                    h += '</div>';
                });
                h += '</div>';
            });

            // Legend
            h += '<div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;">';
            [['meeting','#3B82F6','Meeting'],['trip','#8B5CF6','Trip'],['event','#F59E0B','Event'],['personal','#10B981','Personal'],['work','#EF4444','Work']].forEach(function(x) {
                h += '<div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;border-radius:50%;background:' + x[1] + ';"></div><span style="font-size:10px;color:var(--text-2);">' + x[2] + '</span></div>';
            });
            h += '<div style="display:flex;align-items:center;gap:4px;"><div style="width:5px;height:5px;border-radius:50%;background:var(--accent);"></div><span style="font-size:10px;color:var(--text-2);">Task due</span></div>';
            h += '</div></div>';

        function openEventModal(eventId, instanceDate) {
            const existing = eventId ? events.find(function(e) { return e.id === eventId; }) : null;
            const override = existing && instanceDate ? (existing.overrides || []).find(function(o) { return o.recurrenceId === instanceDate; }) : null;
            const data = override ? Object.assign({}, existing, override) : (existing || {});
            const prefillDate = instanceDate || new Date().toISOString().split('T')[0];
            const isEdit = !!existing;
            const hasRecurrence = existing && existing.recurrence && existing.recurrence.type !== 'none';
            const m = document.createElement('div');
            m.id = 'eventModal';
            m.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;';
            const saveBtnLabel = isEdit && hasRecurrence ? (instanceDate ? 'Save This Occurrence' : 'Save All') : 'Save Event';
