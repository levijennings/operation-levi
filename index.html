        async function generateAISummary() {
            const apiKey = localStorage.getItem('operation_levi_apikey');
            if (!apiKey) { showToast('Set API key in settings first'); return; }
            const box = document.getElementById('aiSummaryBox');
            if (!box) return;
            box.style.display = 'block';
            box.textContent = '⏳ Generating AI briefing…';
            const overdue = items.filter(i => i.dueDate && new Date(i.dueDate) < new Date() && i.status !== 'done');
            const thisWeek = items.filter(i => i.status === 'thisweek');
            const waiting = items.filter(i => i.status === 'waiting');
            const active = items.filter(i => i.status === 'active');
            const prompt = `You are an executive assistant for Levi, a startup founder. Give a sharp, motivating 3-4 sentence morning briefing for today (${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}). Be direct and actionable.\n- Overdue (${overdue.length}): ${overdue.map(i=>i.title).join(', ')||'none'}\n- This week (${thisWeek.length}): ${thisWeek.map(i=>i.title).join(', ')||'none'}\n- Active (${active.length}): ${active.map(i=>i.title).join(', ')||'none'}\n- Waiting (${waiting.length}): ${waiting.map(i=>i.title+(i.waitingFrom?' (from '+i.waitingFrom+')':'')).join(', ')||'none'}\nRespond with only the briefing.`;
            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
                    body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,messages:[{role:'user',content:prompt}]})
                });
                const data = await res.json();
                if (data.error) {
                    box.textContent = 'API error: ' + (data.error.message || JSON.stringify(data.error));
                    return;
                }
                box.textContent = data.content?.[0]?.text || 'Could not generate summary.';
            } catch(e) {
                console.error('AI summary error:', e);
                box.textContent = 'Summary error: ' + e.message + '. Check console for details.';
            }
        }

        function uploadDocuments() {
            const it = items.find(i => i.id === selectedItemId);
            if (!it) return;
            if (!it.documents) it.documents = [];
            const input = document.getElementById('docUploadInput');
            const files = input.files;
            let processed = 0;
            const MAX_FILE_SIZE = 2 * 1024 * 1024; // 2 MB per file (localStorage safe)
            Array.from(files).forEach(file => {
                if (file.size > MAX_FILE_SIZE) {
                    showToast('⚠️ "' + file.name + '" is too large (max 2 MB)');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    it.documents.push({
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: e.target.result,
                        uploadedAt: new Date().toISOString()
                    });
                    addTimelineEntry(it.id, 'Uploaded document: ' + file.name);
                    processed++;
                    if (processed === files.length) {
                        saveData();
                        openDetail(selectedItemId);
                    }
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function autoDistributeWeights(itemId) {
            const it = items.find(i => i.id === itemId);
            if (!it || !it.subtasks || it.subtasks.length === 0) return;
            const taskSubs = it.subtasks.filter(s => s.type !== 'question');
            const count = taskSubs.length;
            if (count === 0) return;
            const base = Math.floor(100 / count);
            const remainder = 100 - (base * count);
            let taskIdx = 0;
            it.subtasks.forEach(s => {
                if (s.type === 'question') { s.weight = 0; return; }
                s.weight = base + (taskIdx < remainder ? 1 : 0);
                taskIdx++;
            });
        }

        function getHabitStreak(item) {
            if (item.type !== 'habit' || !item.habitCompletions) return 0;
            const today = new Date();
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const d = new Date(today.getTime() - i * 86400000);
                const dayOfWeek = d.getDay();
                // Skip weekends (Saturday=6, Sunday=0) unless it's the first day checked
                if (i > 0 && (dayOfWeek === 0 || dayOfWeek === 6)) {
                    continue;
                }
                const dateStr = d.toISOString().split('T')[0];
                const entry = item.habitCompletions.find(c => c.date === dateStr);
                if (entry) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            return streak;
        }

                return;
            }
            const matches = items.filter(i =>
                i.title.toLowerCase().includes(query) ||
                (i.notes||'').toLowerCase().includes(query) ||
                (i.deliverable||'').toLowerCase().includes(query) ||
                (i.category||'').toLowerCase().includes(query)
            ).slice(0, 14);

                container.innerHTML = '<div class="search-empty">No results for <strong>"' + q + '"</strong></div>';

            const highlight = (text) => {
                if (!query) return text;
                return text.replace(new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark style="background:rgba(255,213,0,.3);border-radius:2px;">$1</mark>');
            };
            return `<div class="search-result" data-idx="${idx}" onclick="closeSearch();openDetail('${item.id}')">
                <span style="font-size:14px;flex-shrink:0;">${typeIcon}</span>
                <div style="flex:1;min-width:0;">
                    <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${highlight(item.title)}</div>

                </div>
                ${item.status==='done'?'<span style="font-size:10px;color:var(--success);">✓</span>':''}
            </div>`;
        }

        function handleSearchKey(e) {
            const results = document.querySelectorAll('.search-result');
            if (e.key === 'Escape') { closeSearch(); return; }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                _searchFocusIdx = Math.min(_searchFocusIdx + 1, results.length - 1);
                results.forEach((r,i) => r.classList.toggle('focused', i === _searchFocusIdx));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                _searchFocusIdx = Math.max(_searchFocusIdx - 1, 0);
                results.forEach((r,i) => r.classList.toggle('focused', i === _searchFocusIdx));
            } else if (e.key === 'Enter' && _searchFocusIdx >= 0) {
                results[_searchFocusIdx]?.click();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // NATURAL LANGUAGE CAPTURE
        // ═══════════════════════════════════════════════════════════════════════════
        function parseNaturalLanguage(text) {
            let title = text.trim();
            let dueDate = '';
            let timeEstimate = 0;
            let category = '';
            let status = 'backlog';

            // Category
            const catMatch = title.match(/\b(ACST|DVLMNT|Personal)\b/i);
            if (catMatch) {
                category = catMatch[1].charAt(0).toUpperCase() + catMatch[1].slice(1).toLowerCase();
                if (category.toUpperCase() === 'ACST') category = 'ACST';
                else if (category.toUpperCase() === 'DVLMNT') category = 'DVLMNT';
                else category = 'Personal';
                title = title.replace(catMatch[0], '').trim();
            }

            // Time estimate: "2h", "30m", "1.5h"
            const timeMatch = title.match(/(\d+(?:\.\d+)?)\s*h(?:our)?s?\b/i);
            if (timeMatch) {
                timeEstimate = parseFloat(timeMatch[1]);
                title = title.replace(timeMatch[0], '').trim();
            }

            // Status shortcuts: "#today", "#active", "#week"
            const statMatch = title.match(/#(today|active|week|thisweek|backlog|done)\b/i);
            if (statMatch) {
                const sm = statMatch[1].toLowerCase();
                status = sm === 'week' ? 'thisweek' : sm === 'thisweek' ? 'thisweek' : sm;
                title = title.replace(statMatch[0], '').trim();
            }

            // Due date: "by Apr 24", "due Friday", "by tomorrow", "by next Monday"
            const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
            const monthNames = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
            const byMatch = title.match(/\b(?:by|due)\s+(.+?)(?:,|$)/i);
            if (byMatch) {
                const ds = byMatch[1].trim().toLowerCase();
                const today = new Date();
                if (ds === 'today') {
                    dueDate = today.toISOString().split('T')[0];
                } else if (ds === 'tomorrow') {
                    const t = new Date(today); t.setDate(t.getDate()+1);
                    dueDate = t.toISOString().split('T')[0];
                } else if (dayNames.includes(ds.replace('next ','').replace('this ',''))) {
                    const target = dayNames.indexOf(ds.replace('next ','').replace('this ',''));
                    const t = new Date(today);
                    let diff = target - t.getDay();
                    if (diff <= 0 || ds.startsWith('next')) diff += 7;
                    t.setDate(t.getDate() + diff);
                    dueDate = t.toISOString().split('T')[0];
                } else {
                    // Try "Apr 24" or "4/24" or "2026-04-24"
                    const mMatch = ds.match(/^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s+(\d{1,2})/i);
                    if (mMatch) {
                        const mi = monthNames.indexOf(mMatch[1].toLowerCase().substring(0,3));
                        const day = parseInt(mMatch[2]);
                        const year = today.getMonth() > mi ? today.getFullYear()+1 : today.getFullYear();
                        dueDate = `${year}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    }
                    const slashMatch = ds.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
                    if (slashMatch) {
                        const m = parseInt(slashMatch[1]);
                        const d = parseInt(slashMatch[2]);
                        const y = slashMatch[3] ? (slashMatch[3].length===2?2000+parseInt(slashMatch[3]):parseInt(slashMatch[3])) : today.getFullYear();
                        dueDate = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    }
                }
                title = title.replace(byMatch[0], '').trim();
            }

            // Clean trailing commas/spaces
            title = title.replace(/[,;]+$/, '').trim();
            return { title: title || text.trim(), dueDate, timeEstimate, category, status };
        }

        // Override newItemQuickAdd to use NL parser
        function newItemQuickAdd(statusOrCol, category) {
            const raw = prompt('Quick capture — what needs to be done?\n\nTips: "finish deck by Friday, 2h, DVLMNT" or "#today redesign homepage"', '');
            if (!raw || !raw.trim()) return;
            const parsed = parseNaturalLanguage(raw);
            const title = parsed.title;
            const finalCat = parsed.category || category || 'DVLMNT';
            const finalStatus = statusOrCol && statusOrCol !== '' ? statusOrCol : (parsed.status || 'backlog');
            const now = new Date().toISOString().split('T')[0];
            const newId = 'qi' + Date.now().toString(36);
            const newItem = {
                id: newId, type: 'task', title: title.trim(),
                category: finalCat, status: finalStatus,
                startDate: now, dueDate: parsed.dueDate || '',
                deliverable: '', notes: '', priority: 0,
                timeEstimate: parsed.timeEstimate || 0, tshirtSize: 'XS',
                raci: { R: ['Levi'], A: 'Levi', C: [], I: [] },
                assignees: ['Levi'], responsible: 'Levi', informed: [],
                involved: [], approver: '', informedWhenComplete: [],
                waitingOn: '', waitingFrom: '', waitingExpected: '',
                goalIds: [], approvers: [], meetings: [], subtasks: [],

                recurring: false, recurringFrequency: '',

        // PUSH NOTIFICATIONS
        // ═══════════════════════════════════════════════════════════════════════════
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                showToast('Notifications not supported in this browser', 'error'); return;
            }
            const perm = await Notification.requestPermission();
            if (perm === 'granted') {
                showToast('✓ Notifications enabled');
                checkAndFireNotifications();
            } else {
                showToast('Notifications blocked — check browser settings', 'error');
            }
            openSettingsModal(); // refresh to show new status
        }

        function checkAndFireNotifications() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            const today = new Date().toISOString().split('T')[0];
            const overdue = items.filter(i => i.dueDate && i.dueDate < today && i.status !== 'done' && i.type !== 'habit');
            const dueToday = items.filter(i => i.dueDate === today && i.status !== 'done' && i.type !== 'habit');
            if (overdue.length > 0) {
                new Notification('⚠️ Levi\'s Projects — Overdue', {
                    body: `${overdue.length} item${overdue.length>1?'s':''} overdue: ${overdue.slice(0,2).map(i=>i.title).join(', ')}${overdue.length>2?' + more':''}`,
                    tag: 'overdue'
                });
            } else if (dueToday.length > 0) {
                new Notification('📋 Levi\'s Projects — Due Today', {
                    body: `${dueToday.length} item${dueToday.length>1?'s':''} due today. You've got this.`,
                    tag: 'duetoday'
                });
            }
        }

        // COPY TASK DETAILS TO CLIPBOARD
        // ═══════════════════════════════════════════════════════════════════════════
        function copyTaskDetails(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            const lines = [
                `📋 ${item.title}`,
                item.category ? `🏷  ${item.category}` : '',
                `📊 Status: ${item.status}`,
                item.dueDate ? `📅 Due: ${formatDate(item.dueDate)}` : '',
                item.assignees?.length ? `👤 Assigned: ${item.assignees.join(', ')}` : '',
                item.timeEstimate ? `⏱  Est: ${item.timeEstimate}h` : '',
                item.deliverable ? `\n🎯 Deliverable:\n${item.deliverable}` : '',
                item.notes ? `\n📝 Notes:\n${item.notes}` : '',
                item.dueDate ? `\nDue: ${formatDate(item.dueDate)}` : '',
            ].filter(Boolean);
            const text = lines.join('\n');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => showToast('✓ Task details copied to clipboard'));
            } else {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✓ Copied');
            }
        }

        function commitLogTime(itemId) {
            const item = items.find(i => i.id === itemId);

            if (totalMins <= 0) { showToast('Enter a time amount', 'error'); return; }

            item.timeLog.push({ date: new Date().toISOString().split('T')[0], minutes: totalMins, note });

        // ═══════════════════════════════════════════════════════════════════════════
        function createNextRecurrence(item) {
            if (!item.recurring || !item.recurringFrequency || item.type === 'habit') return;
            const freq = item.recurringFrequency;
            const baseDateStr = item.dueDate || new Date().toISOString().split('T')[0];
            const base = new Date(baseDateStr + 'T00:00:00');
            let next = new Date(base);
            if (freq === 'daily') next.setDate(base.getDate() + 1);
            else if (freq === 'weekly') next.setDate(base.getDate() + 7);
            else if (freq === 'biweekly') next.setDate(base.getDate() + 14);
            else if (freq === 'monthly') next.setMonth(base.getMonth() + 1);
            else if (freq === 'quarterly') next.setMonth(base.getMonth() + 3);
            else return;
            const nextDateStr = next.toISOString().split('T')[0];
            // Don't duplicate if one already exists
            const exists = items.find(i => i.templateId === ('recur_' + item.id) && i.dueDate === nextDateStr && i.status !== 'done');
            if (exists) return;
            const newId = 'r' + Date.now().toString(36);
            items.push({
                ...item,
                id: newId, status: 'backlog',
                dueDate: nextDateStr, startDate: '',
                subtasks: item.subtasks.map(s=>({...s,done:false})),
                habitCompletions: [], timeLog: [],
                completedAt: '', columnEnteredAt: Date.now(),
                timeline: [{date:new Date().toISOString().split('T')[0],action:`Auto-created from recurring task (${freq})`,author:'System'}],
                templateId: 'recur_' + item.id
            });
            showToast(`↻ Next recurrence created: ${nextDateStr}`);
        }

        // Recurring-task hook is now inlined directly into saveCurrentDetail() above
        // (removed the function-declaration override — it caused hoisting conflicts)

        // ═══════════════════════════════════════════════════════════════════════════
        // ANALYTICS VIEW
        // ═══════════════════════════════════════════════════════════════════════════
        function renderAnalytics() {
            const container = document.getElementById('analyticsView');
            const now = new Date();
            const today = now.toISOString().split('T')[0];

            // Build last 12 weeks of data
            const weeks = [];
            for (let w = 11; w >= 0; w--) {
                const wStart = new Date(now);
                wStart.setDate(now.getDate() - now.getDay() - (w * 7));
                wStart.setHours(0,0,0,0);
                const wEnd = new Date(wStart);
                wEnd.setDate(wStart.getDate() + 6);
                wEnd.setHours(23,59,59,999);
                const wStartStr = wStart.toISOString().split('T')[0];
                const wEndStr = wEnd.toISOString().split('T')[0];
                const label = wStart.toLocaleDateString('en-US',{month:'short',day:'numeric'});

                // Items completed this week (using completedAt or history)
                const completed = items.filter(i =>
                    i.completedAt && i.completedAt >= wStartStr && i.completedAt <= wEndStr
                ).length;
                // Also count from dailyHistory if available
                const histCompleted = (dailyHistory || []).filter(h =>
                    h.date >= wStartStr && h.date <= wEndStr
                ).reduce((s,h) => s + (h.completed||0), 0);

                const total = completed || histCompleted;
                weeks.push({ label, completed: total, wStart: wStartStr });
            }

            const maxCompleted = Math.max(...weeks.map(w=>w.completed), 1);

            // Category breakdown
            const catCounts = {ACST:0, DVLMNT:0, Personal:0};
            const catDone = {ACST:0, DVLMNT:0, Personal:0};
            items.filter(i=>i.type!=='habit').forEach(i=>{
                if (catCounts[i.category] !== undefined) {
                    catCounts[i.category]++;
                    if (i.status === 'done') catDone[i.category]++;
                }
            });

            // Overdue count
            const overdue = items.filter(i => i.dueDate && i.dueDate < today && i.status !== 'done' && i.type !== 'habit');

            // Velocity (avg completions per week over last 4 weeks)
            const last4 = weeks.slice(-4);
            const avgVelocity = last4.length > 0 ? (last4.reduce((s,w)=>s+w.completed,0)/last4.length).toFixed(1) : 0;

            // Total logged time
            const totalLoggedMins = items.reduce((s,i)=>(i.timeLog||[]).reduce((ss,e)=>ss+(e.minutes||0),0)+s, 0);
            const fmtMins = m => m>=60?(m/60).toFixed(1)+'h':m+'m';

            // Status breakdown
            const statuses = ['backlog','thisweek','active','today','waiting','review','done'];
            const statusLabels = {backlog:'Backlog',thisweek:'This Week',active:'Active',today:'Today',waiting:'Waiting',done:'Done'};
            const statusColors = {backlog:'var(--text-3)',thisweek:'var(--personal)',active:'var(--accent)',today:'var(--acst)',waiting:'var(--warn)',done:'var(--success)'};
            const statusCounts = {};
            statuses.forEach(s => statusCounts[s] = items.filter(i=>i.status===s&&i.type!=='habit').length);
            const totalItems = Object.values(statusCounts).reduce((a,b)=>a+b,0)||1;

            let html = `<div style="padding:24px 28px;max-width:1000px;">
                <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;">
                    <div>
                        <h2 style="margin:0 0 4px 0;">Analytics</h2>
                        <div style="font-size:12px;color:var(--text-3);">Your productivity at a glance</div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn" onclick="openTemplateModal()" style="font-size:12px;">📐 Templates</button>
                    </div>
                </div>

                <!-- Stat cards -->
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;">
                    ${[
                        {label:'Total Items',val:totalItems-statusCounts.done,sub:'active',color:'var(--accent)'},
                        {label:'Completed',val:statusCounts.done,sub:'all time',color:'var(--success)'},
                        {label:'Overdue',val:overdue.length,sub:'need attention',color:overdue.length>0?'var(--danger)':'var(--text-3)'},
                        {label:'Avg / Week',val:avgVelocity,sub:'completions (4wk)',color:'var(--personal)'},
                    ].map(c=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;">
                        <div style="font-size:28px;font-weight:800;color:${c.color};line-height:1;margin-bottom:4px;">${c.val}</div>
                        <div style="font-size:11px;font-weight:600;color:var(--text);">${c.label}</div>
                        <div style="font-size:10px;color:var(--text-3);">${c.sub}</div>
                    </div>`).join('')}
                </div>

                <!-- Completions chart — last 12 weeks -->
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;">
                    <div style="font-size:13px;font-weight:700;margin-bottom:16px;">Completions — Last 12 Weeks</div>
                    ${weeks.every(w=>w.completed===0)?`<div style="text-align:center;padding:32px;color:var(--text-3);font-size:13px;">No completion data yet. Items completed will appear here as you work through them.<br><br>Tip: set <code style="background:var(--surface-2);padding:2px 6px;border-radius:4px;">completedAt</code> on items marked done to track history.</div>`:`
                    <div style="display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:8px;">
                        ${weeks.map(w=>{
                            const h = maxCompleted>0?Math.round(w.completed/maxCompleted*100):0;
                            const isCurrentWeek = weeks[weeks.length-1]===w;
                            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
                                <div style="font-size:9px;color:var(--text-3);">${w.completed||''}</div>
                                <div style="width:100%;height:${Math.max(h,2)}px;background:${isCurrentWeek?'var(--accent)':'var(--border-2)'};border-radius:3px 3px 0 0;min-height:2px;transition:height .4s;"></div>
                            </div>`;
                        }).join('')}
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-3);">
                        <span>${weeks[0].label}</span>
                        <span style="font-weight:600;color:var(--accent);">This week</span>
                    </div>`}
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
                    <!-- Status breakdown -->
                    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;">
                        <div style="font-size:13px;font-weight:700;margin-bottom:14px;">Items by Status</div>
                        ${statuses.map(s=>{
                            const count = statusCounts[s];
                            const pct = Math.round(count/totalItems*100);
                            return `<div style="margin-bottom:10px;">
                                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
                                    <span style="color:${statusColors[s]};font-weight:600;">${statusLabels[s]}</span>
                                    <span style="color:var(--text-3);">${count}</span>
                                </div>
                                <div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;">
                                    <div class="analytics-bar" style="height:100%;width:${pct}%;background:${statusColors[s]};"></div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>

                    <!-- Category breakdown -->
                    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;">
                        <div style="font-size:13px;font-weight:700;margin-bottom:14px;">Items by Category</div>
                        ${Object.entries(catCounts).map(([cat,total])=>{
                            const done = catDone[cat];
                            const pct = total>0?Math.round(done/total*100):0;
                            const color = cat==='ACST'?'var(--acst)':cat==='DVLMNT'?'var(--dvlmnt)':'var(--personal)';
                            return `<div style="margin-bottom:14px;">
                                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
                                    <span style="color:${color};font-weight:600;">${cat}</span>
                                    <span style="color:var(--text-3);">${done}/${total} done · ${pct}%</span>
                                </div>
                                <div style="height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;">
                                    <div class="analytics-bar" style="height:100%;width:${pct}%;background:${color};"></div>
                                </div>
                            </div>`;
                        }).join('')}

                        ${totalLoggedMins>0?`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
                            <div style="font-size:11px;color:var(--text-3);">Total time logged</div>
                            <div style="font-size:22px;font-weight:800;color:var(--accent);">${fmtMins(totalLoggedMins)}</div>
                        </div>`:''}
                    </div>
                </div>

                <!-- Overdue items -->
                ${overdue.length>0?`<div style="background:var(--acst-subtle);border:1px solid rgba(220,38,38,0.25);border-radius:var(--radius);padding:20px;margin-bottom:20px;">
                    <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:12px;">⚠️ Overdue Items (${overdue.length})</div>
                    ${overdue.slice(0,8).map(i=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(220,38,38,0.15);font-size:12px;">
                        <span style="flex:1;cursor:pointer;" onclick="openDetail('${i.id}')">${i.title}</span>
                        <span style="color:var(--danger);font-size:10px;">${formatDate(i.dueDate)}</span>
                        <span style="font-size:10px;color:var(--text-3);">${i.category}</span>
                    </div>`).join('')}
                    ${overdue.length>8?`<div style="font-size:11px;color:var(--text-3);margin-top:8px;">+${overdue.length-8} more</div>`:''}
                </div>`:''}

            </div>`;
            container.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // WEEKLY REVIEW MODE
        // ═══════════════════════════════════════════════════════════════════════════
        let _reviewStep = 0;
        let _reviewStalled = [];

        function startWeeklyReview() {
            const lastReview = localStorage.getItem('op_levi_last_review') || '';
            const today = new Date().toISOString().split('T')[0];
            _reviewStep = 0;
            renderWeeklyReviewStep();
        }

        function renderWeeklyReviewStep() {
            const modal = document.getElementById('modal');
            const today = new Date().toISOString().split('T')[0];
            const lastWeekStart = new Date();
            lastWeekStart.setDate(lastWeekStart.getDate() - lastWeekStart.getDay() - 7);
            const lastWeekEnd = new Date(lastWeekStart);
            lastWeekEnd.setDate(lastWeekStart.getDate() + 6);
            const lwStartStr = lastWeekStart.toISOString().split('T')[0];
            const lwEndStr = lastWeekEnd.toISOString().split('T')[0];

            const steps = ['Last Week','Stalled','Priorities','Tomorrow'];
            const stepDots = steps.map((_,i)=>`<div class="review-step ${i<_reviewStep?'done':i===_reviewStep?'active':''}"></div>`).join('');
            const header = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <h2 style="margin:0;">📋 Weekly Review</h2>
                <div style="display:flex;gap:6px;align-items:center;">${stepDots}<span style="font-size:11px;color:var(--text-3);margin-left:4px;">Step ${_reviewStep+1} of ${steps.length}</span></div>
            </div>`;

            let body = '';
            if (_reviewStep === 0) {
                // Step 1: Items completed last week
                const doneLastWeek = items.filter(i => i.completedAt >= lwStartStr && i.completedAt <= lwEndStr);
                const doneCount = doneLastWeek.length;
                body = `<div style="font-size:13px;font-weight:600;margin-bottom:8px;">✅ Completed Last Week</div>
                    <div style="font-size:24px;font-weight:800;color:var(--success);margin-bottom:12px;">${doneCount} item${doneCount!==1?'s':''}</div>
                    ${doneCount===0?'<div style="color:var(--text-3);font-size:12px;margin-bottom:16px;">No items with a completedAt date from last week. Items you mark done going forward will be tracked.</div>':''}
                    ${doneLastWeek.slice(0,6).map(i=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:8px;"><span style="color:var(--success);">✓</span>${i.title}</div>`).join('')}
                    ${doneLastWeek.length>6?`<div style="font-size:11px;color:var(--text-3);margin-top:6px;">+${doneLastWeek.length-6} more</div>`:''}`;
            } else if (_reviewStep === 1) {
                // Step 2: Stalled items (active/thisweek with no recent timeline activity)
                const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
                const weekAgoStr = weekAgo.toISOString().split('T')[0];
                _reviewStalled = items.filter(i => ['active','thisweek','today'].includes(i.status) && i.type !== 'habit' && (!i.timeline || i.timeline.length === 0 || (i.timeline[i.timeline.length-1]?.date||'') < weekAgoStr));
                body = `<div style="font-size:13px;font-weight:600;margin-bottom:8px;">⚠️ Stalled Items</div>
                    <div style="font-size:12px;color:var(--text-2);margin-bottom:12px;">These items are active but haven't had any logged activity in the past 7 days.</div>
                    ${_reviewStalled.length===0?'<div style="color:var(--success);font-size:13px;">🎉 Nothing stalled — great momentum!</div>':''}
                    ${_reviewStalled.slice(0,8).map(i=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
                        <span style="flex:1;cursor:pointer;color:var(--warn);" onclick="closeModal();openDetail('${i.id}')">${i.title}</span>
                        <button class="btn" onclick="const it=items.find(x=>x.id==='${i.id}');if(it){it.status='backlog';saveData();renderWeeklyReviewStep();}" style="font-size:10px;padding:2px 6px;">→ Backlog</button>
                    </div>`).join('')}`;
            } else if (_reviewStep === 2) {
                // Step 3: Set this week's top 3
                const active = items.filter(i=>['active','thisweek','today'].includes(i.status)&&i.type!=='habit');
                body = `<div style="font-size:13px;font-weight:600;margin-bottom:8px;">🎯 Set This Week's Top 3</div>
                    <div style="font-size:12px;color:var(--text-2);margin-bottom:12px;">Star items to pin them as your top priorities. These appear at the top of My Day.</div>
                    ${active.slice(0,10).map(i=>{
                        const isTop = (top3Manual||[]).includes(i.id);
                        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
                            <button onclick="toggleTop3('${i.id}');renderWeeklyReviewStep();" style="background:none;border:none;font-size:16px;cursor:pointer;color:${isTop?'#F59E0B':'var(--text-3)'};">${isTop?'★':'☆'}</button>
                            <span style="flex:1;">${i.title}</span>
                            <span style="font-size:10px;color:var(--text-3);">${i.status}</span>
                        </div>`;
                    }).join('')}
                    <div style="margin-top:8px;font-size:11px;color:var(--text-3);">Top 3 selected: ${(top3Manual||[]).length}</div>`;
            } else if (_reviewStep === 3) {
                // Step 4: Plan tomorrow
                const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
                const tomorrowStr = tomorrow.toISOString().split('T')[0];
                const tomorrowFmt = tomorrow.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
                const dueItems = items.filter(i=>i.dueDate===tomorrowStr&&i.status!=='done'&&i.type!=='habit');
                const todayItems = items.filter(i=>i.status==='today'&&i.type!=='habit');
                body = `<div style="font-size:13px;font-weight:600;margin-bottom:8px;">🌅 Plan ${tomorrowFmt}</div>
                    <div style="font-size:12px;color:var(--text-2);margin-bottom:12px;">Here's what's lined up. Drag items to Today on the board to commit them.</div>
                    ${dueItems.length>0?`<div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Due Tomorrow</div>
                    ${dueItems.map(i=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--acst);">📅 ${i.title}</div>`).join('')}`:''}
                    ${todayItems.length>0?`<div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:12px;margin-bottom:6px;">In Today Column</div>
                    ${todayItems.map(i=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;">🎯 ${i.title}</div>`).join('')}`:''}
                    ${dueItems.length===0&&todayItems.length===0?'<div style="color:var(--text-3);font-size:12px;">Nothing committed to tomorrow yet. Go to the Board and drag items to the Today column.</div>':''}
                    <div style="margin-top:16px;padding:12px;background:var(--accent-subtle);border-radius:var(--radius);border:1px solid var(--accent);font-size:12px;color:var(--text-2);">
                        💡 Review complete! Your top ${(top3Manual||[]).length} priorities are set. Have a great week.
                    </div>`;
            }

            const isLast = _reviewStep >= steps.length - 1;
            modal.innerHTML = header + `<div style="margin-bottom:20px;">${body}</div>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                    ${_reviewStep>0?`<button class="btn" onclick="_reviewStep--;renderWeeklyReviewStep();">← Back</button>`:''}
                    <button class="btn" onclick="closeModal()">Skip</button>
                    <button class="btn btn-primary" onclick="${isLast?`localStorage.setItem('op_levi_last_review','${today}');closeModal();showToast('✓ Weekly review complete!')`:`_reviewStep++;renderWeeklyReviewStep()`}">${isLast?'✓ Done':'Next →'}</button>
                </div>`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function toggleTop3(itemId) {
            if (!top3Manual) top3Manual = [];
            const idx = top3Manual.indexOf(itemId);
            if (idx >= 0) top3Manual.splice(idx, 1);
            else { if (top3Manual.length >= 3) top3Manual.shift(); top3Manual.push(itemId); }
            saveData();
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // TIME BLOCKING IN WEEK VIEW
        // ═══════════════════════════════════════════════════════════════════════════
        let _timeBlockMode = false;

        function toggleTimeBlockMode() {
            _timeBlockMode = !_timeBlockMode;
            renderMyWeek();
        }

        // Time-block render for a day column's scrollable area
        function renderTimeBlockedDay(dStr, due, evts, isToday) {
            const hours = [];
            for (let h = 7; h <= 21; h++) {
                const label = h === 12 ? '12pm' : h < 12 ? h+'am' : (h-12)+'pm';
                const timeKey = `${String(h).padStart(2,'0')}:00`;
                const blockedItem = due.find(i => i.scheduledTime === timeKey);
                hours.push({ h, label, timeKey, blockedItem });
            }
            const unblocked = due.filter(i => !i.scheduledTime);

            return `<div style="flex:1;overflow-y:auto;" ondragover="event.preventDefault()" ondrop="weekDragDropToTime(event,'${dStr}',null)">
                ${unblocked.length>0?`<div style="padding:4px 6px;background:var(--surface-2);border-bottom:2px solid var(--border);font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;">Unscheduled (${unblocked.length})</div>
                ${unblocked.map(item=>{
                    const dc = {ACST:'var(--acst)',DVLMNT:'var(--dvlmnt)',Personal:'var(--personal)'}[item.category]||'var(--border)';
                    return `<div draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${item.id}')" style="padding:4px 6px;font-size:10px;border-left:3px solid ${dc};background:var(--surface);cursor:move;border-bottom:1px solid var(--border);" onclick="openDetail('${item.id}')">${item.title.substring(0,32)}</div>`;
                }).join('')}`:''}
                ${hours.map(({h,label,timeKey,blockedItem})=>{
                    const dc = blockedItem ? ({ACST:'var(--acst)',DVLMNT:'var(--dvlmnt)',Personal:'var(--personal)'}[blockedItem.category]||'var(--border)') : 'transparent';
                    return `<div class="time-slot" style="min-height:${blockedItem?'48px':'32px'};" ondragover="event.preventDefault();this.style.background='var(--accent-subtle)'" ondragleave="this.style.background=''" ondrop="weekDragDropToTime(event,'${dStr}','${timeKey}');this.style.background=''">
                        <span class="time-slot-label">${label}</span>
                        ${blockedItem?`<div style="margin-left:28px;background:var(--surface);border-left:3px solid ${dc};padding:3px 6px;font-size:10px;border-radius:0 4px 4px 0;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" onclick="openDetail('${blockedItem.id}')">${blockedItem.title.substring(0,26)}<button onclick="event.stopPropagation();const it=items.find(i=>i.id==='${blockedItem.id}');if(it){it.scheduledTime='';saveData();renderMyWeek();}" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:9px;margin-left:4px;">✕</button></div>`:''}
                    </div>`;
                }).join('')}
            </div>`;
        }

        function weekDragDropToTime(event, dStr, timeKey) {
            event.preventDefault();
            const itemId = event.dataTransfer.getData('text/plain');
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            item.dueDate = dStr;
            item.scheduledTime = timeKey || '';
            if (['backlog','thisweek'].includes(item.status)) item.status = 'thisweek';
            addTimelineEntry(itemId, `Scheduled to ${dStr}${timeKey?' at '+timeKey:''}`);
            saveData();
            renderMyWeek();
        }

        function setupEventListeners() {
            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    switchView(e.currentTarget.dataset.view);
                });
            });
            
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-filter]').forEach(f => f.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentFilter = e.currentTarget.dataset.filter;
                    updateFilterBanner();
                    renderCurrentView();
                });
            });
            
            document.getElementById('newItemBtn').addEventListener('click', openNewItemModal);
            document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
            document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
            // Keyboard: Escape closes panels, N opens new item
            document.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); return; }
                if (e.target.matches('input,textarea,select')) return; // don't intercept inside inputs
                if (e.key === 'Escape') {
                    if (document.getElementById('searchOverlay').style.display !== 'none') { closeSearch(); return; }
                    if (document.getElementById('detailPanel').classList.contains('open')) { closeDetail(); return; }
                    if (document.getElementById('modalOverlay').classList.contains('open')) { closeModal(); return; }
                }
                if ((e.key === 'n' || e.key === 'N') && !e.metaKey && !e.ctrlKey) {
                    openNewItemModal();
                }
            });

            // Click outside the open detail panel closes it
            document.addEventListener('mousedown', (e) => {
                const dp = document.getElementById('detailPanel');
                if (!dp.classList.contains('open')) return;
                if (dp.contains(e.target)) return;
                closeDetail();
            });
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════════════════
        function showTeamAvatarSetup() {
            const modal = document.getElementById('modal');
            const allPeople = getAllAssignees();
            const avatars = JSON.parse(localStorage.getItem('op_levi_avatars') || '{}');
            let html = `<h2 style="margin-bottom:4px;">Team Photos</h2>
                <p style="color:var(--text-2);font-size:12px;margin-bottom:20px;">Click any avatar to upload a photo.</p>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:16px;">`;
            allPeople.forEach(p => {
                html += `<div style="text-align:center;cursor:pointer;" onclick="uploadAvatarAndRefreshSetup('${p}')">
                    <div style="width:64px;height:64px;margin:0 auto 8px;">${getAvatarHTML(p, 64)}</div>
                    <div style="font-size:12px;font-weight:500;">${p}</div>
                    <div style="font-size:10px;color:${avatars[p]?'var(--success)':'var(--text-3)'};">${avatars[p]?'✓ Uploaded':'Click to add'}</div>
                </div>`;
            });
            html += `</div>
                <div style="display:flex;gap:12px;margin-top:24px;justify-content:flex-end;">
                    <button class="btn btn-primary" onclick="closeModal()">Done</button>
                </div>`;
            modal.innerHTML = html;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function uploadAvatarAndRefreshSetup(name) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    const avatars = JSON.parse(localStorage.getItem('op_levi_avatars') || '{}');
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 80; canvas.height = 80;
                        const ctx = canvas.getContext('2d');
                        const size = Math.min(img.width, img.height);
                        ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 80, 80);
                        avatars[name] = canvas.toDataURL('image/jpeg', 0.8);
                        localStorage.setItem('op_levi_avatars', JSON.stringify(avatars));
                        showTeamAvatarSetup(); // re-render the setup modal
                        renderCurrentView();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function updateFilterBanner() {
            const banner = document.getElementById('filterBanner');
            if (!currentFilter && !currentAssignee) {
                banner.style.display = 'none';
                return;
            }
            const categoryColors = { ACST: '#EF4444', DVLMNT: '#00E5C3', Personal: '#3B82F6' };
            const categoryIcons = { ACST: '🔴', DVLMNT: '💚', Personal: '💙' };
            const color = currentFilter ? (categoryColors[currentFilter] || '#999') : '#6B7280';
            const parts = [];
            if (currentFilter) {
                const icon = categoryIcons[currentFilter] || '⊙';
                parts.push(`<span style="color:${color};font-weight:700;">${icon} ${currentFilter}</span>`);
            }
            if (currentAssignee) {
                parts.push(`<span style="font-weight:700;">👤 ${currentAssignee}</span>`);
            }
            banner.style.display = 'flex';
            banner.style.backgroundColor = color + '15';
            banner.style.borderBottomColor = color;
            document.getElementById('filterBannerContent').innerHTML = `<span style="color:var(--text-3);font-weight:600;">Viewing:</span> ` + parts.join(`<span style="color:var(--text-3);"> · </span>`);
        }

        function clearFilter() {
            currentFilter = '';
            currentAssignee = '';
            document.querySelectorAll('[data-filter]').forEach(f => f.classList.remove('active'));
            const allBtn = document.querySelector('[data-filter=""]');

        // ═══════════════════════════════════════════════════════════════════════════
        // AI ASSISTANT FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════════
        async function sendToClaudeAI() {
            const input = document.getElementById('aiChatInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            const item = items.find(i => i.id === selectedItemId);
            if (!item) return;

            const historyEl = document.getElementById('aiChatHistory');
            historyEl.innerHTML += `<div style="padding:6px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--surface-2);font-size:11px;"><strong>You:</strong> ${msg}</div>`;
            historyEl.innerHTML += `<div id="aiResponse" style="padding:6px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--accent-subtle);font-size:11px;color:var(--text-2);">Thinking...</div>`;
            historyEl.scrollTop = historyEl.scrollHeight;

            const apiKey = localStorage.getItem('operation_levi_apikey');
            if (!apiKey) {
                document.getElementById('aiResponse').innerHTML = '<strong>Claude:</strong> Set your API key first (Settings icon in sidebar).';
                return;
            }

            const context = `Item: "${item.title}" (${item.type}, ${item.category})\nStatus: ${item.status}\nDeliverable: ${item.deliverable}\nNotes: ${item.notes}\nSubtasks: ${(item.subtasks||[]).map(s=>s.title+(s.done?' ✓':'')).join(', ')||'none'}\nDue: ${item.dueDate||'none'}\nProgress: ${getItemProgress(item).pct}%`;

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
                    body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:500,messages:[{role:'user',content:`Context:\n${context}\n\nQuestion: ${msg}\n\nRespond concisely.`}]})
                });
                const data = await res.json();
                const reply = data.content?.[0]?.text || 'No response';
                document.getElementById('aiResponse').innerHTML = '<strong>Claude:</strong> ' + reply.replace(/\n/g,'<br>');
                addTimelineEntry(item.id, 'Asked Claude AI: ' + msg.substring(0,50));
            } catch(e) {
                document.getElementById('aiResponse').innerHTML = '<strong>Error:</strong> ' + e.message;
            }
        }

        async function askClaudeToWork(action) {
            const item = items.find(i => i.id === selectedItemId);
            if (!item) return;
            const apiKey = localStorage.getItem('operation_levi_apikey');
            if (!apiKey) { showToast('Set API key first'); return; }

            const context = `Item: "${item.title}" (${item.type}, ${item.category})\nDeliverable: ${item.deliverable}\nNotes: ${item.notes}\nSubtasks: ${(item.subtasks||[]).map(s=>s.title).join(', ')||'none'}`;

            let prompt = '';
            if (action === 'breakdown') prompt = `Break this item into specific subtasks (max 10). Return as a simple numbered list of task titles only, no explanations.\n\n${context}`;
            else if (action === 'brief') prompt = `Write a concise project brief for this item. Include: objective, scope, key milestones, risks, success criteria.\n\n${context}`;
            else if (action === 'risks') prompt = `Identify the top 5 risks for this item. For each, give: risk, likelihood (H/M/L), impact (H/M/L), mitigation. Be concise.\n\n${context}`;
            else if (action === 'next') prompt = `Given the current state, suggest the 3 most important next steps. Be specific and actionable.\n\n${context}`;

            const historyEl = document.getElementById('aiChatHistory');
            historyEl.innerHTML += `<div style="padding:6px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--surface-2);font-size:11px;"><strong>You:</strong> ${action === 'breakdown' ? 'Break into subtasks' : action === 'brief' ? 'Write brief' : action === 'risks' ? 'Identify risks' : 'Suggest next steps'}</div>`;
            historyEl.innerHTML += `<div id="aiResponse" style="padding:6px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--accent-subtle);font-size:11px;color:var(--text-2);">Working on it...</div>`;

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
                    body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,messages:[{role:'user',content:prompt}]})
                });
                const data = await res.json();
                const reply = data.content?.[0]?.text || 'No response';
                document.getElementById('aiResponse').innerHTML = '<strong>Claude:</strong> ' + reply.replace(/\n/g,'<br>');

                // If breakdown, offer to auto-add subtasks
                if (action === 'breakdown') {
                    const lines = reply.split('\n').filter(l => l.match(/^\d+[\.\)]/)).map(l => l.replace(/^\d+[\.\)]\s*/, '').trim()).filter(l => l.length > 0);
                    if (lines.length > 0) {
                        document.getElementById('aiResponse').innerHTML += '<br><button class="btn btn-primary" onclick="applyAISubtasks()" style="font-size:10px;margin-top:6px;">Apply these subtasks</button>';
                        window._aiSubtasks = lines;
                    }
                }
                // Always offer "Save as Resource"
                window._aiLastOutput = reply;
                window._aiLastItemId = selectedItemId;
                document.getElementById('aiResponse').innerHTML += '<br><button class="btn" onclick="saveAIOutputAsResource(window._aiLastItemId)" style="font-size:10px;margin-top:6px;">💾 Save as Resource</button>';
                addTimelineEntry(item.id, 'Claude AI: ' + action);
            } catch(e) {
                document.getElementById('aiResponse').innerHTML = '<strong>Error:</strong> ' + e.message;
            }
        }

        function saveAIOutputAsResource(itemId) {
            const it = items.find(i => i.id === (itemId || selectedItemId));
            const text = window._aiLastOutput;
            if (!it || !text) { showToast('No AI output to save'); return; }
            const title = prompt('Name this resource:', 'AI Output — ' + new Date().toLocaleDateString());
            if (!title) return;
            if (!it.documents) it.documents = [];
            it.documents.push({ id: 'ai_' + Date.now(), name: title, type: 'ai_output', content: text, size: text.length, uploadedAt: new Date().toISOString() });
            saveData();
            showToast('✓ Saved as resource');
            openDetail(it.id);
        }

        function applyAISubtasks() {
            const item = items.find(i => i.id === selectedItemId);
            if (!item || !window._aiSubtasks) return;
            window._aiSubtasks.forEach(title => {
                item.subtasks.push({ title, done: false, dueDate: '', weight: 0 });
            });
            autoDistributeWeights(item.id);
            saveData();
            openDetail(item.id); // refresh
            showToast('Added ' + window._aiSubtasks.length + ' subtasks');
        }

        async function generateDayBrief() {
            const el = document.getElementById('dayBriefContent');
            if (!el) return;
            el.textContent = 'Generating...';
            const apiKey = localStorage.getItem('operation_levi_apikey');
            if (!apiKey) { el.textContent = 'Set your Anthropic API key in Settings to enable AI briefs.'; return; }

            const todayDB = new Date(); todayDB.setHours(0,0,0,0);
            const todayStr = todayDB.toISOString().split('T')[0];
            const yesterday = new Date(todayDB.getTime() - 86400000);
            const yesterdayStr = yesterday.toISOString().split('T')[0];

            // Yesterday's completions
            const completedYesterday = items.filter(i => {
                return (i.timeline||[]).some(t => t.ts.startsWith(yesterdayStr) && t.action.includes('done'));
            });

            const overdue = items.filter(i => i.dueDate && new Date(i.dueDate) < todayDB && i.status !== 'done' && i.type !== 'habit');
            const dueToday = items.filter(i => i.dueDate && i.dueDate === todayStr && i.status !== 'done');
            const active = items.filter(i => i.status === 'active' && i.type !== 'habit');
            const waiting = items.filter(i => i.status === 'waiting');
            const habits = items.filter(i => i.type === 'habit' && i.status === 'active');
            const habitsCompletedToday = habits.filter(h => h.habitCompletions.find(c => c.date === todayStr)).length;

            const prompt = `You are Levi's executive AI assistant. Give a sharp, actionable daily brief for ${todayDB.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}.

YESTERDAY COMPLETED: ${completedYesterday.map(i=>i.title).join(', ')||'nothing tracked'}
TODAY'S AGENDA:
- Due today (${dueToday.length}): ${dueToday.map(i=>i.title).join(', ')||'none'}
- Overdue (${overdue.length}): ${overdue.map(i=>i.title).join(', ')||'none'}
- Active (${active.length}): ${active.map(i=>i.title).join(', ')||'none'}
- Waiting (${waiting.length}): ${waiting.map(i=>i.title+(i.waitingFrom?' (from '+i.waitingFrom+')':'')).join(', ')||'none'}
- Habits: ${habitsCompletedToday}/${habits.length} done so far

Format: Start with "Yesterday:" (1-2 sentences on yesterday's wins). Then "Today:" (prioritized focus for today, 2-3 sentences). Then "Watch:" (1 sentence on blockers or risks). Be motivating and direct. No bullet points.`;

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
                    body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]})
                });
                const data = await res.json();
                if (data.error) {
                    el.textContent = 'API error: ' + (data.error.message || JSON.stringify(data.error));
                    return;
                }
                el.innerHTML = (data.content?.[0]?.text || 'Could not generate brief').replace(/\n/g,'<br>');
            } catch(e) {
                console.error('AI brief error:', e);
                el.textContent = 'Brief error: ' + e.message + '. Check console for details.';
            }
        }

        async function generateWeekBrief() {
            const el = document.getElementById('weekBriefContent');
            if (!el) return;
            el.textContent = 'Generating...';
            const apiKey = localStorage.getItem('operation_levi_apikey');
            if (!apiKey) { el.textContent = 'Set your Anthropic API key in Settings to enable AI briefs.'; return; }

            const todayWB = new Date(); todayWB.setHours(0,0,0,0);
            const weekStart = new Date(todayWB);
            const dayOfWeek = weekStart.getDay();
            const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            weekStart.setDate(weekStart.getDate() + daysToMonday + (myWeekOffset * 7));

            const weekItems = items.filter(i => {
                if (!i.dueDate) return false;
                const d = new Date(i.dueDate);
                d.setHours(0,0,0,0);
                return d >= weekStart && d < new Date(weekStart.getTime() + 7*86400000);
            });

            const active = items.filter(i => i.status === 'active' && i.type !== 'habit');
            const completedThisWeek = items.filter(i => i.status === 'done');
            const goals = window.goals || [];

            const prompt = `You are Levi's executive AI assistant. Give a sharp weekly brief for week of ${weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})}.

THIS WEEK'S PRIORITIES (${weekItems.length} items due):
${weekItems.map(i=>i.title).join(', ')||'none'}

ACTIVE PROJECTS (${active.length}): ${active.map(i=>i.title).slice(0,5).join(', ')||'none'}

COMPLETED THIS WEEK: ${completedThisWeek.length} items

Format: "Focus:" (2-3 key priorities for the week). "Progress:" (1 sentence on momentum). "Risks:" (1 blockers to watch). Motivating but realistic.`;

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
                    body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]})
                });
                const data = await res.json();
                el.innerHTML = (data.content?.[0]?.text || 'Could not generate brief').replace(/\n/g,'<br>');
            } catch(e) {
                el.textContent = 'Error: ' + e.message;
            }
        }

        // Apply saved theme before first render
        (function(){
            const t = localStorage.getItem('op_levi_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
        loadData();
        // Pre-populate Claude API key if not already set
        // API key is set by user via Settings — not hardcoded
        setupEventListeners();
        renderAssigneeFilters();
        renderDashboard();

        // First-run: prompt avatar setup if no avatars exist
        const existingAvatars = JSON.parse(localStorage.getItem('op_levi_avatars') || '{}');
        if (Object.keys(existingAvatars).length === 0) {
            setTimeout(() => showTeamAvatarSetup(), 500);
        }

        // Prompt user to set their profile photo on first load
        const hasSeenProfilePrompt = localStorage.getItem('op_levi_seen_profile_prompt');
        if (!hasSeenProfilePrompt && !existingAvatars['Levi']) {
            setTimeout(() => {
                showToast('📷 Set your profile photo — click your avatar on the People page');
                localStorage.setItem('op_levi_seen_profile_prompt', 'true');
            }, 2000);
        }

        // Init: start background notification checks
        setTimeout(() => {
            if (typeof requestNotificationPermission === 'function') {
                checkAndFireNotifications();
                setInterval(checkAndFireNotifications, 5 * 60 * 1000);
            }
        }, 3000);

        // ── SUPABASE AUTH INIT ────────────────────────────────────────────────
        initAuth().catch(err => {
            console.warn('[Auth] initAuth failed:', err);
            document.getElementById('authOverlay').style.display = 'none';
        });

        // ── SERVICE WORKER ────────────────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(reg => {
                    console.log('[SW] registered, scope:', reg.scope);
                    reg.addEventListener('updatefound', () => {
                        showToast('⚡ App updated — reload for latest version');
                    });
                })
                .catch(err => console.warn('[SW] registration failed:', err));
        }
    </script>

  function parseDue(low){
    var now=new Date(); now.setHours(0,0,0,0);
    if(/\btoday\b/.test(low)) return fmt(now);
    if(/\btomorrow\b/.test(low)){ var d=new Date(now); d.setDate(d.getDate()+1); return fmt(d); }

    for(var j=0;j<cl.length;j++){ if(low.indexOf(String(cl[j]).toLowerCase())>=0){ cat=cl[j]; break; } }
    var doit=/\b(draft|write|writeup|summari[sz]e|research|generate|create|compose|prepare|email|reply|respond|outline|update|recap|brainstorm|plan)\b/.test(low);
    setMode(doit?'do-it':'track-it');
    var title=text.replace(/,?\s*(due|by|before)\s+[a-z0-9 ]+$/i,'').replace(/\s+(today|tomorrow|next week)\b/ig,'').trim();

      columnEnteredAt:Date.now(), order:999, notionUrl:'', figmaUrl:'', googleDocsUrl:'', msDocsUrl:'', msExcelUrl:'',
      execMode:mode, aiStatus:'idle', aiArtifact:null, aiUsed:null, linkedContext:[] };
    try{ if(typeof items!=='undefined' && items && items.push) items.push(it); else { closeModal(); return; } }catch(e){ closeModal(); return; }

    if(cur==='skills'){ var src=document.createElement('div'); src.style.cssText='font-size:11.5px;color:#727a88;margin:-4px 0 14px;line-height:1.6'; src.innerHTML='Browse &amp; add existing Claude skills: '+['<a href="https://github.com/anthropics/skills" target="_blank" rel="noopener" style="color:#5a9be0;text-decoration:none">anthropics/skills</a>','<a href="https://skillsmp.com" target="_blank" rel="noopener" style="color:#5a9be0;text-decoration:none">skillsmp.com</a>','<a href="https://claudemarketplaces.com" target="_blank" rel="noopener" style="color:#5a9be0;text-decoration:none">claudemarketplaces.com</a>','<a href="https://lobehub.com/skills" target="_blank" rel="noopener" style="color:#5a9be0;text-decoration:none">lobehub</a>','<a href="https://agentskills.io" target="_blank" rel="noopener" style="color:#5a9be0;text-decoration:none">agentskills.io</a>'].join(' &middot; ')+' — paste the link into a skill’s <b>Source</b> field.'; bodyEl.appendChild(src); }
    var rows=document.createElement('div'); rows.id='vlRows'; bodyEl.appendChild(rows);
    renderRows();
    function renderRows(){
      rows.innerHTML='';
      var shown=arr.filter(function(e){return matches(e,cfg);});
      if(shown.length===0){ var e=document.createElement('div'); e.className='vl-empty'; e.textContent=arr.length?'No matches.':('No '+cfg.label.toLowerCase()+' yet. Add one, or load starter examples.'); rows.appendChild(e); return; }
      shown.forEach(function(entry){
        var it=document.createElement('div'); it.className='vl-item';
        var ic=document.createElement('div'); ic.className='ic'; ic.textContent=cfg.icon; ic.style.color=cfg.dot; it.appendChild(ic);
        var mid=document.createElement('div'); mid.style.minWidth='0'; mid.style.flex='1';
        var nm=document.createElement('div'); nm.className='nm'; var ttl=document.createElement('span'); ttl.textContent=cfg.title(entry); nm.appendChild(ttl);
        var bg=cfg.badge(entry); if(bg){ var b=document.createElement('span'); b.className='vl-badge'; b.textContent=bg; nm.appendChild(b); }
        mid.appendChild(nm);
        var sm=document.createElement('div'); sm.className='sm'; sm.textContent=cfg.sub(entry); mid.appendChild(sm);
        it.appendChild(mid);
        var act=document.createElement('div'); act.className='act';
        var ed=document.createElement('button'); ed.className='vl-mini'; ed.textContent='Edit'; ed.onclick=function(){ renderForm(entry); }; act.appendChild(ed);
        var del=document.createElement('button'); del.className='vl-mini'; del.textContent='Delete'; del.onclick=function(){ var i=arr.indexOf(entry); if(i>=0){ arr.splice(i,1); lib[cur]=arr; persist(); toast('Deleted'); renderList(); } }; act.appendChild(del);
        it.appendChild(act); rows.appendChild(it);
      });
    }
  }

  function renderForm(entry){
    var cfg=TYPES[cur]; var editing=!!entry; var model=entry||{};
    bodyEl.innerHTML=''; var inputs={}; var wraps=[];
    cfg.fields.forEach(function(f){
      if(f.sec!==undefined){ var s=document.createElement('div'); s.className='vl-sec'; s.textContent=f.sec; if(f.for) s.dataset.for=f.for.join(','); bodyEl.appendChild(s); wraps.push({el:s,for:f.for}); return; }
      var wrap=document.createElement('div'); wrap.className='vl-field'; if(f.for) wrap.dataset.for=f.for.join(',');
      var lab=document.createElement('label'); lab.textContent=f.l; wrap.appendChild(lab);
      var inp;
      if(f.t==='area'){ inp=document.createElement('textarea'); }
      else if(f.t==='select'){ inp=document.createElement('select'); f.opts.forEach(function(o){ var op=document.createElement('option'); op.value=o; op.textContent=o; inp.appendChild(op); }); }
      else if(f.t==='cats'){ inp=document.createElement('select'); CATS.forEach(function(o){ var op=document.createElement('option'); op.value=o; op.textContent=o; inp.appendChild(op); }); }
      else if(f.t==='claude'){ inp=document.createElement('select'); var fillCS=function(list){ var sel=inp.value||(model[f.k]||''); inp.innerHTML=''; list.forEach(function(o){ var op=document.createElement('option'); op.value=(o==='—'?'':o); op.textContent=o; inp.appendChild(op); }); inp.value=sel; }; fillCS(CLAUDE_SKILLS); fetchClaudeSkills(fillCS); }
      else if(f.t==='tmpl'){ inp=document.createElement('select'); var opn=document.createElement('option'); opn.value=''; opn.textContent='—'; inp.appendChild(opn); ((LIB()||{}).templates||[]).forEach(function(t){ var op=document.createElement('option'); op.value=t.name; op.textContent=t.name; inp.appendChild(op); }); }
      else if(f.t==='ctx'){ inp=document.createElement('select'); var on0=document.createElement('option'); on0.value=''; on0.textContent='— none —'; inp.appendChild(on0); ((LIB()||{}).context||[]).filter(function(c){ return !f.ctxTypes || f.ctxTypes.indexOf(c.type)>=0; }).forEach(function(c){ var op=document.createElement('option'); op.value=c.name; op.textContent=c.name+(c.type?(' ('+c.type+')'):''); inp.appendChild(op); }); }
      else if(f.t==='color'){ inp=document.createElement('input'); inp.type='text'; inp.placeholder='#0F2138, #F2A33C'; }
      else { inp=document.createElement('input'); inp.type='text'; }
      if(model[f.k]!=null) inp.value=model[f.k];
      inputs[f.k]=inp; wrap.appendChild(inp);
      if(f.t==='color'){ var sw=document.createElement('div'); sw.className='vl-swatches'; wrap.appendChild(sw);
        var pick=document.createElement('input'); pick.type='color'; pick.title='Pick a colour'; pick.style.cssText='width:26px;height:26px;padding:0;border:1px solid #30353d;border-radius:6px;background:#0e0f13;cursor:pointer;flex:0 0 auto';
        var paint=function(){ Array.prototype.slice.call(sw.querySelectorAll('.vl-sw')).forEach(function(n){n.remove();}); (inp.value.match(/#?[0-9a-fA-F]{3,8}/g)||[]).forEach(function(c){ var d=document.createElement('div'); d.className='vl-sw'; d.style.background=(c[0]==='#'?c:'#'+c); sw.insertBefore(d,pick); }); };
        pick.onchange=function(){ inp.value=(inp.value.trim()? inp.value.trim().replace(/,?\s*$/,'')+', ':'')+pick.value; paint(); };
        sw.appendChild(pick); inp.oninput=paint; paint(); }
      if(f.t==='claude'){ var chHint=document.createElement('div'); chHint.className='vl-hint'; chHint.textContent='Live from anthropics/skills — also fills the Source link.'; wrap.appendChild(chHint); }
      if(f.ctl){ inp.onchange=function(){ updateVis(inp.value); }; }
      bodyEl.appendChild(wrap); wraps.push({el:wrap,for:f.for});
    });
    function updateVis(type){ wraps.forEach(function(w){ if(w.for){ w.el.style.display=(w.for.indexOf(type)>=0)?'':'none'; } }); }
    if(cfg.typed){ updateVis(model.type||(inputs.type?inputs.type.value:'client')); }
    var row=document.createElement('div'); row.className='vl-formrow';
    var cancel=document.createElement('button'); cancel.className='vl-add ghost'; cancel.textContent='Cancel'; cancel.onclick=renderList;
    var save=document.createElement('button'); save.className='vl-add'; save.textContent=editing?'Save changes':'Add';
    save.onclick=function(){
      var lib=LIB()||{}; var arr=lib[cur]||[]; var obj=editing?entry:{id:uid()};
      cfg.fields.forEach(function(f){ if(f.k && inputs[f.k]) obj[f.k]=inputs[f.k].value; });
      if(cur==='skills' && obj.basedOn && (!obj.source||!obj.source.trim())) obj.source=skillUrl(obj.basedOn);
      if(!editing) arr.push(obj); lib[cur]=arr; persist(); toast(editing?'Saved':'Added'); renderList();
    };
    row.appendChild(cancel); row.appendChild(save); bodyEl.appendChild(row);
    var first=cfg.fields.find(function(f){return f.k;}); if(first&&inputs[first.k]) inputs[first.k].focus();
  }
  document.getElementById('vlFab').onclick=open;
  document.getElementById('vlClose').onclick=close;
  ov.onclick=function(e){ if(e.target===ov) close(); };
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&ov.classList.contains('on')) close(); });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
})();
</script>
