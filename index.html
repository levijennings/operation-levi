<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levi's Projects — Task Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Sidebar stays DVLMNT black */
            --sidebar: #060606;
            --sidebar-hover: #1C1C1C;
            --sidebar-active: rgba(255,255,255,.10);
            /* Content area — crisp white */
            --bg: #F5F5F5;
            --surface: #FFFFFF;
            --surface-2: #F4F4F5;
            --border: #E4E4E7;
            --border-2: #D1D1D6;
            --text: #0A0A0A;
            --text-2: #5A5A5A;
            --text-3: #9CA0A8;
            /* Accent — DVLMNT black on white bg */
            --accent: #0A0A0A;
            --accent-hover: #333333;
            --accent-subtle: rgba(0,0,0,.06);
            /* Category colors — vivid for white bg */
            --acst: #DC2626;
            --acst-subtle: #FEF2F2;
            --dvlmnt: #059669;
            --dvlmnt-subtle: #ECFDF5;
            --personal: #2563EB;
            --personal-subtle: #EFF6FF;
            --phone: #7C3AED;
            --phone-subtle: #F5F3FF;
            --meeting: #EA580C;
            --meeting-subtle: #FFF7ED;
            --success: #16A34A;
            --warn: #D97706;
            --danger: #DC2626;
            --radius: 8px;
            --radius-sm: 6px;
            --radius-xs: 4px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow: 0 1px 4px rgba(0,0,0,.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,.12);
            --transition: all .15s ease;
        }

        [data-theme="dark"] {
            --bg: #0D0D0D;
            --surface: #1C1C1C;
            --surface-2: #252525;
            --border: #333333;
            --border-2: #404040;
            --text: #F0F0F0;
            --text-2: #A0A0A0;
            --text-3: #606060;
            --accent: #E0E0E0;
            --accent-hover: #FFFFFF;
            --accent-subtle: rgba(255,255,255,.08);
            --shadow-sm: 0 1px 2px rgba(0,0,0,.5);
            --shadow: 0 1px 4px rgba(0,0,0,.6);
            --shadow-lg: 0 4px 16px rgba(0,0,0,.7);
            /* Category subtle — darkened tints for dark mode */
            --acst-subtle: rgba(220,38,38,0.18);
            --dvlmnt-subtle: rgba(5,150,105,0.18);
            --personal-subtle: rgba(37,99,235,0.18);
            --meeting-subtle: rgba(234,88,12,0.18);
        }

        /* Dark mode badge overrides */
        [data-theme="dark"] .badge-acst {
            background: rgba(220,38,38,0.18);
            color: #FCA5A5;
            border-color: rgba(220,38,38,0.3);
        }
        [data-theme="dark"] .badge-dvlmnt {
            background: rgba(5,150,105,0.18);
            color: #6EE7B7;
            border-color: rgba(5,150,105,0.3);
        }
        [data-theme="dark"] .badge-personal {
            background: rgba(37,99,235,0.18);
            color: #93C5FD;
            border-color: rgba(37,99,235,0.3);
        }
        [data-theme="dark"] .waiting-card-meta {
            background: rgba(217,119,6,0.12);
            border-color: rgba(217,119,6,0.3);
            color: #FCD34D;
        }
        [data-theme="dark"] .content-body a {
            color: #93C5FD;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
            letter-spacing: -0.01em;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,.1);
            overflow-y: auto;
            position: relative;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,.1);
            font-size: 16px;
            font-weight: 600;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 8px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: rgba(255,255,255,.7);
            font-size: 13px;
            transition: var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--sidebar-hover);
            color: white;
        }

        .nav-item.active {
            background: var(--sidebar-active);
            color: white;
            border-radius: 20px;
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .sidebar-filters {
            border-top: 1px solid rgba(255,255,255,.1);
            padding: 12px 8px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .5px;
            color: rgba(255,255,255,.5);
            text-transform: uppercase;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: rgba(255,255,255,.7);
            transition: var(--transition);
        }

        .filter-item:hover {
            background: var(--sidebar-hover);
            color: white;
        }

        .filter-item.active {
            background: var(--sidebar-hover);
            color: white;
        }

        .filter-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* COLLAPSIBLE SIDEBAR */
        .sidebar {
            transition: width .2s ease;
        }
        .sidebar.collapsed {
            width: 56px;
        }
        .sidebar.collapsed .sidebar-header .sidebar-title {
            display: none !important;
        }
        .sidebar.collapsed .nav-item span,
        .sidebar.collapsed .filter-item span,
        .sidebar.collapsed .sidebar-filters,
        .sidebar.collapsed .sidebar-footer .xp-badge,
        .sidebar.collapsed .sidebar-footer .streak-line,
        .sidebar.collapsed .sidebar-footer .settings-label {
            display: none;
        }
        .sidebar.collapsed .filter-item .filter-dot {
            margin: 0 auto;
        }
        .sidebar.collapsed .nav-item,
        .sidebar.collapsed .filter-item {
            justify-content: center;
            padding: 8px;
            margin: 9px 0;
        }
        .sidebar.collapsed .sidebar-header {
            justify-content: center;
            padding: 20px 8px;
        }
        .sidebar.collapsed .nav-item svg {
            margin: 0;
        }
        .sidebar-toggle {
            background: none;
            border: none;
            color: rgba(255,255,255,.6);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            transition: color .15s;
        }
        .sidebar-toggle:hover { color: white; }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,.1);
            padding: 12px;
            font-size: 11px;
            color: rgba(255,255,255,.6);
        }

        .xp-badge {
            background: rgba(255,255,255,.1);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .xp-badge .xp-level {
            font-weight: 600;
            color: white;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .top-bar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .top-bar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text-2);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .btn:hover {
            border-color: var(--border-2);
            background: var(--surface-2);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            background: var(--bg);
        }

        .view-content {
            display: none;
        }

        .view-content.active {
            display: block;
            width: 100%;
            min-height: 100%;
        }

        /* DETAIL PANEL */
        .detail-panel {
            position: fixed;
            right: -480px;
            top: 0;
            width: 480px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            transition: right .25s ease;
            z-index: 2000;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .detail-panel.open {
            right: 0;
        }

        .detail-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--surface);
        }

        .detail-header-title {
            font-size: 14px;
            font-weight: 600;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        .detail-input {
            width: 100%;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
        }

        .detail-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .detail-textarea {
            width: 100%;
            min-height: 80px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            transition: var(--transition);
        }

        .detail-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .detail-select {
            width: 100%;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: var(--surface);
            transition: var(--transition);
        }

        .detail-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 3000;
        }

        .modal-overlay.open {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            transition: var(--transition);
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .card:hover {
            border-color: var(--border-2);
            box-shadow: var(--shadow);
        }

        .card.category-ACST {
            border-left-color: var(--acst);
        }

        .card.category-DVLMNT {
            border-left-color: var(--dvlmnt);
        }

        .card.category-Personal {
            border-left-color: var(--personal);
        }

        .goal-card {
            transition: var(--transition);
        }

        .goal-card.dragging {
            opacity: 0.4;
        }

        .goal-card.drag-over {
            border-top: 3px solid var(--accent) !important;
            padding-top: 17px;
        }

        /* MOBILE */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            z-index: 999;
        }

        .mobile-nav-items {
            display: flex;
            justify-content: space-around;
            height: 100%;
            align-items: center;
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-3);
            font-size: 10px;
            border: none;
            background: none;
            transition: var(--transition);
        }

        .mobile-nav-item svg {
            width: 20px;
            height: 20px;
        }

        .mobile-nav-item.active {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .mobile-nav {
                display: block;
            }
            .main {
                margin-bottom: 56px;
            }
            .detail-panel {
                width: 100%;
                right: -100%;
            }
            .top-bar {
                padding: 0 16px;
            }
            .content-area {
                padding: 0 16px;
            }
        }

        /* UTILITY CLASSES */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-1 { gap: 4px; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .gap-4 { gap: 16px; }
        .rounded-full { border-radius: 9999px; }
        .text-sm { font-size: 12px; }
        .text-xs { font-size: 11px; }
        .font-semibold { font-weight: 600; }
        .font-medium { font-weight: 500; }

        /* TOAST */
        #toastContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 4000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            box-shadow: var(--shadow-lg);
            animation: slideIn .2s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* SPECIFIC LAYOUTS */
        .board-container {
            display: grid;
            grid-template-columns: repeat(7, minmax(232px, 1fr));
            gap: 16px;
            padding: 24px;
            min-width: 1560px;
        }

        .board-column {
            background: var(--surface-2);
            border-radius: var(--radius);
            padding: 12px;
            min-height: 500px;
        }

        .board-column-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .board-cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 60px;
        }

        .board-column.drag-over {
            background: var(--accent-subtle);
            outline: 2px dashed var(--accent);
            outline-offset: -2px;
        }

        .card.dragging {
            opacity: 0.4;
            transform: rotate(2deg);
        }

        .card[draggable="true"] {
            cursor: grab;
        }

        .card[draggable="true"]:active {
            cursor: grabbing;
        }

        .gantt-container {
            padding: 24px;
            overflow-x: auto;
        }

        .gantt-row {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        .gantt-title {
            width: 200px;
            flex-shrink: 0;
            font-size: 13px;
            font-weight: 500;
        }

        .gantt-chart {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            padding: 24px;
        }

        .dash-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .dash-card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background: var(--surface-2);
            color: var(--text-2);
        }

        .badge-acst { background: var(--acst-subtle); color: var(--acst); }
        .badge-dvlmnt { background: var(--dvlmnt-subtle); color: var(--dvlmnt); }
        .badge-personal { background: var(--personal-subtle); color: var(--personal); }

        /* PRINT STYLES */
        @keyframes overdueP {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:.5; transform:scale(1.4); }
        }
        @media print {
            /* Hide UI chrome */
            .sidebar, .mobile-nav, .detail-panel, .modal-overlay, .top-bar-actions,
            .top-bar, .toast, button, input[type="checkbox"], select, input[type="file"],
            .btn, .btn-primary, .btn-icon { display: none !important; }

            /* Layout */
            .container { display: block; height: auto; overflow: visible; }
            .content-area { margin: 0; width: 100%; overflow: visible; }
            .view-content { display: none !important; }
            .view-content.active { display: block !important; width: 100% !important; }

            /* Reset colors for print */
            body { background: white !important; color: black !important; font-size: 11px; }
            * { box-shadow: none !important; }

            /* Cards */
            .card, .dash-card {
                border: 1px solid #ccc !important;
                page-break-inside: avoid;
                margin-bottom: 8px;
                padding: 12px;
                background: white !important;
            }

            /* Dashboard grid */
            .dashboard-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            /* Brief modal — make it print nicely */
            .modal-overlay.open {
                display: block !important;
                position: relative !important;
                background: white !important;
            }
            .modal {
                position: relative !important;
                max-width: 100% !important;
                width: 100% !important;
                padding: 24px !important;
                border: none !important;
                box-shadow: none !important;
                background: white !important;
            }

            /* Activity log print */
            .detail-section {
                page-break-inside: avoid;
                margin-bottom: 12px;
            }

            /* Headers */
            h1, h2, h3 { page-break-after: avoid; color: black !important; }

            /* Links */
            a { color: var(--accent); text-decoration: underline; }
            a::after { content: " (" attr(href) ")"; font-size: 9px; color: #666; }

            /* Gantt — don't print (too wide) */
            #ganttView { display: none !important; }

            /* Progress bars for print */
            [style*="background:var(--accent)"], [style*="background:var(--success)"] {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Force color printing for badges */
            .badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; border: 1px solid #ccc; }
        }

        /* DVLMNT GRAIN OVERLAY */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }


        /* SYNE for headings */
        h1, h2, h3, .sidebar-header, .top-bar-title, .board-column-title, .dash-card-title, .detail-header-title {
            font-family: 'Syne', sans-serif;
            letter-spacing: -0.02em;
        }

        /* Sidebar active pill uses white */
        .nav-item.active {
            background: rgba(255,255,255,.10) !important;
            color: white !important;
            border-radius: 6px !important;
        }

        /* btn-primary — DVLMNT black on white bg */
        .btn-primary {
            background: var(--accent) !important;
            color: #FFFFFF !important;
            border-color: var(--accent) !important;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover {
            background: var(--accent-hover) !important;
            border-color: var(--accent-hover) !important;
        }

        /* Category card borders */
        .card.category-Phone { border-left-color: var(--phone); }
        .card.category-Meeting { border-left-color: var(--meeting); }

        /* Badges */

        /** Initialise Supabase client and check existing session */
        async function initAuth() {
            // Guard: SDK must be loaded
            if (typeof window.supabase === 'undefined') {
                console.warn('[Auth] Supabase SDK not loaded — running in local-only mode');
                document.getElementById('authOverlay').style.display = 'none';
                return;
            }
            if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
                console.warn('[Auth] Supabase not configured — running in local-only mode');
                document.getElementById('authOverlay').style.display = 'none';
                return;
            }

            _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Check for existing session
            const { data: { session } } = await _sb.auth.getSession();
            if (session?.user) {
                _currentUser = session.user;
                await _loadWorkspaceMembership();
            } else {
                _showAuthOverlay();
            }

            // React to future sign-in / sign-out events
            _sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session?.user) {
                    _currentUser = session.user;
                    _hideAuthOverlay();
                    await _loadWorkspaceMembership();
                } else if (event === 'SIGNED_OUT') {
                    _currentUser = null;
                    _workspaceId = null;
                    _memberFullItems = null;
                    _showAuthOverlay();
                    _updateUserDisplay();
                }
            });
        }

        /** Load the user's workspace membership and then pull cloud data */
        async function _loadWorkspaceMembership() {
            const { data: member, error } = await _sb
                .from('workspace_members')
                .select('workspace_id, role, name, category, visibility')
                .eq('user_id', _currentUser.id)
                .single();

            if (error || !member) {
                const errEl = document.getElementById('authError');
                if (errEl) errEl.textContent = 'No workspace found for this account. Contact your admin.';
                _showAuthOverlay();
                return;
            }

            _workspaceId    = member.workspace_id;
            _userRole       = member.role;
            _userName       = member.name;
            _userCategory   = member.category || null;
            _userVisibility = member.visibility || 'all';

            await _syncFromCloud();
            _hideAuthOverlay();
            _updateUserDisplay();
        }

        /** Pull the workspace JSON blob from Supabase and refresh app state */
        async function _syncFromCloud() {
            if (!_workspaceId || !_sb) return;

            // ── Non-admin members: read ONLY their permitted rows from the RLS-protected `tasks`
            //    table. The database (not the browser) decides what they can see, based on their
            //    category + visibility. Members never receive the full workspace blob. ──
            if (_userRole !== 'admin') {
                const { data: rows, error: tErr } = await _sb
                    .from('tasks')
                    .select('card')
                    .eq('workspace_id', _workspaceId);
                if (tErr) {

                dailyHistory = []; weekHistory = []; top3Manual = [];
                widgetLayouts = {}; events = [];
                libraries = { skills: [], templates: [], preferences: [], context: [] };

            }

            // Apply cloud data to app state (same logic as loadData)
            const parsed = data.data;
            const rawItems = Array.isArray(parsed) ? parsed : (parsed.items || []);
            goals         = Array.isArray(parsed) ? [] : (parsed.goals || []).map(g => ({
                ...g,
                forecastDate:     g.forecastDate     || g.targetDate || '',
                expectedDate:     g.expectedDate     || g.targetDate || '',
                conservativeDate: g.conservativeDate || g.targetDate || '',
                bestCaseDate:     g.bestCaseDate     || g.targetDate || '',
                updates: g.updates || []

            teams         = Array.isArray(parsed) ? { ACST: [], DVLMNT: [], Personal: [] } : (parsed.teams         || { ACST: [], DVLMNT: [], Personal: [] });
            dailyHistory  = Array.isArray(parsed) ? [] : (parsed.dailyHistory  || []);
            weekHistory   = Array.isArray(parsed) ? [] : (parsed.weekHistory   || []);
            top3Manual    = Array.isArray(parsed) ? [] : (parsed.top3Manual    || []);
            widgetLayouts = Array.isArray(parsed) ? {} : (parsed.widgetLayouts || {});
            events        = Array.isArray(parsed) ? [] : (parsed.events        || []);
            libraries     = Array.isArray(parsed) ? { skills: [], templates: [], preferences: [], context: [] } : Object.assign({ skills: [], templates: [], preferences: [], context: [] }, parsed.libraries || {});
            const rawProfiles = Array.isArray(parsed) ? {} : (parsed.peopleProfiles || {});
            peopleProfiles = {};
            Object.entries(rawProfiles).forEach(([person, profile]) => {
                peopleProfiles[person] = {
                    role: profile.role || '', email: profile.email || '', phone: profile.phone || '',
                    team: profile.team || '', meetingNotes: profile.meetingNotes || [],
                    resources: profile.resources || [], avatar: profile.avatar || '',
                    hoursPerWeek: profile.hoursPerWeek || 40, capacityCadence: profile.capacityCadence || 'weekly', rate: profile.rate || 0, isEA: profile.isEA || false, profileNotes: profile.profileNotes || '', trackCapacity: profile.trackCapacity !== undefined ? profile.trackCapacity : (person === 'Levi')
                };
            });

            items = rawItems.map(item => ({
                id: item.id || Math.random().toString(36).substr(2, 9),
                type: item.type || 'task', title: item.title || '', category: item.category || 'Personal',
                status: (item.status === 'someday' ? 'backlog' : item.status) || 'backlog',
                    execMode: item.execMode || null,
                    aiStatus: item.aiStatus || 'idle',
                    aiArtifact: item.aiArtifact || null,
                    aiUsed: item.aiUsed || null,
                    linkedContext: item.linkedContext || [],
                    comments: item.comments || [],
                    requireProof: item.requireProof || false,
                    proof: item.proof || null,
                    pinned: item.pinned || false,
                    aiConfidence: item.aiConfidence != null ? item.aiConfidence : null,
                    aiAssess: item.aiAssess || null,
                    _timerStart: item._timerStart || null,
                    availableForEA: item.availableForEA || false,
                    submittedBy: item.submittedBy || '',
                startDate: item.startDate || '', dueDate: item.dueDate || '', deliverable: item.deliverable || '',
                notes: item.notes || '', priority: item.priority || 0, timeEstimate: item.timeEstimate || 0,
                tshirtSize: item.tshirtSize || 'XS', raci: item.raci || { R: [], A: '', C: [], I: [] },
                assignees: item.assignees || [], responsible: item.responsible || '',
                responsible2: item.responsible2 || '', informed: item.informed || [],
                involved: item.involved || [], approver: item.approver || '',
                informedWhenComplete: item.informedWhenComplete || [], waitingOn: item.waitingOn || '',
                waitingFrom: item.waitingFrom || '', waitingExpected: item.waitingExpected || '',
                goalIds: item.goalIds || [], approvers: item.approvers || [], meetings: item.meetings || [],
                subtasks: (item.subtasks || []).map(s => ({ ...s, weight: s.weight || 1 })),
                timeline: item.timeline || [], urls: item.urls || [], documents: item.documents || [],
                habitCompletions: item.habitCompletions || [], recurring: item.recurring || false,
                recurringFrequency: item.recurringFrequency || '', columnEnteredAt: item.columnEnteredAt || Date.now(),
                order: item.order !== undefined ? item.order : 999, notionUrl: item.notionUrl || '',

                questions: item.questions || [], parentItemId: item.parentItemId || '',
                recurrence: item.recurrence || null, blockedBy: item.blockedBy || [],
                timeLog: item.timeLog || [], scheduledTime: item.scheduledTime || '',
                templateId: item.templateId || '', completedAt: item.completedAt || '',
            }));

            // Admin sees everything (loaded above). Mirror the full item set into the per-row
            // `tasks` table so members reading it get the admin's latest (dual-write / Option B).
            _syncTasksTable(items);

            // Mirror to localStorage so the app works offline after first load
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, goals, teams, dailyHistory, weekHistory, peopleProfiles, top3Manual, widgetLayouts, events, libraries }));

            renderAll();
            showToast('✦ Synced from cloud');
        }

        /** Mirror the in-memory items into the per-row `tasks` table (RLS-enforced source for members).
         *  Admins push the whole set and prune deleted rows; members upsert only what they can write. */
        async function _syncTasksTable(itemList, opts = {}) {
            if (!_workspaceId || !_sb) return;
            try {
                const rows = (itemList || []).filter(it => it && it.id != null).map(it => ({
                    id: String(it.id),
                    workspace_id: _workspaceId,
                    category: it.category || null,
                    assignees: it.assignees || [],
                    status: it.status || null,
                    title: it.title || '',
                    card: it,
                    updated_at: new Date().toISOString()
                }));
                if (rows.length) {
                    const { error } = await _sb.from('tasks').upsert(rows, { onConflict: 'id' });
                    if (error) { console.warn('[tasks sync] upsert failed:', error.message); return; }
                }
                // Admin is the source of truth: remove rows for tasks that no longer exist.
                if (_userRole === 'admin' && !opts.membersOnly) {
                    const keep = new Set(rows.map(r => r.id));
                    const { data: existing } = await _sb.from('tasks').select('id').eq('workspace_id', _workspaceId);
                    const remove = (existing || []).map(e => e.id).filter(id => !keep.has(id));
                    if (remove.length) await _sb.from('tasks').delete().in('id', remove);
                }
            } catch (e) {
                console.warn('[tasks sync]', e.message);
            }
        }

        /** Push current app state to Supabase (debounced by _queueCloudSave) */
        async function _pushToCloud() {
            if (!_workspaceId || !_sb) return;

            // Members no longer hold (or can read) the full blob — they write their permitted
            // items straight back to the RLS-protected `tasks` table.
            if (_userRole !== 'admin') {
                await _syncTasksTable(items, { membersOnly: true });
                return;
            }

            // Admin: persist the full workspace blob …
            const { error } = await _sb.from('workspace_data').upsert({
                workspace_id: _workspaceId,
                data: { items, goals, teams, dailyHistory, weekHistory, peopleProfiles, top3Manual, widgetLayouts, events, libraries },
                updated_at: new Date().toISOString()
            }, { onConflict: 'workspace_id' });
            if (error) console.warn('[Supabase] save failed:', error.message);

            // … and mirror items into the per-row tasks table (dual-write) so members stay current.
            _syncTasksTable(items);
        }

        /** Debounce cloud saves — waits 2 s after last saveData() call */
        function _queueCloudSave() {
            if (!_workspaceId || !_sb) return;
            clearTimeout(_cloudSaveTimer);
            _cloudSaveTimer = setTimeout(() => _pushToCloud(), 2000);
        }

        /** Sign the user in with email + password */
        async function signIn() {
            const email    = (document.getElementById('authEmail').value    || '').trim();

            const btn      = document.getElementById('authSignInBtn');
            errEl.textContent = '';
            btn.textContent = 'Signing in…';
            btn.disabled = true;

            const { error } = await _sb.auth.signInWithPassword({ email, password });
            btn.disabled = false;
            btn.textContent = 'Sign In';
            if (error) errEl.textContent = error.message;
        }

        async function signOut() {
            if (_sb) await _sb.auth.signOut();
        }

                              (m.visibility === 'assigned' ? 'assigned tasks only' : 'all tasks');
                        return `
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
                            <div>
                                <div style="font-size:13px;font-weight:500;color:var(--text);">${m.name}</div>
                                <div style="font-size:11px;color:var(--text-3);">${scope}</div>
                            </div>

                    }).join('') || '<div style="font-size:12px;color:var(--text-3);">No members found.</div>';

        /** Create a new workspace member (admin only) */
        async function _createMember() {
            const name  = (document.getElementById('newMemberName').value  || '').trim();
            const email = (document.getElementById('newMemberEmail').value || '').trim();
            const pwd   = (document.getElementById('newMemberPwd').value   || '').trim();
            const role       = document.getElementById('newMemberRole').value;
            const category   = document.getElementById('newMemberCategory').value || null;
            const visibility = document.getElementById('newMemberVisibility').value || 'all';
            const errEl = document.getElementById('addMemberError');
            if (!name || !email || !pwd) { errEl.textContent = 'All fields are required.'; return; }
            errEl.textContent = 'Creating account…';

            // Create the login + workspace membership server-side via the secure, admin-gated
            // edge function (service role). The browser never handles the service key, and the
            // member's category + visibility are saved with their membership.
            let payload = null, fnErr = null;
            try {
                const res = await _sb.functions.invoke('admin-create-user', {
                    body: { email, password: pwd, name, role, category, visibility, workspace_id: _workspaceId }
                });
                payload = res.data; fnErr = res.error;
                // surface the server's error message when the function returns a non-2xx status
                if (fnErr && fnErr.context && typeof fnErr.context.json === 'function') {
                    try { const j = await fnErr.context.json(); if (j && j.error) fnErr = { message: j.error }; } catch (e) {}
                }
            } catch (e) { fnErr = { message: e.message }; }
            if (fnErr || (payload && payload.error)) {
                errEl.textContent = (payload && payload.error) ? payload.error : (fnErr.message || 'Could not create member.');
                return;
            }

            document.getElementById('addMemberModal').remove();
            showToast('✓ ' + name + ' added — share their password: ' + pwd);
            _renderTeamList();
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // GAMIFICATION & XP
        // ═══════════════════════════════════════════════════════════════════════════
        function loadXP() {
            const saved = localStorage.getItem('op_levi_xp');
            if (saved) {
                xpData = JSON.parse(saved);
            }
            updateXPBar();
        }

        function saveXP() {
            localStorage.setItem('op_levi_xp', JSON.stringify(xpData));
            updateXPBar();
        }

        function awardXP(amount) {
            xpData.total += amount;
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            if (xpData.lastDate === today) {
                // streak continues
            } else if (xpData.lastDate === yesterday) {
                xpData.streak += 1;
            } else {
                xpData.streak = 1;
            }
            xpData.lastDate = today;
            saveXP();
        }

        function updateXPBar() {
            const el = document.getElementById('xpCount');
            const st = document.getElementById('streakCount');
            if (el) el.textContent = xpData.total;
            if (st) st.textContent = xpData.streak;
        }

        function quickEditDate(event, itemId) {
            const span = event.currentTarget;
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            const input = document.createElement('input');
            input.type = 'date';
            input.value = item.dueDate || '';
            input.style.cssText = 'font-size:11px;border:1px solid var(--border);border-radius:3px;padding:2px 6px;width:120px;font-family:inherit;cursor:pointer;';
            input.onchange = function() {
                item.dueDate = this.value;
                saveData();
                if (currentView === 'board') renderBoard();
                else if (currentView === 'myday') renderMyDay();
                else if (currentView === 'myweek') renderMyWeek();
                showToast('Date updated to ' + formatDate(this.value));
            };
            input.onblur = function() {
                setTimeout(() => {
                    if (currentView === 'board') renderBoard();
                    else if (currentView === 'myday') renderMyDay();
                    else if (currentView === 'myweek') renderMyWeek();
                }, 150);
            };
            span.parentNode.replaceChild(input, span);
            input.focus();
            // Try to open native date picker
            try { input.showPicker(); } catch(e) {}
        }

        function showToast(message, type = 'default') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // HELPER FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════════
        function formatDate(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function getDueDateClass(dueDate) {
            if (!dueDate) return '';
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const due = new Date(dueDate + 'T00:00:00');
            due.setHours(0, 0, 0, 0);
            if (due < today) return 'overdue';
            if (due.getTime() === today.getTime()) return 'soon';
            return '';
        }

        function getStatusLabel(status) {
            const labels = { 'backlog': 'Backlog', 'thisweek': 'This Week', 'active': 'Active', 'today': 'Today', 'waiting': 'Waiting On', 'review': 'Needs Review', 'done': 'Done' };
            return labels[status] || status;
        }

        function getFilteredItems() {
            let list = currentFilter ? items.filter(i => i.category === currentFilter) : items;
            if (currentAssignee) {
                list = list.filter(i => {
                    const people = [...(i.assignees || []), ...((i.raci && i.raci.R) || []), (i.raci && i.raci.A)].filter(Boolean);
                    return people.includes(currentAssignee);
                });
            }
            return list;
        }

        // Render the People (assignee) filter list in the sidebar
        function renderAssigneeFilters() {
            const c = document.getElementById('assigneeFilters');
            if (!c) return;
            const people = (typeof getAllAssignees === 'function') ? getAllAssignees() : [];
            const esc = s => String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            let h = `<div class="filter-item ${!currentAssignee ? 'active' : ''}" onclick="setAssigneeFilter('')"><span>Everyone</span></div>`;
            people.forEach(p => {
                const avatar = (typeof getAvatarHTML === 'function') ? getAvatarHTML(p, 16) : '';
                h += `<div class="filter-item ${currentAssignee === p ? 'active' : ''}" onclick="setAssigneeFilter('${esc(p)}')">
                    <span style="display:inline-flex;width:16px;height:16px;flex-shrink:0;">${avatar}</span>
                    <span>${p}</span>
                </div>`;
            });
            c.innerHTML = h;
        }

        function setAssigneeFilter(name) {
            currentAssignee = (currentAssignee === name) ? '' : name;
            renderAssigneeFilters();
            updateFilterBanner();
            renderCurrentView();
        }

        function getCategoryBadgeClass(category) {
            const map = { 'ACST': 'badge-acst', 'DVLMNT': 'badge-dvlmnt', 'Personal': 'badge-personal' };
            return map[category] || '';
        }

        function getAllAssignees() {
            const set = new Set();
            items.forEach(item => {
                (item.assignees || []).forEach(a => set.add(a));
                if (item.raci) {
                    (item.raci.R || []).forEach(a => set.add(a));
                    if (item.raci.A) set.add(item.raci.A);
                    (item.raci.C || []).forEach(a => set.add(a));
                    (item.raci.I || []).forEach(a => set.add(a));
                }
            });
            Object.values(teams).forEach(arr => arr.forEach(p => set.add(p)));
            if (set.size === 0) set.add('Levi');
            return Array.from(set).sort();
        }

        function getTeamScopedAssignees(category) {
            const all = getAllAssignees();
            const teamMembers = (teams[category] || []);
            const others = all.filter(a => !teamMembers.includes(a));
            const sorted = [...teamMembers, ...others];
            return sorted;
        }

        function savePersonField(person, field, value) {
            if (!peopleProfiles[person]) peopleProfiles[person] = {};
            if (field === 'hoursPerWeek') value = parseInt(value) || 40;
            peopleProfiles[person][field] = value;
            saveData();
            showToast('✓ Saved');
        }

        function editPersonField(person, field) {
            const profile = peopleProfiles[person] || {};
            const current = profile[field] || (field === 'hoursPerWeek' ? 40 : '');
            const val = prompt('Hours per week for ' + person + ':', current);
            if (val !== null) {
                savePersonField(person, field, val);
                renderAssignees();
            }
        }

        function removePerson(person, teamName) {
            if (teams[teamName]) {
                teams[teamName] = teams[teamName].filter(p => p !== person);
            }
            delete peopleProfiles[person];
            saveData();
            renderAssignees();
            showToast('✓ Removed ' + person);
        }

        function saveMeetingNote(person) {
            const date = document.getElementById('mnDate').value;
            const subject = document.getElementById('mnSubject').value.trim();
            const notes = document.getElementById('mnNotes').value.trim();
            const actionsEl = document.getElementById('mnActions');
            const actionsRaw = actionsEl ? actionsEl.value : '';
            const actionItems = actionsRaw.split('\n').map(t => t.trim()).filter(Boolean).map(text => ({ id: Math.random().toString(36).substr(2,8), text, taskId: null, done: false }));
            if (!subject) return;
            if (!peopleProfiles[person]) peopleProfiles[person] = {};
            if (!peopleProfiles[person].meetingNotes) peopleProfiles[person].meetingNotes = [];
            peopleProfiles[person].meetingNotes.push({ date, subject, notes, id: Date.now().toString(), actionItems });
            saveData();
            closeModal();
            renderAssignees();
            showToast('Meeting note saved');
        }

        function confirmTaskFromAction(person, noteId, actionId) {
            const profile = peopleProfiles[person] || {};
            const note = (profile.meetingNotes || []).find(n => n.id === noteId);
            if (!note) return;
            const action = (note.actionItems || []).find(a => a.id === actionId);
            if (!action) return;
            const title = (document.getElementById('tfa-title').value || '').trim() || action.text;
            const assignee = document.getElementById('tfa-assignee').value;
            const dueDate = document.getElementById('tfa-due').value;
            const status = document.getElementById('tfa-status').value;
            const category = document.getElementById('tfa-category').value;
            const newItem = {
                id: Math.random().toString(36).substr(2, 9),
                type: 'task', title: title, category: category,
                status: status, startDate: '', dueDate: dueDate, deliverable: '',
                notes: 'Action item from meeting with ' + person + ' on ' + note.date + ' — ' + note.subject,
                priority: 0, timeEstimate: 0, tshirtSize: 'S',
                raci: { R: [assignee], A: '', C: [], I: [] }, assignees: [assignee],
                responsible: assignee, informed: [], involved: [], approver: '',
                informedWhenComplete: [], waitingOn: '', waitingFrom: '', goalIds: [],
                approvers: [], meetings: [], subtasks: [], timeline: [], urls: [],
                documents: [], habitCompletions: [], recurring: false, recurringFrequency: '',
                columnEnteredAt: Date.now(), order: 999, questions: [], parentItemId: '',
                recurrence: null, blockedBy: [], notionUrl: '', figmaUrl: '',
                googleDocsUrl: '', msDocsUrl: '', msExcelUrl: ''
            };
            items.push(newItem);
            action.taskId = newItem.id;
            saveData();
            renderAssignees();
            const modal = document.getElementById('taskFromActionModal');
            if (modal) modal.remove();
            showToast('Task created: ' + title.substring(0, 40));
        }

        function toggleActionItemDone(person, noteId, actionId) {
            const profile = peopleProfiles[person] || {};
            const note = (profile.meetingNotes || []).find(n => n.id === noteId);
            if (!note) return;
            const action = (note.actionItems || []).find(a => a.id === actionId);
            if (!action) return;
            if (action.taskId) {
                const task = items.find(i => i.id === action.taskId);
                if (task) { task.status = task.status === 'done' ? 'active' : 'done'; saveData(); renderAssignees(); }
            } else {
                action.done = !action.done;
                saveData();
                renderAssignees();
            }
        }

            const url = prompt('Resource URL:');
            if (!url) return;
            const title = prompt('Label / title for this resource:', url);
            if (!peopleProfiles[person]) peopleProfiles[person] = {};
            if (!peopleProfiles[person].resources) peopleProfiles[person].resources = [];
            peopleProfiles[person].resources.push({ url, title: title || url, fromProject: '' });
            saveData();
            renderAssignees();
            showToast('✓ Resource added');

        function renderRaciOptions(existingPeople, role) {
            const item = items.find(i => i.id === selectedItemId);
            if (!item) return '';
            const available = getTeamScopedAssignees(item.category).filter(a => !existingPeople.includes(a));
            const teamMembers = teams[item.category] || [];
            let html = '<option value="">+ Add person</option>';
            let addedSeparator = false;
            available.forEach(a => {
                if (teamMembers.includes(a)) {
                    html += `<option value="${a}">${a}</option>`;
                } else if (!addedSeparator) {
                    html += `<optgroup label="Other">`;
                    addedSeparator = true;
                    html += `<option value="${a}">${a}</option>`;
                } else {
                    html += `<option value="${a}">${a}</option>`;
                }
            });
            if (addedSeparator) html += '</optgroup>';

        function getAvatarHTML(name, size = 24) {
            const avatars = JSON.parse(localStorage.getItem('op_levi_avatars') || '{}');
            const src = avatars[name] || (peopleProfiles[name] && peopleProfiles[name].avatar) || '';
            if (src) {
                return `<img src="${src}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;" alt="${name}">`;
            }
            const colors = ['#5E6AD2', '#EF4444', '#22C55E', '#F59E0B', '#EC4899', '#8B5CF6', '#06B6D4'];
            const idx = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % colors.length;

        function getItemProgress(item) {
            const subs = (item.subtasks || []).filter(s => s.type !== 'question'); // questions don't count toward progress
            if (subs.length === 0) return { done: 0, total: 0, pct: 0 };
            const totalWeight = subs.reduce((s, st) => s + (st.weight || 1), 0);
            const doneWeight = subs.filter(s => s.done).reduce((s, st) => s + (st.weight || 1), 0);
            return { done: subs.filter(s => s.done).length, total: subs.length, pct: totalWeight > 0 ? Math.round(doneWeight / totalWeight * 100) : 0 };
        }

        function getPersonRaciStats(name) {
            const active = items.filter(i => i.type !== 'habit' && i.status !== 'done');
            return {
                R: active.filter(i => (i.raci?.R || i.assignees || []).includes(name)).length,
                A: active.filter(i => i.raci?.A === name).length,
                C: active.filter(i => (i.raci?.C || []).includes(name)).length,
                I: active.filter(i => (i.raci?.I || []).includes(name)).length
            };
        }

        function uploadAvatar(name) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    const avatars = JSON.parse(localStorage.getItem('op_levi_avatars') || '{}');
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 80;
                        canvas.height = 80;
                        const ctx = canvas.getContext('2d');
                        const size = Math.min(img.width, img.height);
                        ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, 80, 80);
                        avatars[name] = canvas.toDataURL('image/jpeg', 0.8);
                        localStorage.setItem('op_levi_avatars', JSON.stringify(avatars));
                        // Also persist to cloud via peopleProfiles
                        if (!peopleProfiles[name]) peopleProfiles[name] = { role:'', email:'', phone:'', team:'', meetingNotes:[], resources:[], avatar:'' };
                        peopleProfiles[name].avatar = avatars[name];
                        scheduleAutoSave();
                        // Also persist to cloud via peopleProfiles
                        if (!peopleProfiles[name]) peopleProfiles[name] = { role:'', email:'', phone:'', team:'', meetingNotes:[], resources:[], avatar:'' };
                        peopleProfiles[name].avatar = avatars[name];
                        scheduleAutoSave();
                        renderAssignees();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function saveCurrentDetail() {
            const it = items.find(i => i.id === selectedItemId);
            if (!it) return;
            const oldStatus = it.status;
            it.title = document.getElementById('detailTitleInput')?.value || it.title;
            it.type = document.getElementById('detailType')?.value || it.type;
            it.category = document.getElementById('detailCategory')?.value || it.category;
            it.status = document.getElementById('detailStatus')?.value || it.status;
            const _sdEl = document.getElementById('detailStartDate');
            if (_sdEl) it.startDate = _sdEl.value; // allow clearing
            const _ddEl = document.getElementById('detailDueDate');
            if (_ddEl) it.dueDate = _ddEl.value; // allow clearing
            it.deliverable = document.getElementById('detailDeliverable')?.value || it.deliverable;
            it.notes = document.getElementById('detailNotes')?.value || it.notes;
            it.priority = parseInt(document.getElementById('detailPriority')?.value || it.priority);
            it.timeEstimate = parseInt(document.getElementById('detailTimeEstimate')?.value || it.timeEstimate);
            it.tshirtSize = document.getElementById('detailTshirtSize')?.value || it.tshirtSize;

            // RACI accountable
            const raciA = document.getElementById('raciA')?.value;
            if (raciA !== undefined) { if (!it.raci) it.raci = {R:[],A:'',C:[],I:[]}; it.raci.A = raciA; }
            // Waiting
            it.waitingOn = document.getElementById('detailWaitingOn')?.value || '';
            it.waitingFrom = document.getElementById('detailWaitingFrom')?.value || '';
            it.waitingExpected = document.getElementById('detailWaitingExpected')?.value || '';
            // Auto-assign the person being waited on so it shows in their filter
            if (it.waitingFrom) {
                if (!it.assignees) it.assignees = [];
                if (!it.assignees.includes(it.waitingFrom)) it.assignees.push(it.waitingFrom);
            }
            // Links
            it.notionUrl = document.getElementById('detailNotionUrl')?.value || '';
            it.figmaUrl = document.getElementById('detailFigmaUrl')?.value || '';
            it.googleDocsUrl = document.getElementById('detailGDocsUrl')?.value || '';
            it.msDocsUrl = document.getElementById('detailMsDocsUrl')?.value || '';
            it.msExcelUrl = document.getElementById('detailMsExcelUrl')?.value || '';

            // Timeline entry for status change
            if (oldStatus !== it.status) {
                addTimelineEntry(it.id, 'Status changed to ' + it.status);
                if (it.status === 'waiting' && !it.waitingFrom && !it.waitingOn) {
                    const waitFrom = prompt('Who are you waiting on?');
                    const waitWhat = prompt('What are you waiting on?');
                    if (waitFrom) it.waitingFrom = waitFrom;
                    if (waitWhat) it.waitingOn = waitWhat;
                }
                if (it.status === 'done') {
                    it.completedAt = it.completedAt || new Date().toISOString().split('T')[0];
                    awardXP(25);
                    // Recurring task — auto-create next occurrence
                    if (it.recurring && it.recurringFrequency && it.type !== 'habit') {
                        createNextRecurrence(it);
                    }
                }
            }

            saveData();
            // Push to cloud immediately (not debounced) so reload never reverts changes
            if (typeof _workspaceId !== 'undefined' && _workspaceId && typeof _sb !== 'undefined' && _sb) _pushToCloud();
            renderCurrentView();
        }
